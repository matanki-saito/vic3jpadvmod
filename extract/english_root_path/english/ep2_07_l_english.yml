l_english:
 je_sakoku: "The Locked Country"
 je_sakoku_reason: "Since the Kan'ei era and the earliest days of Tokugawa power, $JAP$ has been a country closed to outsiders. A trickle of trade with a few select nations at a few designated ports is all that has ever been allowed. While this system has lasted for more than two centuries, the world is beginning to change in ways that make it harder to keep the country locked down, even if interests within $JAP$ wish things could remain the same forever. If foreign attempts to open our lands cannot be stopped, then we must import their ideas as well as their goods."
 je_sakoku_meiji_restoration: "The #b Emperor#! has been restored to power and the #b Shōgun#! overthrown"
 je_sakoku_stop_being_closed_button: "Revoke [GetLawType('law_sakoku').GetName]"
 je_sakoku_stop_being_closed_button_desc: "The escalating situation and increasing pressures from abroad have made the end of [GetLawType('law_sakoku').GetName] an outright emergency. Under these circumstances, we may be able to forcibly end the old system of isolation, but this will infuriate everyone who still supports the old laws."
 notification_morrison_incident_has_incidented_name: "Merchant Fired On By $JAP$"
 notification_morrison_incident_has_incidented_desc: "An adventurous merchant from our lands attempted to violate $JAP_ADJ$ restrictions on foreign trade ships and has been fired upon by a shore battery, souring relations between our nations."
 notification_morrison_incident_has_incidented_tooltip: "#header $notification_morrison_incident_has_incidented_name$#!\n$TOOLTIP_DELIMITER$\n$notification_morrison_incident_has_incidented_desc$"
 light_hand_with_foreigners: "Light Hand with Foreigners"
 caved_to_foreign_pressure_opposition: "Caved to Foreign Pressure"
 caved_to_foreign_pressure_government: "Caved to Foreign Pressure"
 overdue_break_with_tradition: "Overdue Break with Tradition"
 forced_transition_from_tradition: "Forced Transition from Tradition"
 the_picked_lock_modifier: "The Picked Lock"
 sakoku_entrenched_modifier: "Sakoku Entrenched"
 meiji_failure_modifier: "Failed Restoration Reforms"
 ep2_sakoku.1.t: "The Disturbing [SCOPE.sCountry('opium_wars_loser').GetAdjectiveNoFormatting] Defeat"
 ep2_sakoku.1.d: "Our vast and venerable neighbor, [SCOPE.sCountry('opium_wars_loser').GetName], has just lost a war over opium and trade against some upstart overseas nation. If [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting] cannot control her own market and keep the foreigners out, how can we maintain [GetLawType('law_sakoku').GetName] in our own lands?"
 ep2_sakoku.1.f: ""For all the land, all the riches, all the power they had—nothing compared to the might that was arrayed against them. The foreigners are already begging to be let into our country. Do we follow the example of [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting] and, like [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting], try to hold them back until their cannons rain fire on our towns? Or do we seek our own path? We must decide now, before those forces of iron and cannon enter our waters and make the decision for us.""
 ep2_sakoku.1.a: "The unthinkable must now be considered."
 ep2_sakoku.1.b: "The unthinkable must now be embraced."
 end_sakoku_button_now_available: "The option to forcibly end [GetLawType('law_sakoku').GetName] early will now be visible in $je_sakoku$."
 ep2_sakoku.2.t: "Picking the Lock"
 ep2_sakoku.2.d: "With tumult rising from within and without, the [GetLawType('law_bakufu').GetName] has chosen to press for an immediate end to [GetLawType('law_sakoku').GetName]."
 ep2_sakoku.2.f: "A crowd of merchants flooded the customs house. Facing them, a single harried official stood alone. "Yes, of course this means the country will no longer be locked down."\n\nA dozen questions from the throng washed over the administrator like a roar. "What will it be instead? I'm... I'm not sure. Perhaps there will be- no, hold on, just because- this decision is not mine or yours to make, you can't just-"\n\nEvery answer he gave provoked a score more questions. #italic Work was so much easier when the country was left alone#!, he thought."
 ep2_sakoku.2.a: "The future of [ROOT.GetCountry.GetNameNoFormatting] lies with [GetLawType('law_mercantilism').GetName]."
 ep2_sakoku.2.b: "[GetLawType('law_free_trade').GetName] will free [ROOT.GetCountry.GetNameNoFormatting]."
 ep2_sakoku.2.c: "[GetLawType('law_protectionism').GetName] shall let us trade cautiously with foreign interests"
 ep2_sakoku.3.t: "The [SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting] Incident"
 ep2_sakoku.3.d: "A merchant from [SCOPE.sCountry('morrison_incident_country').GetName] has attempted to ignore the strict protocols of [GetLawType('law_sakoku').GetName] and trade at an unsanctioned port. Their vessel, the #italic [SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting]#!, has been driven away under fire by coastal batteries. Relations, such as they are, with [SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting] have soured."
 ep2_sakoku.3.f: "The commander grinned as a cannonball finally struck the ship. The law was very clear; the ship had no right to sail these waters. He did not care what the captain aboard that vessel thought. All he wanted was for that ship to turn around and leave. "
 ep2_sakoku.3.a: "The local garrison did what it was supposed to do."
 ep2_sakoku.3.b: "We should apologize to [SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting] and compensate the merchant to smooth things over."
 ep2_sakoku.3.c: "This is the opportunity we need to review the necessity of [GetLawType('law_sakoku').GetName]"
 ep2_sakoku.4.t: "The Picked Lock"
 ep2_sakoku.4.d: "Navigating pressures from within and without, [GetLawType('law_sakoku').GetName] has been overturned. [ROOT.GetCountry.GetNameNoFormatting] has unlocked a new future for herself."
 ep2_sakoku.4.f: "The official looked out over the bay. New ships were at the docks. Unfamiliar ships, waving flags he had never seen before. What did they offer [ROOT.GetCountry.GetNameNoFormatting]? What did they seek to take from [ROOT.GetCountry.GetNameNoFormatting]?\n\nHis gaze lingered on the docked ships for a long, long time, before he finally turned away. His eyes would not be able to give him the answer he wanted, not today. Only time would be able to tell him what this new era would give to his homeland."
 ep2_sakoku.4.a: "Today, Japan opens up!"
 ep2_sakoku.5.t: "Rusted Shut"
 ep2_sakoku.5.d: "The continued observance of [GetLawType('law_sakoku').GetName] in [ROOT.GetCountry.GetNameNoFormatting], even as the country is rocked by seismic political shifts, bodes ill for any hope of breaking out of the country's self-imposed isolation. It seems like [GetLawType('law_sakoku').GetNameNoFormatting] is here to stay."
 ep2_sakoku.5.f: "The official looked out over the bay. Old ships sat at the docks, the same that his father would have seen, or his grandfather, or his ancestors for several generations back. Would his children see the same ships? His grandchildren? Would this vista ever change?\n\nHis gaze lingered on the docked ships for a long, long time, before he finally turned away. His eyes would not be able to give him the answer he wanted, not today. Only time would be able to tell if his homeland would truly remain the same forever."
 ep2_sakoku.5.a: "The lock remains closed."
 meiji.14.t: "The Empty Restoration"
 meiji.14.d: "Despite the heady promises of reform championed by the new [ROOT.GetCountry.GetCustom('JAP_era_name')] government, [ROOT.GetCountry.GetNameNoFlag] has undergone no major changes. Critics lament that the state today is little different from the state before the Restoration."
 meiji.14.f: "An enormous engine huffed and chugged on the factory floor, spinning an enormous flywheel and powering tremendous lathes and drills. Those machines were carving new barrels, new locks, new triggers, for a vast new arsenal of weapons. A nation would soon wield this steam and iron to stamp their mark on the world—and that nation would not be [ROOT.GetCountry.GetNameNoFormatting]."
 meiji.14.a: "Today, the sun rests on a dream."

 je_end_edo_system_button_name: "End the Edo Status System"
 je_end_edo_system_button_desc: "In this age of reform and renewal, the caste system of old holds us back. Every citizen can be a valuable part of the state, no matter their station in life."
 edo_system_not_support_enforcement_tt: "Does not support enactment of [GetLawType('law_intermediate_edo_system').GetName] or [GetLawType('law_strict_edo_system').GetName]"
 edo_system_ends_tt: "[ROOT.GetCountry.GetNameNoFlag] abolishes the [Concept('concept_social_hierarchy','$edo_system$')] entirely"
 notification_edo_system_disappears_name: "Edo System Collapses"
 notification_edo_system_disappears_desc: "Due to recent cultural and societal changes, the Edo System is no longer a recognized [concept_social_hierarchy] in [SCOPE.sCountry('relevant_country_scope').GetName]."
 notification_edo_system_disappears_tooltip: "#header $notification_edo_system_disappears_name$#!\n$TOOLTIP_DELIMITER$\n$notification_edo_system_disappears_desc$"
 je_meiji_army_barracks_condition: "Every [ROOT.GetCountry.GetAdjectiveNoFlag] [GetBuildingType('building_barrack').GetName]:\n$EFFECT_LIST_BULLET$ Has #bold not#! activated #yellow $pm_no_organization$#! nor #yellow $pm_samurai_training$#!"
