l_english:
edo_system: "Edo Status System"

# Edo Social Classes
strata_samurai_high: "Upper Samurai" # High-Class Samurai
strata_samurai_high_desc: "High-ranking warrior elites such as daimyō and senior retainers, the upper echelons of the samurai class have monopolized most offices of note and enjoy significant hereditary prestige."
strata_samurai_low: "Lower Samurai" # Low-Class Samurai
strata_samurai_low_desc: "Lower-ranking warriors and retainers such as gokenin and ashigaru serving as the administrative and military workforce beneath the samurai elite."
strata_religious: "Jisha" # Priests
strata_religious_desc: "Shrine clergy organized through temple institutions and regulated by the authorities. While they are influential in local life, learning, and religious rituals, they exist somewhat outside the legally defined status classes."
strata_commoners_peasants: "Hyakushō" # Peasants
strata_commoners_peasants_desc: "A subdivision of the commoner class, the peasants are by far the most numerous of the Japanese social classes. Members of the peasant class are registered in villages and are bound to local obligations and taxation. They are defined by their registration—not occupation—and include rural craftsmen and merchants as well as farmers."
strata_commoners_townspeople: "Chōnin" # Townspeople
strata_commoners_townspeople_desc: "A subdivision of the commoner class, the townspeople are the main inhabitants of Japan's urban centers. Members of the townspeople class are registered through town institutions and are traditionally associated with crafts and commerce. While they can accumulate significant wealth and influence, their social mobility is retarded by their non-warrior status."
strata_outcastes: "Eta-Hinin" # Outcastes Eta, Hinin, etc.
strata_outcastes_desc: "The Eta and Hinin form the lowest ranks of Japanese society. Heavily discriminated against, they are associated with 'unclean' occupations such as grave-digging, begging, and street performing."

# Edo Social System Laws
lawgroup_edo_social_system: "Edo Status System"
lawgroup_edo_social_system_desc: "Enforcement of the $lawgroup_edo_social_system$"
law_strict_edo_system: "Rigid Status Order"
law_strict_edo_system_desc: "Everything from legal and professional opportunities to the number of residential gates one's status affords them is strictly regulated and enforced by the state. Any breach of the protocol is heavily sanctioned, and townsmen and peasants have no way to formally enter the ranks of the samurai."
law_intermediate_edo_system: "Loosened Status Order"
law_intermediate_edo_system_desc: "Legal and sumptuary laws have been relaxed, and commoners are afforded increasing influence and status in society. Wealthy townsmen or peasants may become gokenin—a low-ranking samurai—through purchase."
law_lax_edo_system: "Lax Status Order"
law_lax_edo_system_desc: "Positions and roles previously exclusive to samurai are opened up for commoners, and enforcement of remaining sumptuary and professional limitations is only enforced selectively, usually limited to the most serious offenses alone."

# Tenpo Crisis
je_tenpo_crisis: "Tenpō Crisis"
je_tenpo_crisis_reason: "Declared in 1830, the Tenpō, or 'Heavenly Protection' Era initially lived up to its auspicious name. However, poor weather conditions on [GetGeographicRegion('geographic_region_honshu').GetName] would soon result in soaring rice prices and a country-wide famine, while the increasing wealth and influence of the [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] threatens the established [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] order.\n\nMeanwhile, on the horizon, Western [Concept('concept_great_power','$concept_great_powers$')] are getting ever bolder, and their merchantmen and gunboats ever closer to our shores.\n\nSeeking to address these issues, reform-minded notables have outlined their visions to the Bakufu.\n\n#tooltippable;tooltip:tenpo_reformer_tt #b Reformer Agenda#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_lax')] [ROOT.GetCountry.GetNameNoFlag] has enacted [GetLawType('law_lax_edo_system').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_bureaucrats')] [ROOT.GetCountry.GetNameNoFlag] has #b not#! enacted [GetLawType('law_hereditary_bureaucrats').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_urbanization')] [ROOT.GetCountry.GetNameNoFlag] has #v 3#! [Concept('concept_state', '$concept_states$')] with a level #v 3#! [GetBuildingType('building_urban_center').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_clout')] The [concept_clout] of the [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] [concept_interest_group] is #v 10#! or above\n#tooltippable;tooltip:tenpo_hardliner_tt #b Hardliner Agenda#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_strict')] [ROOT.GetCountry.GetNameNoFlag] has enacted [GetLawType('law_strict_edo_system').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_social_control')] [ROOT.GetCountry.GetNameNoFlag] has enacted [GetLawType('law_shinsengumi').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_rural')] [ROOT.GetCountry.GetNameNoFlag] has #v 40#! levels of [GetBuildingType('building_rice_farm').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_pb_marginalized')] The [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] [concept_interest_group] is [concept_marginalized]\n#tooltippable;tooltip:tenpo_shared_tt #b Shared Agenda#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_famine')] #b No#! owned [GetCulture('japanese').GetName] [concept_homeland] [concept_state] is suffering from [concept_famine]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_gdp')] [ROOT.GetCountry.GetNameNoFlag] has a [Concept('concept_gdp', '$concept_gdp_short$')] of @gdp!#v [Country.MakeScope.Var('tenpo_gdp_goal').GetValue|k0]#! or above\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_army_size')] [ROOT.GetCountry.GetAdjectiveNoFlag] army [concept_power_projection] is greater than #v 500#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_naval_size')] We have #v 10#! or more levels of [GetBuildingType('building_naval_fortification').GetName] in owned [Concept('concept_state', '$concept_states$')]"
je_tenpo_crisis_complete_header: "Will conclude in a successful Tenpō reform if:\n"
je_tenpo_crisis_failure_header: "Will conclude in a failed Tenpō reform if:\n"
je_tenpo_crisis_success_tt: "We have completed at least #v 8#! agenda goals"
je_tenpo_crisis_success_2_tt: "Depending on the number of #tooltippable;tooltip:tenpo_shared_tt #b Shared#!#!, #tooltippable;tooltip:tenpo_reformer_tt #b Reformer#!#!, or #tooltippable;tooltip:tenpo_hardliner_tt #b Hardliner#!#! goals completed, the reward will change"
je_tenpo_crisis_success_outcome_tt: "Depending on the number of #b Shared#!, #b Reformer#!, or #b Hardliner#! goals completed, the reward will change."
je_tenpo_crisis_success_outcome_1_tt: "If we have completed more #b Hardliner#! agendas:"
je_tenpo_crisis_success_outcome_2_tt: "If we have completed more #b Reformer#! agendas:"
je_tenpo_crisis_success_outcome_3_tt: "If we have completed an equal amount of #b Hardliner#! and #b Reformer#! agendas:"
modifier_tenpo_crisis_reward_hardliner: "Return to Order"
modifier_tenpo_crisis_reward_reformer: "Enshrining the New"
modifier_tenpo_crisis_reward_balanced: "Measured Reforms"
modifier_rice_hoarding: "Widespread Rice Hoarding"
tenpo_hardliner_tt: "The #b Hardliner Faction#! believes that Japanese society is in moral decay, and that this decay can only be arrested by a return to tradition.\n\nIt believes in the introduction of stricter sumptuary laws, and for the Samurai to forgo the luxuries of the cities and return to their idealized role as austere rural administrators."
tenpo_reformer_tt: "The #b Reform Faction#! believes that Japanese society has irrevocably changed, and that the laws of the country should be based on the actual state of the country rather than the ideals of a romanticized past.\n\nIt believes in the political elevation of Japanese commoners and the promotion of commerce."
tenpo_shared_tt: "Both the #b Hardliner#! and #b Reform#! factions believe that it is imperative to safeguard Japan from external threats, and that the issue of food security and the economy must be addressed."

button_je_tenpo_combat_rice_hoarding: "Combat Rice Hoarding"
button_je_tenpo_combat_rice_hoarding_desc: "The political and economic instability of the [ROOT.GetCountry.GetNameNoFlag] has caused unscrupulous actors to purchase and hoard large quantities of rice, driving up prices. As a consequence, many Japanese families now find themselves without the means to purchase enough rice to feed themselves."

button_je_tenpo_frugal_ordinance: "Issue the Frugal Ordinance"
button_je_tenpo_frugal_ordinance_desc: "The growing decadence of the urban [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] is threatening the stability of our rule. They have now begun to act above their station, flaunting their wealth for all to see.\n\nWe must remind them of their role in society by imposing further legal restrictions on luxury items, entertainment, and literature."

button_je_tenpo_confiscate_land: "Issue Edo-Osaka Confiscation Order"
button_je_tenpo_confiscate_land_desc: "The area within 10 #italic #tooltippable;tooltip:glossary_ri ri#!#! of Edo and Osaka represents a complicated jumble of tenryo-, daimyo-, and hatamoto-held land. As the lack of a unified administrative structure has severe effects on national defense and our ability to utilize the land's full potential, a leading Rōjū has proposed its confiscation and consolidation.\n\nDisplaced land-holders will be awarded compensatory land elsewhere in Japan."
modifier_consolidation_payments: "Land Consolidation Payments"
modifier_consolidated_state_land: "10 Ri Consolidation Act"
glossary_ri: "#b #italic Ri#!#! is a traditional unit of measurement derived from the Chinese #italic li#!.\n\nThe defined length of a ri shifted over time, but in the late Edo period it roughly corresponded to 36 #italic chō#!, or 3.9km."


modifier_tenpo_crisis_ongoing: "Tenpō Era Upheavals"

tenpo_events.1.t: "Era of Heavenly Protection"
tenpo_events.1.d: "Following years of adverse weather, [concept_famine] grips the land of the [ROOT.GetCountry.GetNameNoFlag]. With the poor and destitute struggling to make ends meet, the Bakufu faces growing discontent from those who believe that the government could do more."
tenpo_events.1.f: "His wife's woven textiles had always fetched a good price at the market, and in better days would even afford them the occasional piece of confectionary. Now they only fetched four or five gō of rice, if that. Barely enough to feed them for a day, he thought, much less the week they needed—even when supplemented with foraged leaves and weeds.\n\nHe took the path home, briefly stopping in view of old Tora's home. The pox had already claimed two of his children—and if the rumors about the rain coats were true, were likely to claim more in the weeks to come. Clutching his sack of rice tightly, he offered a silent prayer and left."
tenpo_events.1.a: "O Heaven, protect us!"
tenpo_events.1.tt_1: "#r Severe#! [GetHarvestConditionType('torrential_rains').GetName] have struck [GetGeographicRegion('geographic_region_honshu').GetName], #r ruining#! the country's critically important #b rice harvests#! and severely degrading [ROOT.GetCountry.GetAdjectiveNoFlag] [concept_food_security]."
tenpo_events.1.tt_2: "All across [GetGeographicRegion('geographic_region_honshu').GetName], the abodes of moneylenders and suspected rice hoarders are targeted by mobs engaging in so-called #italic #tooltippable;tooltip:glossary_uchikowashi uchikowashi#!#!, resulting in #r country-wide#! [concept_devastation]."
glossary_uchikowashi: "#b #italic Uchikowashi#!#! refers to the act of destroying the property of perceived immoral actors such as moneylenders, rice-hoarders, and price-gougers by members of the public.\n\nWhile these acts were often accompanied by looting, in many cases the perpetrators of uchikowashi would deliberately refrain from doing so in order to highlight the legitimacy of their act."

tenpo_events.2.t: "Revolt of the Philosopher-Samurai"
tenpo_events.2.d: "Disillusioned with the established order and its inability to deal with the [concept_famine] plaguing [SCOPE.sState('osaka_scope').GetName], the magistrate and scholar [SCOPE.sCharacter('oshio_scope').GetFullName] has revolted against the local authorities. Large parts of [SCOPE.sState('osaka_scope').GetCityHubName] are already in flames, as [SCOPE.sCharacter('oshio_scope').GetHerHis] supporters torch local government offices."
tenpo_events.2.f: ""Though we do not have the might of Tang and Wu, nor the virtue of Confucius and Mencius, there is no help for it: for the sake of the realm, we have resolved to act—despite the curse it may bring upon our own bloodline.\n\nWe shall punish and execute the various officials who torment and distress the common people, and following that we shall likewise punish and execute the wealthy townsmen of Osaka who have grown fat on extravagance.\n\nThen the gold, silver, and coins they have stored away in hidden vaults, and the rice bales they have concealed in their storehouses and estates, will be distributed and allotted."\n\n—Ōshio Heihachirō, #italic Excerpts from Manifesto#!"
tenpo_events.2.a: "Drum up the militia and nail this traitor to a cross."
tenpo_events.2.b: "A desperate, yet righteous act."
tenpo_events.2.c: "The rebels overwhelm the local garrison and seize [SCOPE.sState('osaka_scope').GetCityHubName]."
tenpo_events.2.tt_1: "[SCOPE.sCharacter('oshio_scope').GetFullName] evades capture and commits suicide by immolation." 
tenpo_events.2.tt_2: "[SCOPE.sCharacter('oshio_scope').GetFullName] is tortured, salted, and crucified by the authorities."
tenpo_events.2.tt_3: "Local militias #b put down the rebellion#! before it can spread further."
tenpo_events.2.tt_4: "The [concept_agitator] [SCOPE.sCharacter('oshio_scope').GetFullName] is given a light, symbolic sentence, and allowed to continue his work."
modifier_osaka_burning: "Critique Signed in Blood"
modifier_controversial_pardon: "Controversial Pardon"

tenpo_events.3.t: "Mandatory Reforms"
tenpo_events.3.d: "Pleased with the pace of reforms, the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has congratulated the presiding councilors on their progress—believing the [ROOT.GetCountry.GetAdjective] nation to be able to overcome any coming challenge, be it foreign or domestic."
tenpo_events.3.f: ""Twelve, sire.", the chief councilor said, setting the brush aside on the table. "And the reports from Kinai show much of the same, our reforms appear to take root."\n\nFrom the dais, the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] gave a curt nod. "Very well. I want the court informed in due course. Now, regarding the report from the Nagasaki magistrate...""
tenpo_events.3.a: "May this mark the end of [ROOT.GetCountry.GetAdjective] moral and political decay."
tenpo_events.3.b: "From peasant to samurai, are we not all subjects of the Emperor?"
tenpo_events.3.c: "The stability of the realm is paramount."
tenpo_outcome_hardliner_tt: "We have completed more #b Hardliner#! than #b Reformer#! agendas"
tenpo_outcome_reformer_tt: "We have completed more #b Reformer#! than #b Hardliner#! agendas"
tenpo_outcome_balanced_tt: "We have completed an equal amount of #b Hardliner#! and #b Reformer#! agendas"

tenpo_events.4.t: "Action and Inaction"
tenpo_events.4.d: "Unimpressed with the results of the reform program, and facing growing public dissatisfaction with the chief councilors, the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has dismissed [SCOPE.sCharacter('roju_scope').GetFullName] from his post."
tenpo_events.4.f: "Exile. The former councilor tasted the word, and did not much like it. Though perhaps it was preferable to staying in Edo given the events of yesterday. His remaining attendants were still clearing the pond and courtyard of thrown tiles and stones, and some of the threats he heard uttered that day could never be unheard.\n\nHe tasted the word again, and found it somewhat less repulsive. Besides, he thought, he had always desired to see Mount Gassan in the flesh."
tenpo_events.4.a: "I never want to see this fool again in my life."
tenpo_events.4.b: "Reverse his every decision, and make sure the public know it."
tenpo_events.4.tt_1: "[SCOPE.sCharacter('roju_scope').GetFullName] is #r demoted#! and internally exiled to the province of #b Dewa#!"
modifier_tenpo_fail: "Tenpo Reforms Cut Short"
tenpo_events_4_demotion_tt: "The [concept_leader] of an [concept_interest_group] [concept_in_government] is demoted and internally exiled" # tooltip for event_outcome_failed_effect_desc in je_tenpo_crisis

tenpo_events.5.t: "Land-Holders Resist Centralization"
tenpo_events.5.d: "Our move to confiscate the land in [SCOPE.sState('kanto_scope').GetName] and [SCOPE.sState('kansai_scope').GetName] has been met with widespread opposition from the local land-holders. The loudest complaints come from those whose lands were granted as reward for military service."
tenpo_events.5.f: ""Military merit awarded my ancestor the land I now hold in my name. Since Sekigahara, each generation tilled the land—increasing its yield and rendering unto our masters their due, ever without complaint.\n\nDoes such service warrant the treatment we are now afforded? Is relocation without due recompense to be our reward?""
tenpo_events.5.a: "Cancel the centralization before this gets out of hand."
tenpo_events.5.b: "Offer those relocated additional land as compensation."
tenpo_events.5.c: "Remind them that this is the will of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"
modifier_heavy_handed_land_confiscations: "Heavy-Handed Land Confiscations"
modifier_promotions_and_koku_redistribution: "Promotions and Koku Redistribution"
modifier_reckless_roju: "Reckless Rōjū"
modifier_will_of_the_shogun: "In the Name of the Shogun"

tenpo_events.6.t: "Lion in the Dragon's Den"
tenpo_events.6.d: "The victory of [SCOPE.sCountry('britain_scope').GetName] against the [SCOPE.sCountry('china_scope').GetAdjective] has greatly shaken our nation. Chinese junks and armies were easily routed by superior [SCOPE.sCountry('britain_scope').GetAdjectiveNoFormatting] forces, and many are now questioning the ability of [ROOT.GetCountry.GetName] to resist a similar assault."
tenpo_events.6.f: ""From Ganlu Temple in the west, to the Jinshan Temple in the east, the lands around Zhenjiang were full of black and white barbarians—like pieces scattered across a go board—and the locals wondered if they would ever go away."\n\n—Mineta Fūkō, #italic New Stories from Overseas#!"
tenpo_events.6.a: "Heaven protect us, for our samurai may not."
tenpo_events.6.b: "Censor any negative reports from China."
tenpo_events.6.c: "We are the cliff against which the barbarian waves will crash."
modifier_opium_war_aftermath: "Barbarians at the Gates"
modifier_defenses_strengthened: "Coastal Garrisons Strengthened"

tenpo_events.7.t: "The Takashima School"
tenpo_events.7.d: "Fearing for Japan's future in the aftermath of the Opium War, the Nagasaki magistrate [SCOPE.sCharacter('takashima_scope').GetFullName] has organized a modern Dutch-model military unit, and urges the rest of the country to follow suit."
tenpo_events.7.f: ""His men's gun hats resemble strange crowns, and their orders are barked in the harsh language of the Hollanders. Yet their formations are well-drilled and organized, and are able to deliver volleys nearly twice as fast as my own retainers, even if their accuracy is somewhat lesser."\n\n"And of the artillery?"\n\n"Unparalleled. I fear that the longer we wait with adopting it, the lower our chances of repelling a barbarian assault will be.""
tenpo_events.7.a: "Authorize the adoption of barbarian arms and techniques."
tenpo_events.7.b: "Favor the traditional musketry houses instead."
modifier_inoue_tatsuke_primacy: "Inoue-Tatsuke Primacy"
modifier_favouring_traditional_musketry_houses: "Favoring Traditional Musketry Houses"
modifier_favouring_takashima: "Musketry Houses Sidelined"
modifier_takashima_school: "Promoting the Takashima School"

tenpo_events.8.t: "For a Bowl of Rice"
tenpo_events.8.d: "Accusations of rice-hoarding and price-gouging has caused tensions between farmers and merchants in [SCOPE.sState('tenpo_unrest_state_scope').GetName] to boil over. With the peasants' ranks swelled by brigands and beggars, local authorities now face a province-wide rebellion."
tenpo_events.8.f: "He had been one of the first. Those merry few who had attacked the wicked merchant's home and distributed his ill-gained goods to the masses. But as his eyes wandered around the campfire, he realized how few of them were left. Eikichi and Matsuzō remained still, though they resembled little the men he once knew, beaming with righteous fury. Fukumatsu had lost his life on the second day, followed by Takeshichi on the seventh. The rest had scattered like leaves as the magistrate's men pursued them.\n\nThe character of the men who had replaced them filled him with shame and despair, but he saw no other way. For even poor company such as theirs seemed divine when compared to the executioner's saw."
tenpo_events.8.a: "Dispatch men to crush these villains."
tenpo_events.8.b: "Let the unrest die out on its own."
tenpo_events.8.c: "Ply local village headsmen to help quell the unrest."
modifier_consulted_headsmen: "Village Concessions"
modifier_lingering_brigandry: "Lingering Brigandry"
modifier_brutal_anti_bandit_campaigns: "Brutal Anti-Bandit Campaigns"

je_taming_the_north: "Taming the North"
je_taming_the_north_reason: "With the formation of the #b [SCOPE.sState('hokkaido_state_scope').GetName] Development Commission#!, commonly known as the #b Kaitakushi#!, this former frontier is abuzz with activity. Every day new men and women arrive from the south, seeking new lands and opportunities.\n\nYet this is no ordinary rush of peoples. For with the settlers come bureaucrats, intellectuals, and modernizing visionaries with a mission to shape the land—eager to see their vision of [ROOT.GetCountry.GetName]'s future manifested in the [SCOPE.sState('hokkaido_state_scope').GetName] of today."
taming_the_north_agriculture_potentials_goal_tt: "We have used the #b $button_je_taming_the_north_agriculture_potentials$#! action #v 3#! times"
taming_the_north_agriculture_arable_goal_tt: "We have used the #b $button_je_taming_the_north_agriculture_arable_land$#! action #v 3#! times"
taming_the_north_colonies_goal_tt: "We have used the #b $button_je_taming_the_north_establish_colonies$#! action"
je_taming_the_north_additional_goal_pre: "If we own all of #b $STATE_SAKHALIN$#! the #b $modifier_tamed_north$#! [concept_timed_modifier] will also apply to $STATE_SAKHALIN$ [concept_state_region]:"
je_taming_the_north_additional_goal: "If we own all of [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName] the #b $modifier_tamed_north$#! [concept_timed_modifier] will also apply to [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]:"
je_taming_the_north_additional_goal_completed: "Since we own all of [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName] the #b $modifier_tamed_north$#! [concept_timed_modifier] will also apply to [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]:"

modifier_tamed_north: "The Model Colony"
modifier_northern_learnings: "Kaitakushi Learnings"

button_je_taming_the_north_establish_colonies: "Establish State-Sponsored Colonies"
button_je_taming_the_north_establish_colonies_desc: "A colony without sufficient colonists is doomed to fail. We should consider incentives to help attract families from across [ROOT.GetCountry.GetName] to settle in the north."

button_je_taming_the_north_integrate_ainu: "Implement Ainu Legal Protections"
button_je_taming_the_north_integrate_ainu_desc: "Until now, the Commission's stance of the [GetCulture('ainu').GetName] has been one of forceful integration and cultural erasure. However, our incremental moves towards a more equitable relationship with the [GetCulture('ainu').GetNameNoFormatting] inhabitants of the North has resulted in a warming of relations between our two peoples.\n\nA proposal has thus been forwarded to the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] to legally enshrine the [GetCulture('ainu').GetNameNoFormatting] as a protected brotherly people under [ROOT.GetCountry.GetAdjective] law, equal in both rights and duties to the [GetCulture('japanese').GetName]."
ainu_frenship_tt: "We have consistently furthered the interests of the [GetCulture('ainu').GetName] in #b events#!"

button_je_taming_the_north_sapporo_agricultural_college: "Found the Sapporo Agricultural College"
button_je_taming_the_north_sapporo_agricultural_college_desc: "The north is the perfect arena to test out the latest theories in the fields of agriculture and land-management. We shall found a cutting-edge agricultural college staffed by skilled foreigners to serve as the nucleus for our scientific transformation of the land."
sapporo_partner_positive_catalyst_tt: "A #g positive#! [concept_diplomatic_catalyst] will be triggered with a random country meeting the requirements"

button_je_taming_the_north_agriculture_potentials: "Introduce New Crops"
button_je_taming_the_north_agriculture_potentials_desc: "The available acreage on the island may be of utmost importance, but true economic development will only take place if we also grow the right crops.\n\nNew developments within the field of agriculture—spearheaded by the #b Sapporo Agricultural College#!—enable us to introduce crops to this frigid frontier that were hitherto thought impossible.\n\nAvailable Options:\n• #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_opimizing_existing_variants_tt $modifier_opimizing_existing_variants$#! (scaling)\n• [GetBuildingType('building_rice_farm').GetName]\n• [GetBuildingType('building_dye_plantation').GetName]\n• [GetBuildingType('building_opium_plantation').GetName]\n• [GetBuildingType('building_vineyard').GetName]"
established_sapporo_college_tt: "We have established the #b Sapporo Agricultural College#!"
hokkaido_agriculture_potentials_tt: "This decision can be taken a total of #v 3#! times. (currently [ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_potentials_counter_var').GetValue|v0])"
modifier_opimizing_existing_variants_tt: "[GetStaticModifier('modifier_opimizing_existing_variants').GetName|v]\n[GetStaticModifier('modifier_opimizing_existing_variants').GetDesc]"

button_je_taming_the_north_agriculture_arable_land: "Continue Land Reclamation"
button_je_taming_the_north_agriculture_arable_land_desc: "Whilst these vast lands are agriculturally underdeveloped, they hold great potential. The great mountain ranges—from which abundant water flows—offer ample opportunities for extending the acreage northwards.\n\nWe shall drain the wetlands, irrigate the fields, and tame the land as a testament to the unbreakable [GetCulture('japanese').GetName] spirit."
hokkaido_agriculture_arable_tt: "This decision can be taken a total of #v 3#! times. (currently [ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_arable_counter_var').GetValue|v0])"

hokkaido_events.1.t: "The Eighth Circuit"
hokkaido_events.1.d: "With the incorporation of [SCOPE.sState('hokkaido_scope').GetName]—or the Ainu-lands—into Japan proper, a new name must be chosen to reflect the new status of this land. The newly established Development Commission has presented a number of proposals to be reviewed by the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
hokkaido_events.1.f: ""A land of savages is what it is. Of swamps and mud. Of impoverished fishermen and flesh eaters. Whatever are you hoping to get in that godforsaken land that [ROOT.GetCountry.GetCapital.GetCityHubName] cannot already grant you?"\n\n"Purpose, mother. And something to make my own.""
hokkaido_events.1.a: "Its name shall be #tooltippable;tooltip:hokkaido_events.1_tt_3 #b Hokkai-dō#!#!: The North Sea Circuit." # 北加伊道
hokkaido_events.1.b: "#tooltippable;tooltip:hokkaido_events.1_tt_2 #b Hokkai-dō#!#!, in honor of the inhabitants of this land." # 北海道
hokkaido_events.1.c: "#tooltippable;tooltip:hokkaido_events.1_tt_4 #b Kaitō-dō#!#!, the Sea-Island Circuit, is clearly the better option."
hokkaido_events.1.e: "#tooltippable;tooltip:hokkaido_events.1_tt_5 #b Hitakami-dō#!#! has a certain literary ring to it."
hokkaido_events.1.tt_1: "The town of #b Sapporo#! is founded and made the island's new administrative capital, replacing #b Hakodate#!"
modifier_ainu_heritage_aknowleged: "Land of the Kai"
modifier_breaking_new_ground: "Breaking New Ground"
modifier_hokkaido_naval_connections: "The Seabound Circuit"
modifier_call_of_the_frontier: "Call of the Frontier"
the_ainu_will_appreciate_this_tt: "@information! The [GetCulture('ainu').GetName] will remember this"
hokkaido_events.1_tt_2: "#b The Northern Kai Circuit#!\nIn the words of the commission-member Matsuura Takeshirō, #italic kai#! (加伊) is understood to be an old Ainu endonym for their people."
hokkaido_events.1_tt_3: "#b The North Sea Circuit#!\nA government counter to Matsuura Takeshirō's original proposal. Here the characters for #italic kai#! (加伊) are replaced with the identically sounding character #italic kai#! (海), meaning 'sea'.\n\n@information! This is the proposal that was selected historically."
hokkaido_events.1_tt_4: "#b The Sea Island Circuit#!\nBeyond all else, the island is defined by its relationship with the sea—a fact that should be represented in its new name."
hokkaido_events.1_tt_5: "#b The Sunrise Land Circuit#!\nAn archaic Yamato-era name for the northeastern frontier lands. Choosing this option roots the new colony firmly in Japan's ancient past."

hokkaido_events.2.t: "The New Frontier"
hokkaido_events.2.d: "The question of how to best settle the region has preoccupied the minds of the [SCOPE.sState('hokkaido_state_scope').GetName] Development Commission for some time now. Impatient administrators now demand we reach a final decision."
hokkaido_events.2.f: "Growing up, his father often talked of their ancestors. Of the proud and noble warriors of the warring states period. Of their austere dignity and their great feats of war. The stories had captivated him as a child, but now that he was older they filled him with nothing but melancholy. The irony of his father, a paper-pushing, urbanite drunkard that had only carried a sword for the dignity it afforded him, extolling the virtues of the past was too much to bear.\n\nSo when his father asked him to assist in the administration of the business, he turned him down with contempt, and immediately set off for the north. Maybe there would he find salvation for his line?"
hokkaido_events.2.a: "Prioritize settlement by soldier-settler colonists."
hokkaido_events.2.b: "The simple peasant is the backbone of [ROOT.GetCountry.GetName]."
hokkaido_events.2.c: "Restrict most [GetCulture('japanese').GetName] settlements to areas unused by the [GetCulture('ainu').GetName]."
modifier_tondenhei_settlements: "Tondenhei Settlements"
modifier_peasant_settlements: "Peasant Settlements"
modifier_restricted_settlements: "Ainu Heartlands Preserved"
hokkaido_events.2.tt_1: "#v 1.5%#! of all [GetCulture('japanese').GetName] [Concept('concept_pop', '$concept_pops$')] from the [concept_capital_state] will relocate to [SCOPE.sState('hokkaido_state_scope').GetName]"
hokkaido_events.2.tt_2: "#v 3%#! of all [GetCulture('japanese').GetName] [Concept('concept_pop', '$concept_pops$')] in [SCOPE.sState('hokkaido_migration_origin_scope').GetName] (one of the [Concept('concept_state', '$concept_states$')] with the lowest [Concept('concept_gdp','$concept_gdp_short$')] in the [GetGeographicRegion('geographic_region_home_islands').GetName]) will relocate to [SCOPE.sState('hokkaido_state_scope').GetName]"
modifier_old_swords_in_new_lands: "Old Swords in New Lands"
modifier_go_north_young_man: "Go North, Young Man"

hokkaido_events.3.t: "Seeds of Progress"
hokkaido_events.3.d: "Recent breakthroughs at the Sapporo Agricultural College have prompted proposals to introduce new crops to the fields of [SCOPE.sState('hokkaido_state_scope').GetName]."
hokkaido_events.3.f: "#b Personal Lab Log, 154#!\nGrafts of western varieties now abandoned in favor of southern ones due to latest test results. The boys claim cultivation limit is expected to be pushed considerably northwards, perhaps even past Kamikawa. Further studies needed to assess yield potential, but feeling optimistic. Requested meeting with faculty head tomorrow. Need to buy new tie."
hokkaido_events.3.a: "Focus our efforts on improving the crops already present."
hokkaido_events.3.b: "Develop cold-resistant varieties to allow for local [GetBuildingType('building_rice_farm').GetName]."
hokkaido_events.3.c: "The lowlands are well suited for Indigo [GetBuildingType('building_dye_plantation').GetName]."
hokkaido_events.3.e: "The poppy takes well here, [GetBuildingType('building_opium_plantation').GetName] are the future."
hokkaido_events.3.g: "Set up [GetBuildingType('building_vineyard').GetName] using specialized grape strains."
button_je_taming_the_north_complete: "We have developed the land as much as our technology allows us"
modifier_introducing_new_crops: "Introducing New Crops"
modifier_opimizing_existing_variants: "Cold-Optimized Crop Variants"

hokkaido_events.4.t: "Growth of the Soil" # Markens Grøde really does sound better in Norwegian
hokkaido_events.4.d: "The [SCOPE.sState('hokkaido_state_scope').GetName] Development Commission has reached another important milestone, with vast tracts of former wetlands converted to valuable agricultural land."
hokkaido_events.4.f: "It was impressive, really. A decade ago the largest vessel capable of safely navigating the river in front of him would have been a small rowboat. Now he was watching a group of workers unload crates and burlap sacks from a massive steam pram billowing smoke into the crisp mountain air above. Material for the next lock perhaps? Or for the drainage project further upstream? Or just supplies from the new village in the valley beyond? He couldn't say, and in truth it mattered not, for whatever it carried, it was carrying the future."
hokkaido_events.4.a: "With each swing of the hoe, we mould this land."
hokkaido_events.4.b: "And with each new home, we grow it."
hokkaido_events.4.tt_1: "#v 2%#! of all [GetCulture('japanese').GetName] [Concept('concept_pop', '$concept_pops$')] in [SCOPE.sState('hokkaido_migration_origin_scope').GetName] (one of the [Concept('concept_state', '$concept_states$')] with the lowest [Concept('concept_gdp','$concept_gdp_short$')] in the [GetGeographicRegion('geographic_region_home_islands').GetName]) will relocate to [SCOPE.sState('hokkaido_state_scope').GetName]"
modifier_immigration_burst: "Immigration Wave"
modifier_open_to_business: "Open for Business"

hokkaido_events.5.t: "Boys, Be Ambitious..."
hokkaido_events.5.d: "With the graduation of the first class of the [SCOPE.sCountry('sapporo_partner_country_scope').GetAdjective]-staffed Sapporo Agricultural College, the alumni are eager to put their newfound skills into action. Meanwhile, the college board deliberates the institute's future direction and focus."
hokkaido_events.5.f: ""... be ambitious not for money, not for selfish aggrandizement, not for the evanescent thing which men call fame. Be ambitious for the attainment of all that a man can be."\n\n—William Smith Clark, "Farewell Speech of the President of the Sapporo Agricultural College""
hokkaido_events.5.a: "An agricultural college should primarily focus on agriculture."
hokkaido_events.5.b: "We should prioritize expanding the engineering faculty."
hokkaido_events.5.c: "Establish a faculty of humanities and start local cultural studies."
hokkaido_events.5.tt_1: "The influence of the [SCOPE.sCountry('sapporo_partner_country_scope').GetAdjective] staff in #b Sapporo#! leads to the creation of a local [GetCulture('japanese').GetName] [SCOPE.sReligion('sapporo_partner_religion_scope').GetName] community"
hokkaido_events.5.tt_2: "Unlocks #b $button_je_taming_the_north_agriculture_potentials$#! and #b $button_je_taming_the_north_agriculture_arable_land$#! in the #b $je_taming_the_north$#! [concept_journal_entry]"
modifier_sapporo_expanded_agricultural_faculty: "Innovative Agricultural Methods"
modifier_sapporo_expanded_engineering_faculty: "Cutting-Edge Engineering Faculty"
modifier_sapporo_humanities_faculty: "Sapporo Cultural Studies Group"
	
hokkaido_events.6.t: "Ainu Mosir, Sisam Mosir"
hokkaido_events.6.d: "In an atmosphere of some domestic controversy, [ROOT.GetCountry.GetCapital.GetCityHubName] has issued a new decree on the legal status of [SCOPE.sState('hokkaido_state_scope').GetName], formally delineating an Ainu homeland and establishing limited institutions to exist in parallel with the official [ROOT.GetCountry.GetAdjective] bureaucratic apparatus."
hokkaido_events.6.f: ""Hinna! Hinna!" With a near-toothless grin, the old Ainu crone extended the bowl of soup to him. He looked at the assortment of game it contained, and thanked the heavens his parents were not here to judge him.\n\n"The things I do for peace" he muttered to himself, accepting the dish with a forced smile."
hokkaido_events.6.a: ""This land is large enough for both.""
modifier_opposes_ainu_rights: "Barbarian Concessions"
modifier_supports_ainu_rights: "Ainu Rights Enshrined"

hokkaido_events.7.t: "The Commission's Final Act"
hokkaido_events.7.d: "Formally announcing the success of their government-mandated mission, the [SCOPE.sState('hokkaido_state_scope').GetName] Development Commission has elected to transfer its remaining responsibilities to the state."
hokkaido_events.7.f: "#b Proclamation No. 8#!\nThe [SCOPE.sState('hokkaido_state_scope').GetNameNoFormatting] Development Commission is hereby abolished and the three prefectures of Hakodate, Sapporo, and Nemuro are established. The boundaries of their respective jurisdictions shall be promulgated at a later date."
hokkaido_events.7.a: "A shining example for future colonial endeavours..."
hokkaido_events.7.b: "...and for the [GetGeographicRegion('geographic_region_home_islands').GetName], for that matter."
modifier_external_applications: "Kaitakushi: External Applications"
modifier_domestic_applications: "Kaitakushi: Domestic Applications"

hokkaido_events.8.t: "Commission Without a Cause"
hokkaido_events.8.d: "The loss of [SCOPE.sStateRegion('hokkaido_state_region_scope').GetName] has forced the Development Commission to dissolve without having completed its mission. In response, outraged citizens have taken to the streets of [ROOT.GetCountry.GetName], protesting both the loss of national prestige and of their personal investments."
hokkaido_events.8.f: "Exhausted, the administrator emeritus slumped down into his office chair and poured himself a generous cup of sake. Emptying the cup in one go, he let his eyes rest on the maps laid out in front of him on the table. Full with scribbles, notes, and marks, each denoting a separate scheme he had poured his life energy into. Now neither scheme nor energy remained, and the implied optimism in each note carried a mocking tone.\n\nTo hell with it all, he thought, and poured himself another cup."
hokkaido_events.8.a: "Regrettably, this outcome is outside the government's control."
modifier_lost_northern_investments: "Lost Northern Investments"
