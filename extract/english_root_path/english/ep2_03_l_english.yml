l_english:

#Japan Single-Fire Events

japan_events.31.t: "Theatre in [SCOPE.sState('kabuki_theatre_state').GetCityHubName] Burns Down"
japan_events.31.d: "A fire has burned down a popular kabuki theatre in [SCOPE.sState('kabuki_theatre_state').GetName]. While the theatre troupe makes plans to rebuild, [SCOPE.gsInterestGroup('relevant_ig').GetName] members—especially [SCOPE.sCharacter('relevant_leader').GetFullName]—see this as an opportunity to regulate entertainment in [SCOPE.sState('kabuki_theatre_state').GetCityHubName] and force the performers to rebuild their theatre outside of city limits."
japan_events.31.f: "Atop the platform of a fire lookout tower there is a restless watchman who diligently keeps an eye over [SCOPE.sState('kabuki_theatre_state').GetCityHubName]. Late in the evening, he spots the telltale signs of a fire from his vantage point. As smoke billows and the acrid scent of fire fills the air, he rushes to ring the alarm bell.\n\nUnsuspecting townsfolk are alerted of the danger and fire brigades launch into action climbing roofs to control the flames. When the fires are extinguished, it is apparent much damage is already done. All that remains of one prominent kabuki theatre are cinders and ashes in the wake of this destructive blaze."
japan_events.31.a: "They must rebuild outside of city limits."
japan_events.31.b: "Allow the theatre troupe to rebuild."

modifier_kabuki_regulated: "Kabuki Theatre Crackdown"
modifier_theatre_affronted_official: "Affronted Official"
modifier_shogunate_opposition_ig_approval: "Opportunistic Opposition"

japan_events.32.t: "Pictures of the Floating World"
japan_events.32.d: "The work of a prolific ukiyo-e artist in [SCOPE.sState('ukiyo_e_state').GetCityHubName] has inspired the imagination of artists both in [ROOT.GetCountry.GetName] and abroad."
japan_events.32.f: "A popular woodblock print depicts the lively theatre district in the outskirts of [SCOPE.sState('ukiyo_e_state').GetCityHubName]. Silver moonlight shines down on the main street filled with people where their silhouettes cast shadows. The east side of the street is lined with teahouses and puppet theatres. Opposite, to the west, are three kabuki theatres with a drum tower above each.\n\n"Only a master hand could make strokes so firm and true and so delicately shaded just where the shading should come. And only a master mind could conceive a figure so rhythmically organized throughout, so strong and at the same time so exquisitely dainty."\n— F.W.G., #italic Bulletin of the Art Institute of Chicago#!"
japan_events.32.a: "No doubt [ROOT.GetCountry.GetAdjectiveNoFormatting] art will continue to gain global prominence."
japan_events.32.b: "Excellent. Encourage the production for more of these works."

modifier_ukiyo_e_prestige: "Prolific Woodblock Prints"
modifier_ukiyo_e_production: "Woodblock Print Production"

japan_events.33.t: "Wrestling with Tradition"
japan_events.33.d: "The effect of Westernization on [ROOT.GetCountry.GetAdjectiveNoFormatting] culture is significant. As customs rapidly change, [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('relevant_character').GetFullName] is sponsoring a Sumo wrestling tournament in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] to combat public antagonism of the tradition."
japan_events.33.f: "Crowds begin to gather at the newly constructed Sumo Hall on temple grounds, filled with curiosity about this event that has the [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]'s endorsement. Among those present are some aristocrats and statesmen whose fixation with Western culture has left them skeptical of maintaining ties to this tradition. While the golden age of Sumo has long passed, [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting]'s attendance may re-establish the cultural importance of the sport in the eyes of the people."
japan_events.33.a: "The [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]'s efforts will restore the public image of the sport."
japan_events.33.b: "The tradition of this [ROOT.GetCountry.GetAdjectiveNoFormatting] sport will have great longevity."

modifier_restored_sumo_popularity: "Restored Sumo Popularity"
modifier_traditional_sports_movement_support: "National Sport"

japan_events.34.t: "Whaling Disaster in [SCOPE.sState('whaling_state').GetPortHubName]"
japan_events.34.d: "A boat sailing off the coast of [SCOPE.sState('whaling_state').GetName] has spotted two right whales—a mother and a calf. Driven by desperation after a season of poor catches, a whaling group has ventured out to sea despite bad weather conditions. More than 100 people have been reported missing."
japan_events.34.f: "The bonfire on the boat has long disappeared out of view and the fleet can no longer be seen from ground causing great commotion in [SCOPE.sState('whaling_state').GetPortHubName].\n\n"No matter how dire times have been, we have always avoided whaling a mother and her calf," one man argues. "We should have let the whales go."\n\n"Nonsense," his cousin replies. "The whales are a blessing. I'm sure the expedition will return soon with a bountiful catch.""
japan_events.34.a: "$bg_whaling$ is a crucial industry in [SCOPE.sState('whaling_state').GetNameNoFormatting]."
japan_events.34.b: "Focus our future efforts on $bg_fishing$ in [SCOPE.sState('whaling_state').GetNameNoFormatting] instead."

modifier_whaling_deaths: "Whaling Casualties"
modifier_redouble_on_whaling: "Future in Whaling"
modifier_fishing_not_whaling: "Future in Fishing"

japan_events.35.t: "Anti-Arson Measures"
japan_events.35.d: "The [SCOPE.gsInterestGroup('relevant_ig').GetName] have been concerned that the frequency of arson cases within the city limits of [SCOPE.sState('relevant_state').GetCityHubName] has driven up prices of [SCOPE.sGoods('expensive_good').GetName] in [ROOT.GetCountry.GetName]. They have argued that doubling down on strict anti-arson measures is necessary."
japan_events.35.f: "The alarm bell rings out from the fire lookout tower alerting all to the imminent danger where another fire in [SCOPE.sState('relevant_state').GetCityHubName] has set residences and businesses aflame. As the fire brigades arrive to extinguish the blaze, $strata_commoners_townspeople$ gather in a large crowd in the street. Some regard their neighbors with suspicion and others begin to speculate whether this was an accident or if an arsonist is to blame. One thing is for certain, the prices for [SCOPE.sGoods('expensive_good').GetNameNoFormatting] will soon be multiplying."
japan_events.35.a: "Strict measures are warranted. Execute suspected arsonists."
japan_events.35.b: "Pardon outstanding crimes of those who aid in arrests."

modifier_arson_measure_strict_ig: "Strict Arson Measures"
modifier_arson_measure_strict_pop: "Arsonist Executions"
modifier_arson_measure_lenient_ig: "Lenient Arson Measures"


# Colonization of Korea Content
je_colonize_korea: "The Government of Chōsen"
je_colonize_korea_reason: "#italic "Industry and commerce will see marked development under good governance and peace. We are absolutely certain that peace in East Asia will as a result have stronger foundations than ever before."\n— Record of the Emperor Meiji, Volume 12#!\n\nThe time has come to establish a permanent presence in the Korean Peninsula. Only then can we ensure the future prosperity and safety of [JournalEntry.GetCountry.GetName] and all of [GetGeographicRegion('geographic_region_east_asia').GetName]. In order to properly secure control, we must oversee the development of [GetGeographicRegion('geographic_region_korea').GetName] and not waver in our ambition."
je_colonize_korea_is_owned_by_tt: "Is owned by [JournalEntry.GetCountry.GetName]"
je_colonize_korea_culture_percent_seoul_tt: "The [GetCulture('japanese').GetName] [Concept('concept_pop','$concept_population$')|l] of $STATE_SEOUL$ is greater than or equal to #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
je_colonize_korea_culture_percent_busan_tt: "The [GetCulture('japanese').GetName] [Concept('concept_pop','$concept_population$')|l] of $STATE_BUSAN$ is greater than or equal to #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
