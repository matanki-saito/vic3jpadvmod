korea_colonization.2.t: "A Promising Future"
korea_colonization.2.d: "The world now knows that [GetGeographicRegion('geographic_region_korea').GetName] is part of [ROOT.GetCountry.GetName] and firmly under our country's total control. By establishing our presence in the peninsula, our success further demonstrates the prominence of our place on the world stage."
korea_colonization.2.f: "With the vision of unification between nations now realized, the ambition of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] grows. From [ROOT.GetCountry.GetRuler.GetHerHis] seat in [ROOT.GetCountry.GetCapital.GetCityHubName] [ROOT.GetCountry.GetRuler.GetSheHe] composes tanka poetry reflecting on the success of this endeavor and pleased with the developments in the peninsula.\n\nAt the same moment, out in $STATE_SEOUL$, a [GetCulture('korean').GetNameNoFormatting] bureaucrat suppresses public outcry from civilians who object to the new social order. Speaking to them with great equanimity, he insists this union will ensure the prosperity of all."
korea_colonization.2.a: "The future prosperity and safety of the peninsula looks bright."
korea_colonization.2.b: "Business has been integral to our agenda."
modifier_peninsula_control_prestige_authority: "Peninsula Prestige"
modifier_peninsula_control_assimilation_migration: "Accelerated Assimilation"
modifier_peninsula_control_loyal_prominence: "Outstanding Oversight"
modifier_peninsula_control_company_bonus: "Company Commendation"

korea_colonization.3.t: "A Lost Opportunity"
korea_colonization.3.d: "[GetGeographicRegion('geographic_region_korea').GetName] is no longer under our control. The economic and diplomatic impact will be felt in [ROOT.GetCountry.GetName] for years to come."
korea_colonization.3.f: "[ROOT.GetCountry.GetAdjectiveNoFormatting] officials gather, feelings of frustration and displeasure abound, to discuss the government's failure to maintain order in the peninsula. Many refuse any compromise on how to move forward from this blow to the considerable power [ROOT.GetCountry.GetNameNoFormatting] has amassed in recent years.\n\nA gentleman rises to speak over the din of discussion: "Surely [SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting] can take responsibility for this setback.""
korea_colonization.3.a: "We must all shoulder the burden of the failure of our endeavor."
korea_colonization.3.b: "[SCOPE.sCharacter('relevant_ig_leader').GetFullName] and [SCOPE.gsInterestGroup('relevant_ig').GetName] must take responsibility for this failure."
modifier_peninsula_control_prestige_loss: "Dwindling Control"
modifier_peninsula_control_loyal_prominence_loss: "Prominence Depletion"
modifier_peninsula_control_approval_pol_str_loss: "Ebbing Influence"

