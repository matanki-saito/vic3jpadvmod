l_english:
## Interest Tier Types
 interest_tier_none: "None"
 interest_tier_none_desc: "At this $concept_interest_tier_short$, a [concept_country] is either completely or only marginally involved in a [concept_strategic_region] and it has no effects on either the $concept_country$ or the $concept_strategic_region$."
 interest_tier_observant: "Observant"
 interest_tier_observant_desc: "At this $concept_interest_tier_short$, first steps have been taken to establish a diplomatic presence in the [concept_strategic_region], navy vessels may be patrolling the coasts or envoys might be exchanged with [Concept('concept_local_country', '$concept_local_countries$')]."
 interest_tier_engaged: "Engaged"
 interest_tier_engaged_desc: "At this $concept_interest_tier_short$, a [concept_country] is starting to get involved in a local affairs, signing [Concept('concept_treaty', '$concept_treaties$')] and establishing a more permanent presence."
 interest_tier_influential: "Influential"
 interest_tier_influential_desc: "At this $concept_interest_tier_short$, a presence has been fully established in a [concept_strategic_region], [Concept('concept_country', '$concept_countries$')] are striking long-term deals and staking their claims.\n\n@information! $concept_countries$ with their [Concept('concept_capital_state', '$concept_capital_state_short$')] in this $concept_strategic_region$ may never drop below this $concept_interest_tier_short$."
 interest_tier_pervasive: "Pervasive"
 interest_tier_pervasive_desc: "At this $concept_interest_tier_short$, a [concept_country] has established significant control over a [concept_strategic_region]. [Concept('concept_great_power', '$concept_great_powers$')] and [Concept('concept_local_country', '$concept_local_country_short$')] powers fight for dominance as power is consolidated."
 interest_tier_hegemonic: "Hegemonic"
 interest_tier_hegemonic_desc: "At this $concept_interest_tier_short$, a [concept_country] has firmly established itself as the undisputed power broker in the [concept_strategic_region]. Other nations, #italic if they exist#!, will have to subordinate themselves or deal with the Hegemon to earn their guarantee to not meddle in local affairs."


## Interface
 INTEREST_TIER_TYPE_BOUNDS_DESC: "Applies between [InterestTierType.GetLowerBound|v] and [InterestTierType.GetUpperBound|v] [concept_involvement]"
 INTEREST_TIER_TYPE_NO_EFFECT: "#italic No effect#!"

 INTEREST_TIER_ACTIVE: "#i #b Current Tier#!#! for [Country.GetName][ConcatIfNeitherEmpty(' ', AddLocalizationIf(Country.IsLocalPlayer, 'YOU'))]"
 INTEREST_TIER_ACTIVE_TOOLTIP: "#header [InterestTierType.GetName]#! $INTEREST_TIER_ACTIVE$\n$INTEREST_TIER_BOUNDS_DESC$\n[SelectLocalization(EqualTo_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_CURRENT_INVOLVEMENT_DESC', 'INTEREST_TIER_TARGET_INVOLVEMENT_DESC')]\n$TOOLTIP_DELIMITER$\n$INTEREST_TIER_EFFECTS_AND_BREAKDOWN$"
 INTEREST_TIER_INACTIVE_TOOLTIP: "#header [InterestTierType.GetName]#!\n$INTEREST_TIER_BOUNDS_DESC$\n$TOOLTIP_DELIMITER$\n#title Effects:#!#indent_newline:3 \n[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)]#!"
 INTEREST_TIER_EFFECTS_AND_BREAKDOWN: "#title Effects:#!#indent_newline:3 [ConcatIfNeitherEmpty('\n', InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', AddLocalizationIf(And(And3(StringIsEmpty(InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetStateModifier.GetDesc)), StringIsEmpty(InterestTierType.GetTradeAdvantageDesc)), 'INTEREST_TIER_NO_EFFECT'))]#!\n\n#title #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! [concept_involvement] is due to:#!#indent_newline:3 \n[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]#!\n $INTEREST_TIER_ACTIVE$: #i #b (Currently Active)#!#!"
 INTEREST_TIER_PREDICTED: "#i #b (Predicted)#!#!"
 INTEREST_TIER_BOUNDS_DESC: "Applies between [InterestTierType.GetLowerBound|v0] and [InterestTierType.GetUpperBound|v0] [concept_involvement]"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC: "#v [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! [concept_involvement] for [Country.GetName]"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC: "[AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetTargetInvolvementIn(StrategicRegion.Self), Country.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP')][AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN')] [concept_involvement] for [Country.GetName]"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC_PLAYER_CONTEXT: "We have [GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon] #v [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! [concept_involvement] currently"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC_PLAYER_CONTEXT: "We have [GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon] [AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self), GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT')][AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self), GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT')] [concept_involvement] currently"
 INTEREST_TIER_TARGET_UP: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_up_up!#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#!/week)"
 INTEREST_TIER_TARGET_DOWN: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_down_down!#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#!/week)"
 INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_up_up!#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#!/week)"
 INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_down_down!#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#!/week)"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN_TITLE: "#title #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! target $concept_involvement$ is due to:#!"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN: "[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]"
 INTEREST_TIER_EFFECTS_TITLE: "#title Effects:#!"
 INTEREST_TIER_EFFECTS: "[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetDescription)]"
 INTEREST_TIER_NO_EFFECT: "#italic No effect#!"
 INTEREST_TIER_TRADE_ADVANTAGE_EXPORTS_DESC: "$VAL|0=+v$ [concept_trade_advantage] for [Concept('concept_trade','$concept_exports$')] in local $concept_markets$"
 INTEREST_TIER_TRADE_ADVANTAGE_IMPORTS_DESC: "$VAL|0=+v$ [concept_trade_advantage] for [Concept('concept_trade','$concept_imports$')] in local $concept_markets$"
 INTEREST_TIER_ON_ACTIVATE_EFFECT: "#title When gained:#!"
 INTEREST_TIER_ON_DEACTIVATE_EFFECT: "#title When lost:#!"
 STRATEGIC_REGION_AI_STANCE_TT_HEADER: "[Country.GetNameNoFormatting] took the #b [Country.GetAIStrategicRegionStanceTypeIn(StrategicRegion.Self).GetNameNoFormatting]#! [Concept('concept_strategic_region_stance', '$concept_strategic_region_stance_short$')] in [StrategicRegion.GetName] for the following reasons:\n$TOOLTIP_DELIMITER$"

## Effects
 interest_tier_effect_establish_missions_decree: "@checkmark! Enables the [GetDecreeType('decree_establish_missions').GetName] [concept_decree] in [Concept('concept_unincorporated_state','$concept_unincorporated_states$')]"
 interest_tier_effect_colonization: "@checkmark! Enables the #yellow;tooltip:[GetPlayer.GetTooltipTag],establish_colony_tooltip $establish_colony$#! Regional Action"
 interest_tier_effect_stake_colonial_claim: "@checkmark! Enables the [GetDiplomaticActionType('da_stake_colonial_claim').GetName] [concept_diplomatic_action] on [Concept('concept_decentralized_nation', '$concept_decentralized_nations$')]"
 interest_tier_effect_colonial_claim_generation: "@checkmark! Will generate a [concept_claim] when colonization of a [concept_state_region] reaches [GetPlayer.MakeScope.ScriptValue('interest_tier_effect_colonial_claim_generation_threshold')|v%0]"
 interest_tier_effect_infamy_cost_increase_high: "[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_high_value')|=n%0] [concept_infamy] Cost targeting [Concept('concept_war_goal', '$concept_war_goals$')] in this [concept_strategic_region]"
 interest_tier_effect_infamy_cost_increase_medium: "[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_medium_value')|=n%0] [concept_infamy] Cost targeting [Concept('concept_war_goal', '$concept_war_goals$')] in this [concept_strategic_region]"
 interest_tier_effect_infamy_cost_decrease_medium: "[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_decrease_medium_value')|=p%0] [concept_infamy] Cost targeting [Concept('concept_war_goal', '$concept_war_goals$')] in this [concept_strategic_region]"
 interest_tier_effect_can_start_diplomatic_plays: "@checkmark! Allows starting [Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')] in this [concept_strategic_region]"
 interest_tier_effect_can_join_diplomatic_plays: "@checkmark! Allows taking sides in [Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')] in this [concept_strategic_region]"
 interest_tier_effect_can_sign_alliance: "@checkmark! Allows to sign [GetArticleType('alliance').GetName] [Concept('concept_article', '$concept_treaties$')]"
 interest_tier_effect_can_sign_defensive_pact: "@checkmark! Allows to sign [GetArticleType('defensive_pact').GetName] [Concept('concept_article', '$concept_treaties$')]"
 interest_tier_effect_can_sign_support_independence: "@checkmark! Allows to sign [GetArticleType('support_independence').GetName] [Concept('concept_article', '$concept_treaties$')]"
 interest_tier_effect_can_sign_guarantee_independence: "@checkmark! Allows to sign [GetArticleType('guarantee_independence').GetName] [Concept('concept_article', '$concept_treaties$')]"
 interest_tier_effect_stake_colonial_claim_unrecognized: "@checkmark! Enables the [GetDiplomaticActionType('da_stake_colonial_claim').GetName] [concept_diplomatic_action] on [Concept('concept_decentralized_nation', '$concept_decentralized_nations$')] and [Concept('concept_unrecognized_power', '$concept_unrecognized_powers$')]"

## Diplomatic Actions
 da_stake_colonial_claim: "Stake Colonial Claim"
 da_stake_colonial_claim_desc: "Stakes a [concept_claim] on an overseas [concept_state_region]."
 da_stake_colonial_claim_action_notification_name: "[INITIATOR_COUNTRY.GetName] stakes colonial [concept_claim|l] on [TARGET_STATE.GetStateRegion.GetName]"
 da_stake_colonial_claim_action_notification_desc: "[INITIATOR_COUNTRY.GetName] has claimed [TARGET_STATE.GetStateRegion.GetName] as part of their growing colonial ambitions!"
 DA_STAKE_COLONIAL_CLAIM_COOLDOWN: "Cannot take this action again until #v [TimeKeeper.GetCurrentDateWithDiff( GetVarTimeRemaining( GetPlayer.MakeScope, 'da_stake_colonial_claim_cooldown') )]#!"
 DA_STAKE_COLONIAL_CLAIM_EMPTY_EFFECT: "Choose a [concept_state_region] on another continent to [concept_claim|l]"


## Notifications
 notification_colonial_claim_generated_name: "[SCOPE.sState('colony_notification_state').GetName] has become a #bold Major Colony#!"
 notification_colonial_claim_generated_desc: "[SCOPE.sState('colony_notification_state').GetName] has grown sufficiently large enough to grant us a [concept_claim] on the entirety of [SCOPE.sState('colony_notification_state').GetStateRegion.GetName]."
 notification_colonial_claim_generated_tooltip: "#header $notification_colonial_claim_generated_name$#!\n$TOOLTIP_DELIMITER$\n$notification_colonial_claim_generated_desc$"
