l_english:
 # Ship Names

 # Debug
 ship_prefix_TODO: "#todo TODO#!"
 ship_prefix_red: "#r RED#!"
 ship_prefix_green: "#g GREEN#!"


 # Standard Templates
 SHIP_AUTOMATIC_NAME: "$NUM|O$ $COUNTRY_ADJECTIVE$ $SHIP_TYPE_NAME$"
 SHIP_INVALID_NAME: "Invalid Name:\n$DESC$"

 shipname_default_format: "$PREFIX$$SHIP_NAMESAKE$"

 shipname_fallback_ordinal_generic: "$PREFIX$$SHIP_TYPE_NAME$ No. $NUM$"
 shipname_fallback_ordinal_battleship: "$PREFIX$Battleship No. $NUM$"
 shipname_fallback_ordinal_cruiser: "$PREFIX$Cruiser No. $NUM$"
 shipname_fallback_ordinal_frigate: "$PREFIX$Frigate No. $NUM$"
 shipname_fallback_ordinal_monitor: "$PREFIX$Monitor No. $NUM$"
 shipname_fallback_ordinal_troopship: "Troopship No. $NUM$"
 shipname_fallback_ordinal_supply_ship: "Transport No. $NUM$"
 shipname_fallback_submarine: "S-$NUM$"
 shipname_fallback_ordinal_tb_flotilla: "$NUM|O$ $ship_type_torpedo_boat$ Flotilla"

 shipname_fallback_ordinal_test: "$PREFIX$Max Ordinal No. $NUM$"

 # Country Specific
 shipname_german_submarines_format: "$PREFIX$U-$NUM$"
 shipname_japanese_maru_format: "$PREFIX$$SHIP_NAMESAKE$ Maru"

 shipname_german_torpedo_boats_format: "$PREFIX$T$NUM$"
 shipname_t_torpedo_boats_format: "$PREFIX$T-$NUM$"
 shipname_no_torpedo_boats_format: "$PREFIX$No. $NUM$"
 shipname_british_torpedo_boats_format: "$PREFIX$TB.$NUM$"
 shipname_french_torpedo_boats_format: "$PREFIX$Torpilleur N° $NUM$"
 shipname_us_torpedo_boats_format: "$PREFIX$TB-$NUM$"
 shipname_austrian_torpedo_boats_format: "$PREFIX$Tb $NUM$"

 ### Ship Prefixes
 # NB: Prefix loc strings must include a space at the end in order to function properly ("HMS " not "HMS")
 ship_prefix_blank: ""
 # British Empire
 ship_prefix_hms: "HMS " # His/Her Majesty's Ship 
 ship_prefix_hmas: "HMAS " # His/Her Majesty's Australian Ship 
 ship_prefix_hmnzs: "HMNZS " # His/Her Majesty's New Zealand Ship 
 ship_prefix_rims: "RIMS " # Royal Indian Marine Ship
 ship_prefix_hmis: "HMIS " # His/Her Majesty's Indian Ship 
 ship_prefix_hmsas: "HMSAS " # His/Her Majesty's South African Ship 
 ship_prefix_hmvs: "HMVS " # His/Her Majesty's Victorian Ship 
 ship_prefix_hmqs: "HMQS " # His/Her Majesty's Queensland Ship 
 ship_prefix_hmcs_1: "HMCS " # His/Her Majesty's Colonial Ship
 ship_prefix_hmcs_2: "HMCS " # His/Her Majesty's Canadian Ship
 # Germany (incl. Austria)
 ship_prefix_sms: "SMS " # Seiner Majestät Schiff
 ship_prefix_sm: "SM " # Seiner Majestät [U-Boot]
 ship_prefix_ims: "IMS " # Ihrer Majestät Schiff
 ship_prefix_im: "IM " # Ihrer Majestät [U-Boot]
 # United States
 ship_prefix_uss: "USS " # United States Ship
 ship_prefix_css: "CSS " # Confederate States Ship
 # Argentina
 ship_prefix_ara: "ARA " # Armada de la República Argentina
 # Mexico
 ship_prefix_arm: "ARM " # Armada de la República Mexicana
 # Greece
 ship_prefix_vp: "VP " # Vassilikón Ploíon
 # India
 ship_prefix_ins: "INS " # Indian Naval Ship
 # Italy
 ship_prefix_rn: "RN " # Regia Nave
 ship_prefix_rsmg: "R.Smg. " # Regia Rommergibile
 # Ireland
 ship_prefix_le: "LÉ " # Long Éireannach
 # Netherlands
 ship_prefix_zrms: "Zr.Ms. " # Zijner Majesteits
 ship_prefix_hrms: "Hr.Ms. " # Harer Majesteits
 # Portugal
 ship_prefix_nrp: "NRP " # Navio da República Portuguesa
 # Romania
 ship_prefix_nms: "NMS " # Nava Majestăţii Sale
 # Serbia / Yugoslavia
 ship_prefix_kb: "KB " # Kraljevski brod 

