l_english:
japan_earthquakes.1.t: "[ROOT.GetCountry.GetCustom('JAP_era_name')] Great Earthquakes"
japan_earthquakes.1.d: "Over the course of four days, three earthquakes outside the coast have caused damage across a vast area, with ensuing tidal waves exacerbating their impact in coastal areas."
japan_earthquakes.1.f: "Within a very little time the whole village had noticed the phenomenon. Apparently no one had felt the previous motion of the ground, but all were evidently astounded by the movement of the water. They were running to the beach, and even beyond the beach, to watch it. No such ebb had been witnessed on that coast within the memory of living men. Things never seen before were making apparition; unfamiliar spaces of ribbed sand and reaches of weedhung rock were left bare even as Hamaguchi gazed. And none of the people below appeared to guess what that monstrous ebb signified.\n\n—Lafcadio Hearn, #italic A Living God #!"
#TODO japan_earthquakes.1.a: ""
#TODO japan_earthquakes.1.b: ""
#TODO japan_earthquakes.1.c: ""

japan_earthquakes.2.t: "[ROOT.GetCountry.GetCustom('JAP_era_name')] [SCOPE.sState('japan_earthquake_state').GetCityHubName] Earthquake"
japan_earthquakes.2.d: "A great earthquake has struck near the coast in [SCOPE.sState('japan_earthquake_state').GetName], causing widespread damage to the city of [SCOPE.sState('japan_earthquake_state').GetCityHubName] and its castle."
japan_earthquakes.2.f: "When prints of the great catfish Namazu first started growing in popularity after the earthquake, they seemed in line with traditional stories. The creature was shown being subdued by the gods to prevent it from causing more earthquakes.\n\nYet over time, the portrayals evolved. One print showed Namazu cutting open its belly and bleeding coins. Another showed builders sharing drinks with it. A satirical edge had crept into the artwork, suggesting that despite the disaster brought by this beast, perhaps it was also setting something right."
japan_earthquakes.2.a: "Our vassals in [SCOPE.sState('japan_earthquake_state').GetCityHubName] need aid!"
japan_earthquakes.2.b: "Wealth must flow to those who can rebuild."
earthquake_vassal_support: "Supporting Vassals"
earthquake_rebuilding_focus: "Rebuilding After Earthquake"
earthquake_rebuilding_redistribution: "World Rectification"

japan_earthquakes.3.t: "Mino–Owari Earthquake"
japan_earthquakes.3.d: "A great earthquake has struck at the heart of [ROOT.GetCountry.GetName], killing thousands and creating unusually large fault breaks across the land."
japan_earthquakes.3.f: ""The reaction of human beings has always been to perceive disasters as crimes, often asking 'who' and thereby giving rise to the host of monsters and demons of mythology said to be behind an earthquake.\n\nThe modern seismologist must reject superstition, but ironically sometimes finds himself in the role of a police detective investigating a crime scene. Which objects fell? How did they fall? All these questions ultimately in pursuit not of 'who', but of 'how' and 'why'.""
japan_earthquakes.3.a: "Invite foreign scholars to study these faults."
japan_earthquakes.3.b: "Use this knowledge to set up more meteorological observatories."
japan_earthquakes.3.c: "Brace for possible aftershocks."
meteorological_observatories: "Meteorological Observatories"
meteorological_observatories_cost: "$meteorological_observatories$"
earthquake_bracing_for_aftershocks: "Bracing for Aftershocks"

japan_earthquakes.4.t: "Sanriku Earthquake"
japan_earthquakes.4.d: "A great tidal wave has struck [SCOPE.sState('japan_earthquake_state').GetName], triggered by an earthquake off the Sanriku coast. In the wake of its devastating impact, monuments warning of future tsunamis have been suggested."
japan_earthquakes.4.f: ""Building monuments to the dead is not enough. Neither do the living need such reminders of the calamity visited upon them. Anyone who finds a message in stone will know that their ancestors were speaking to them something that must not be forgotten. These are monuments to those who are yet to be born.""
japan_earthquakes.4.a: "[SCOPE.sState('japan_earthquake_state').GetName] needs such monuments."
japan_earthquakes.4.b: "Raise these stones wherever the tsunami struck!"
japan_earthquakes.4.c: "We must focus our efforts on the here and now."
tsunami_stones: "Tsunami Stones"
tsunami_relief_efforts: "Tsunami Relief Efforts"

japan_earthquakes.5.t: "Great Kantō Earthquake"
japan_earthquakes.5.d: "A massive earthquake, unprecedented in living memory, has struck close to [SCOPE.sState('japan_earthquake_state').GetCityHubName]. Within minutes, the disaster has razed much of the city and killed hundreds of thousands."
japan_earthquakes.5.f: "If the wall of water that followed the tremors had seemed like the greatest threat, it was nothing compared to the fires. Soon, not only was the entire city set ablaze, but the earth and wind itself seemed to be on fire.\n\nPeople who had managed to escape the burning buildings were trapped by a tornado of flames, as if the conflagration was determined to leave no one alive. [SCOPE.sState('japan_earthquake_state').GetCityHubName] had become a vision of hell."
japan_earthquakes.5.a: "The Japanese people must stand united against such devastation!"
japan_earthquakes.5.b: "This blow to our material wealth is a warning against decadence."
japan_earthquakes.5.c: "We must use this opportunity to rebuild a more modern [SCOPE.sState('japan_earthquake_state').GetCityHubName]."
earthquake_national_tragedy: "National Tragedy"
earthquake_divine_punishment: "Divine Punishment"
earthquake_modernization: "Modernized Reconstruction"
earthquake_modernization_land_confiscation: "Land Readjustment"

shinbutsu_bunri_decision: "$je_shinbutsu_bunri$"
shinbutsu_bunri_decision_desc: "$je_shinbutsu_bunri_reason$"
elevate_buddhism_decision: "$je_elevate_buddhism$"
elevate_buddhism_decision_desc: "$je_elevate_buddhism_reason$"
je_shinbutsu_bunri: "Shinbutsu Bunri"
je_shinbutsu_bunri_reason: "With the power of the Emperor restored, we need to distinguish and uplift the native religious traditions which hold the imperial line sacred. To accomplish this, they need to be separated from the foreign influence of Buddhism, which has been inextricably linked with kami worship for hundreds of years through syncretic traditions. Leveraging discontent with Buddhist institutions from its connections with the Shogunate, we can make way for Shinto as the higher guiding principle."
je_taikyo_proclamation_button: "Taikyō Proclamation"
je_taikyo_proclamation_button_desc: "Make Shinto, the worship of kami and reverence for the Emperor, the principle of the state"
je_elevate_buddhism: "Elevate Buddhism"
je_elevate_buddhism_reason: "The Buddhist religious institutions in $JAP$ have strong historical ties to the administrative arm of the Shogunate. Having averted the end of the Shogunate once, strengthening these institutions could help us maintain its power and strengthen religious traditions for $JAP$ not focused on Emperor worship."
je_elevate_buddhism_goal: "$je_communism_2_goal$"
arahitogami: "Arahitogami"
extended_danka_system: "Extended Danka System"

japan_religion.1.t: "Jingū-ji"
japan_religion.1.d: "At shrine temples, it is common for Buddhist monks to perform rituals alongside Shinto practices. With the separation of Buddhism from Shinto, the role of these monks is being called into question."
japan_religion.1.f: ""What is the purpose of these rituals? To guide the kami to enlightenment? To improve their karma? The implication is clearly that, rather than being worthy of worship, they are lost beings in need of guidance. We will no longer abide such implications!""
japan_religion.1.a: "Demand the monks convert and become Shinto priests."
japan_religion.1.b: "Strip the monks of their titles."
japan_religion.1.c: "Leave the monks to their duties."
forced_monk_conversions: "Forced Monks to Convert"
monks_stripped_of_titles_opinion: "$monks_stripped_of_titles$"
monks_stripped_of_titles: "Monks Stripped of Titles"
monks_left_to_duties: "Monks Left to Their Duties"

japan_religion.2.t: "Honji Suijaku"
japan_religion.2.d: "It is a well-established idea that Buddhas revealed themselves in Japan as kami, reflected in terminology such as gongen, which considers them two parts of the same entity. Such terminology reinforces Buddhism's influence."
japan_religion.2.f: ""It must have made sense, once. Amaterasu is the sun. Dainichi Nyorai, Vairocana, is the sun. However, the sun is not divided, nor is it a reflection or manifestation of the light of another. She shines alone and under her own power. And today, [ROOT.GetCountry.GetNameNoFormatting] has room for only one sun.""
japan_religion.2.a: "Ban the concept of gongen."
japan_religion.2.b: "Ban referring to Hachiman as a Bodhisattva."
japan_religion.2.c: "Abstain from regulating the terminology."
banned_syncretic_terminology: "Banned Syncretic Terminology"
retained_syncretic_terminology: "Retained Syncretic Terminology"

japan_religion.3.t: "It Tolls for Thee"
japan_religion.3.d: "The attempt to oust Buddhism's influence has mobilized general anti-Buddhist sentiment. Temple properties are being seized and damaged, with some being destroyed outright, while others are being stripped of Buddhist iconography."
japan_religion.3.f: "Approaching the shrine, he stopped in his tracks. The two Niō, powerful Buddha statues which had stood guard outside the entrance, had been removed. In their place was nothing.\n\nAs he passed inside, he couldn't shake the feeling that for all its purity, the shrine was no longer as safe as it had once been. An unguarded gate."
japan_religion.3.a: "Smelt the temple bells for cannons!"
japan_religion.3.b: "Destroy or remove Buddha statues from the temples."
japan_religion.3.c: "Leave the temples untouched."
smelted_temple_bells: "Smelted Temple Bells"
smelted_temple_bells_opinion: "$smelted_temple_bells$"
removed_buddha_statues: "Removed Buddha Statues"
removed_buddha_statues_opinion: "$removed_buddha_statues$"
retained_buddhist_iconography: "Retained Buddhist Iconography"

japan_religion.4.t: "The Bureau of Shinto Affairs"
japan_religion.4.d: "Efforts to standardize Shinto practices and ensure that state kami are a part of local rituals have been met with opposition from local monks and shrine priests, who consider these teachings a break with tradition."
japan_religion.4.f: ""Shinto is not simply about continuing existing rituals and practices as they might exist at shrines around the nation, confused and contaminated by external influences. The traditions of the Imperial house, descendants of heaven, must be taught across [ROOT.GetCountry.GetNameNoFormatting] to return Shinto to its pure form.""
japan_religion.4.a: "Enforce the state interpretations."
japan_religion.4.b: "Local priests know best what suits local rituals."
standardized_priest_training: "Standardized Priest Training"
standardized_priest_training_opinion: "$standardized_priest_training$"
deferred_to_local_priests: "Deferred to Local Priests"
deferred_to_local_priests_opinion: "$deferred_to_local_priests$"

japan_religion.5.t: "Confucianism and Shinto"
japan_religion.5.d: "In the process of separating Buddhism and Shinto, Confucianism's role has been questioned. Many scholars consider the philosophy highly compatible with Shinto, while others dismiss it as another foreign influence."
japan_religion.5.f: ""Confucianism may have arrived through similar channels as Buddhism, but there is no contradiction between this philosophy and the worship of kami. Rather, the two reinforce each other, encompassing the same principles of heaven and earth, ruler and subject.""
japan_religion.5.a: "Confucianism is an important complement to Shinto."
japan_religion.5.b: "We must restore Shinto to its ancient traditions."
fukko_shinto: "Fukko Shintō"

japan_religion.6.t: "Christianity in the Open Country"
japan_religion.6.d: "Although [ROOT.GetCountry.GetName] has opened to foreigners, religion remains regulated. Christian countries may view the free import of their faith as equally important as the import of their goods."
japan_religion.6.f: ""Christianity most loves its followers in death, a death for faith above all. Every missionary put to the cross or the fire becomes the next chapter in a story that started with a man on a cross. Perhaps it is time we stop giving them martyrs?""
japan_religion.6.a: "Missionaries must be allowed to preach their faith."
japan_religion.6.b: "It may be practiced, but it should not be spread."
japan_religion.6.c: "Christianity was and remains a foreign threat."
permitted_christianity: "Permitted Christianity"
christianity_disallowed: "Christianity Disallowed"

japan_religion.7.t: "Lineages of Thought"
japan_religion.7.d: "[ROOT.GetCountry.GetName] has a long tradition of different schools of Buddhism, many of which still wield influence today. With [SCOPE.gsInterestGroup('devout_ig').GetName] gaining in political power, one school stands out."
japan_religion.7.f: ""New schools of Buddhism have arisen in [ROOT.GetCountry.GetNameNoFormatting] over centuries. There is no reason to think one would stamp out the others. However, the current moment requires leadership and political direction, and it is likely that some will seize it more than others.""
japan_religion.7.a: "The Pure Land School."
japan_religion.7.b: "The Zen School."
japan_religion.7.c: "The Nichiren School."
japan_religion.7.e: "The Shingon School."
pure_land_buddhism: "Pure Land School"
zen_buddhism: "Zen School"
shingon_buddhism: "Shingon School"

japan_religion.8.t: "Words of the Buddha"
japan_religion.8.d: "With [ROOT.GetCountry.GetName] being opened to the world, Buddhist scholars have shown interest in translating more foreign texts to incorporate their ideas in modern Buddhism."
japan_religion.8.f: ""We should not let orthodoxies developed through isolation hold us back, nor should we fear finding the truth in unexpected places. The teachings of the Buddha took a long road to reach us. Studying where they have passed, as well as where they might go, can only bring us further insight.""
japan_religion.8.a: "Sanskrit and Pali texts, the roots of Buddhism."
japan_religion.8.b: "Chinese texts, closest to our own schools of thought."
japan_religion.8.c: "Works of European philosophy for comparative study."

japan_religion.9.t: "Warrior Monks"
japan_religion.9.d: "The ongoing war effort has led to debates among the [SCOPE.gsInterestGroup('devout_ig').GetName] about the role of Buddhism in supporting the country during a violent conflict."
japan_religion.9.f: ""The monks of old did not hesitate to defend their temples. Should we hesitate to defend our nation? A life should not be taken lightly, but would the [ROOT.GetCountry.GetAdjective] state pursue a war that would not lead to a longer peace, that would not save more lives than it takes?""
japan_religion.9.a: "Force is necessary to establish lasting peace."
japan_religion.9.b: "Non-violence above all."
war_buddhism: "Buddhism at War"
peaceful_buddhism: "Peaceful Buddhism"

japan_religion.10.t: "Yōshoku"
japan_religion.10.d: "Since the end of Sakoku, meat-oriented restaurants have become increasingly common in port cities to cater to foreigners. This has called into question the standing ban on meat-eating in [ROOT.GetCountry.GetName]."
japan_religion.10.f: ""Excuse me, but beef is certainly a most delicious thing, isn’t it? Once you get accustomed to its taste, you can never go back to deer or wild boar again. I wonder why we in Japan haven’t eaten such a clean thing before?"\n\n—Kanagaki Robun, #italic The Beefeater #!"
japan_religion.10.a: "We must lift this ban, for nutrition and culinary expansion!"
japan_religion.10.b: "We will not let this barbarian practice take hold!"
maintained_meat_ban: "Maintained Meat Ban"
maintained_meat_ban_opinion: "$maintained_meat_ban$"
