 ryukyu_rivalry_sway_merchants_button_tt: "[ROOT.GetCountry.GetName] own a level #v 2#! or higher [GetBuildingType('building_port').GetName] in the [SCOPE.sCountry('ryukyu_scope').GetAdjective] [concept_capital_state]"
 je_ryukyu_rivalry_inspect_defenses_button: "Inspect Coastal Defenses"
 je_ryukyu_rivalry_inspect_defenses_button_desc: "With military access secured, we can send a trusted general to examine Ryukyu's fortifications, ensuring walls and watchtowers reflect our oversight and strategic intent."
