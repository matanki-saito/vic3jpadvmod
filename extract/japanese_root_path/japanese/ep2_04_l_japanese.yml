 glossary_zaibatsu: "#b #italic 財閥#!#!とは、一族が所有し、垂直統合された産業・金融複合企業のことを指します。\n\n典型的な財閥は、持株会社と銀行を中核として組織されており、それらが複数の（主として産業系の）子会社の株式を保有しています。財閥は江戸時代後期の商人一族による複合企業から生まれ、もともと持っていた資産と国家との結びつきを活用して、日本の産業基盤の大部分に対する支配を固めました。"
