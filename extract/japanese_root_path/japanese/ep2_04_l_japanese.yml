 iwakura_mission.1.t: "西洋への視察団"
 iwakura_mission.1.d: "政府は、特命全権大使の任にふさわしい大臣や官僚の候補者一覧を作成した。選ばれた候補者は、約十か月の予定で派遣される西欧使節団を率いることになる。"
 iwakura_mission.1.f: "[SCOPE.sCharacter('expedition_leader_1').GetFirstNameNoFormatting]は鏡の前に立ち、何度もネクタイを結び直していた。最初は流行として、後には国策として日本に導入されたのだが、もう随分と前のことだ。しかし、いまだに体に馴染まない。それでもこれで通す必要がある。この取引が成立し、政府が[SCOPE.sCharacter('expedition_leader_1').GetHerHis]の提案を承認すれば、そしてロンドンやボストン、そしてパリで目覚める日々が始まれば、一日の終わりで一息つくことももはやなくなるのだ。"
 iwakura_mission.1.a: "この件については、[SCOPE.sCharacter('expedition_leader_1').GetFullName]の裁定を仰がなければならない。"
 iwakura_mission.1.b: "[SCOPE.sCharacter('expedition_leader_2').GetFullName]をこの役割に任命する。"
 iwakura_mission.1.c: "[SCOPE.sCharacter('expedition_leader_3').GetFullName]に頼もう。"
 iwakura_mission.1.e: "[SCOPE.sCharacter('expedition_leader_4').GetFullName]にとって、よい経験になるだろう。"
 iwakura_mission.2.t: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]の報告書"
 iwakura_mission.2.d: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]使節団は$JAP$に帰国し、[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName]と同行した使節たちは[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]に報告書を提出した。この報告書には、 工業社会に関する知見と、新しい国家政策に関する提案が含まれている。"
 iwakura_mission.2.f: "「深く考えるに、欧米諸国の成功が原理原則を正しく適用していることに起因するのは明白である。世界を巡り、調査した十数か国を見れば、統治の仕組みこそ違うものの、そのすべてが教育に力を注ぎ、一つの旗の下に団結していることがわかる。そのため、どの地に足を踏み入れても、学校がない場所はなく、啓蒙の精神を持たない者はいない」\n\n—田中不二麿"
 iwakura_mission.2.a: "西洋は我々に近代への窓を開いた。"
 iwakura_mission.2.b: "[SCOPE.sCountry('iwakura_good_economy_country').GetAdjective]型の産業が日本の未来の姿だ。"
 iwakura_mission.2.c: "[SCOPE.sCountry('iwakura_desired_law_country').GetAdjective]の政策から学べることは多い。"
 iwakura_mission.2.e: "[SCOPE.sCountry('iwakura_land_reform_law_country').GetAdjective]から着想を得た農地改革で、農村は活力を取り戻すだろう。"
 iwakura_mission.4.t: "黄金の門"
 iwakura_mission.4.d: "長い航海の果てに、[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]使節団は[SCOPE.sCountry('iwakura_mission_host').GetName]に到着した。使節団はその鉄道を利用して、道中で[SCOPE.sCountry('iwakura_mission_host').GetAdjectiveNoFormatting]の公共施設や工業施設を視察しながら[SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName]に向かう予定である。"
 iwakura_mission.4.f: "「夜明け前、海霧は深く立ち込めて数歩先も見えないほどだったため、船を停めて日の出を待つこととなった。やがて日が差すと、霧はしだいに晴れていき、我々の前にカリフォルニアの海岸が姿を現した。ほどなくして両岸に山々がそびえ立つ2つの岩岬の中ほどへと至る。そこには蒸気船が行き交い、吐き出す煙が幾筋もたなびいていた。この美景こそが「ゴールデンゲート（金門）」と呼ばれる場所である。\n\n22日間に及ぶ大洋横断の果てに、我らはついに東方のこの地で、初めてその山水を望んだ。その光景を前にしたとき、そこにはただ歓喜の声があるばかりであった」\n\n—久米邦武、『#italic 特命全権大使 米欧回覧実記#!』"
 iwakura_mission.4.a: "大陸の知を吸収する責務が我々に課せられている。"
 iwakura_mission.4.b: "アメリカはヨーロッパへの門にすぎない。"
 iwakura_mission.5.t: "鯨の腹"
 iwakura_mission.5.d: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]使節団は太平洋から大西洋へと横断し、[SCOPE.sCountry('iwakura_mission_host').GetName]に到着した。使節団は[SCOPE.sCountry('iwakura_mission_host').GetRuler.GetPrimaryRoleTitle]政府と外交関係を結ぶとともに、産業革命発祥の地を視察したいと考えている。"
 iwakura_mission.5.f: "「アメリカの繁栄とともにリバプールの港もかつてないほど栄えた。港の入り口には一連のドックが築かれ、それが北岸に沿って6マイルにわたり続いている。海側には石垣が城壁のように積み上げられ、その内側にはあらゆる方向にドックが掘られていた。出入りするすべての船はこれらのドックに入って停泊する。それらのマストは深い森の木々のようであり、張り巡らされた索具は漁村に干された網のようであった。これらは世界最大のドックなのだという」\n\n—久米邦武、『#italic 特命全権大使 米欧回覧実記#!』"
 iwakura_mission.5.a: "提示されたものをすべて追及しよう。"
 iwakura_mission.5.b: "2か月あれば[SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName]をすべて視察できる。"
 iwakura_mission.6.t: "大陸横断"
 iwakura_mission.6.d: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]使節団はヨーロッパ大陸に到達し、まず[SCOPE.sCountry('iwakura_mission_host').GetName]に入国した。これから数か月にわたり、使節団は大陸の各国を巡って視察と評価を行い、ヨーロッパ諸国との関係を構築するつもりだ。"
 iwakura_mission.6.f: "「午後、我々はある墓地を訪れた。名は聞きそびれてしまったが、それはパリ郊外の東に位置し、40エーカーの広さがある。馬車一台が通れるほどの道があるほかは、空いている場所はほとんどない。\n\n今日、そこでは見るからに貧しそうな一家の葬儀が行われていた。木の棺を伴ったささやかな葬列が進み、棺が墓穴へと下ろされた。司祭が祈祷を終えると、参列者たちはそれぞれ、涙を流しながら一握りの土を投げ入れた。列の誰もが目が涙を浮かべていたが、慟哭する者はいなかった」\n\n久米邦武、『#italic 特命全権大使米欧回覧実記#!』 "
 iwakura_mission.6.a: "時間をかけて比較検討しよう。"
 iwakura_mission.6.b: "予定が立て込んでいるため、強行軍で視察しなければならない。"
 iwakura_mission.8.t: "もう一方の世界"
 iwakura_mission.8.d: "[ROOT.GetCountry.GetName]に向かう途中、[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]使節団は[SCOPE.sCountry('iwakura_mission_host').GetAdjective]の植民地である[SCOPE.sState('iwakura_mission_location').GetName]に立ち寄った。使節団は数日をそこで過ごし、欧州人の植民地社会と現地の[GetReligion('theravada').GetNameNoIcon]の慣習を観察した。"
 iwakura_mission.8.f: "「ここを訪れた際、我々は一人の僧侶に案内されたが、彼は我々を「#italic 旦那#!」と呼び、寺院を「#italic 伽藍#!」と呼んだ。これらの言葉の語源である梵語が、今なおこの地に残されていることに我々は感銘を覚えた。セイロンは仏陀の修行の聖地であり、現地の人々は今でも仏教を深く信仰している。もともと質素な暮らしをする人々だが、僧侶たちの生活はそれに輪をかけて質素である。食事は粗末で、庵には雑草が生い茂り、すべてのものが質素の極みである。\n\nキリスト教やイスラム教の聖地と比べてその違いはあまりに著しい。それは、この宗教が世俗の虚飾を脱ぎ捨てたからだろうか。そうかもしれない。だが、繁栄する力を欠いているという可能性もある」\n\n久米邦武、『#italic 特命全権大使米欧回覧実記#!』"
 iwakura_mission.8.a: "もしかすると、我々にもこのような運命が降りかかったかもしれなかったのだろうか？"
 iwakura_mission.9.t: "横浜港"
 iwakura_mission.9.d: "数か月に及ぶ外遊を経てついに世界一周を果たした[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]使節団は、[ROOT.GetCountry.GetName]に帰還した。彼らは様々な資料、外国の物品、西洋の技術や政治制度に関する実地の見聞を持ち帰った。"
 iwakura_mission.9.f: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFirstNameNoFormatting]は蒸気船の甲板に立ち、西の方角を眺めていた。はるか遠くに、晴れかけてきた朝霧に包まれた雄大な富士山の姿が見える。傍らの手すりには、商人か、あるいは[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetHerselfHimself]のような新進気鋭の世界旅行者かわからないが、外国人の一団が集まっている。船室の扉近くのベンチでは、一人のドイツ人が写生帖にその光景を写し取っている。[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetSheHe|U]は思った。彼らにとってこれは初めての眺めなのだろうか、それとも自分と同じく、彼らもこの景色を見るたびに息を呑むのだろうかと。\n\n自分がやり遂げたことと同じことを真に行った者がどれほどいるだろう。3つの大洋を渡り、4つの大陸を巡った者がどれほどいるだろう。そのような者はこれからさらに増えていくに違いない、と[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetSheHe]は思う。鉄道と蒸気船が、自分のような者をどんどん生み出していく。しかし歴史は自分を、その最初の一人として記憶に留めるだろう。"
 iwakura_mission.9.a: "故郷の眺めほど美しいものはない。"
 je_iwakura_mission: "維新: [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]使節団"
 je_iwakura_mission_reason: "近代化政策の一環として、[ROOT.GetCountry.GetName]の新政府は[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName]と、多数の大臣と学者からなる随行団を西洋諸国への外交使節として派遣した。[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]使節団は西洋との不平等条約の再交渉を目指すとともに、列強の政治的・技術的基盤について調査を行う。\n\n使節団は、ある国に滞在している#b 月#!ごとに、一定の確率でその国の法律や技術に関する知見を得る。これらの知見は、帰国後に提出される報告書の内容のほか、使節団長の[concept_ideology]に影響を与える。"
