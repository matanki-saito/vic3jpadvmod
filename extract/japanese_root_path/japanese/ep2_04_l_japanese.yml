 # Zaibatsu
 je_zaibatsu: "企業帝国"
 je_zaibatsu_reason: "[ROOT.GetCountry.GetName]の急速な工業化により、その経済の多くは[concept_zaibatsu]の傘下に組み込まれた。国家機構との結びつきから莫大な利益を上げるこれらの企業は、#v $JAP$#!の軍産体制において欠かせない中核となっている。\n\n資本の集約により[ROOT.GetCountry.GetAdjectiveNoFormatting]は国際的な競争力を手にしたが、その代償として、財閥とそれを後ろ盾とする軍部の手には、ますます大きな政治的権力が集まりつつある。[SCOPE.GetRootScope.GetCountry.GetCustom('zaibatsu_democracy_snippet')]\n$ZAIBATSU_LIST_HEADER$$ZAIBATSU_LIST_CONTENT$"
 je_zaibatsu_complete_header: "財閥を#b 盤石#!にするには:\n"
 je_zaibatsu_on_complete_header: "財閥を#b 盤石#!にした場合:\n$EFFECT$"
 je_zaibatsu_fail_header: "財閥を#b 抑制#!するには:\n"
