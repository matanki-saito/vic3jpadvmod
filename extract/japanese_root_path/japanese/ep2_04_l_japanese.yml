 ep2_meiji_pulse.2.t: "[SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')]の砲撃"
 ep2_meiji_pulse.2.d: "[SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting]の死に対する賠償金の支払いを[SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')]藩が拒否したことを受け、[SCOPE.sCountry('relevant_gp').GetAdjective]の海軍艦艇が[SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')]の沿岸防衛隊と数日に及ぶ砲撃戦を行った。"
 ep2_meiji_pulse.2.f: "湾は砲撃の煙で霞み、[SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')]は炎に包まれていた。海を隔てた向こう側では、 一隻の外国船が町の北にある鋳造所に砲弾を撃ち込んでいる。発射のたびに、沈もうとする太陽の残光を地獄のような赤い光がかき消した。\n\n[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]の砲台で稼働していた最後の大砲が轟いた。条件がよければなんとか当たる距離だが、今はもはや望み薄だ。砲弾は外国艦隊の三隻目の数艇身手前のところに着弾し、巨大な水柱を上げた。[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]は海綿を掴み、急いで砲の手入れにかかった。背後の壁の向こうでは、直前の集中砲火で負傷した兵たちがなおも悲鳴を上げている。耳鳴りがしているにもかかわらず、その声ははっきりと聞こえていた。"
 ep2_meiji_pulse.2.a: "彼らの無謀さに対する厳しい代償だ。"
