 special_character_japanese_emperor_desc: "このキャラクターは現在在位している日本国天皇であり、日本の宗教的および政治的体制の中心です。"
 japan_monarchy.1.t1: "嘉永"
 japan_monarchy.1.t2: "天久"
 japan_monarchy.1.d1: "[SCOPE.sCharacter('emperor_scope').GetFirstName]親王が日本国天皇の皇位を継承した。[SCOPE.sCharacter('emperor_scope').GetHerHis|U]の即位により、元号は「永遠の幸福」を意味する「嘉永」に改められた。"
 japan_monarchy.1.d2: "[SCOPE.sCharacter('emperor_scope').GetFirstName]親王が日本国天皇の皇位を継承した。[SCOPE.sCharacter('emperor_scope').GetHerHis|U]の即位により、元号は「天の永遠」を意味する「天久」に改められた。"
 japan_monarchy.1.f: "どこからともなく楽人が合図を送った。二人の女官が高御座の帳を開く。そこには、白と緑の龍で飾られた緋色の装束に身を包む天皇が座していた。衣の豊かな膨らみが玉座を包み込み、天皇はあたかも宙に浮いているかのように見えた。冠からは玉簾が垂れ下がり、その落とす影が天皇の瞳を視界から遮っていた。\n\n[SCOPE.sCharacter('name_scope').GetFirstNameNoFormatting]の周囲で衣擦れの音が広がり、[SCOPE.sCharacter('name_scope').GetHerHis]は頭を垂れた。列席者たちは大きな波のように一斉に平伏する。[SCOPE.sCharacter('name_scope').GetSheHe|U]もそれに倣い、影に包まれた天皇の御顔は視界から消えた。\n\n数日して、江戸へ戻る道すがら、[SCOPE.sCharacter('name_scope').GetSheHe]は目にした光景を思い返そうとしたが、それはどうにも捉えどころのないものだった。冠や帳、天皇の脇に置かれた箱のことは思い出せる。だが、天皇その人については、何一つ思い出せなかったのだ。"
 japan_monarchy.1.a: "渡津海の浜の真砂を数えつつ、君が千歳のあり数にせむ。"
 japan_monarchy.2.t: "明治時代"
 japan_monarchy.2.d: "[SCOPE.sCharacter('emperor_scope').GetFirstName]親王が日本国天皇の皇位を継承した。[SCOPE.sCharacter('emperor_scope').GetHerHis|U]の即位により、元号は「開明なる統治の誓い」を意味する「[SCOPE.sCharacter('emperor_scope').GetFirstName]」に改められた。"
 japan_monarchy.2.f: "銅鑼が鳴り、帳が上がった。瞬きするほどの間に聴衆の目に映ったのは、豪奢な装飾が施された黄櫨染御袍に身を包み、面差しを半ば隠した天皇の姿であった。左手の台には緑の漆塗りの箱が置かれ、その中には草薙剣と八尺瓊勾玉が納められている。やがて武官が号令を発し、一同は床へと目を伏せた。宣命使が力強く、淀みない声で読み上げる。\n\n「神代の昔より国の基は定められ、のちに橿原の地にて、神武天皇は皇基を建てられた。爾来、皇統は絶えることなく続いている。今、朕は古の道と先帝の例に則り、天つ日嗣を受け、高御座に即くものである」" # Very heavily pared down excerpt of the rites at Meiji's enthronement
 japan_monarchy.2.a: "渡津海の浜の真砂を数えつつ、君が千歳のあり数にせむ。"
 japan_monarchy.3.t: "大正時代"
 japan_monarchy.3.d: "[SCOPE.sCharacter('emperor_scope').GetFirstName]親王が日本国天皇の皇位を継承した。[SCOPE.sCharacter('emperor_scope').GetHerHis|U]の即位により、「大いなる正義の徳」を意味する[SCOPE.sCharacter('emperor_scope').GetFirstName]時代が始まった。"
 japan_monarchy.3.f: "足場を男が通ると継ぎ目がきしんだ。弥太郎は精一杯の力でそれを押さえつける。足音が遠ざかると、彼は槌を振るってそれを固定する作業に取りかかった。\n\n周囲の至る所から同じような音が聞こえてくる。視界の端では、別の組が隣の建物の黒木の板壁を組み立てているのが見える。親方が、ゆさゆさと揺れる山積みの茅の束を担いだ男に怒鳴り声で指示を飛ばす。\n\n6日後、天皇は彼が築いているこの通路を通る。それは一生に一度の儀式の一部であり、儀式が終わればこれは取り壊されることになっていた。彼自身はその場に立ち会うことはできない。せめてもの願いは、その輝きが雲に映るのを目にすることだけであった。"
 japan_monarchy.3.a: "渡津海の浜の真砂を数えつつ、君が千歳のあり数にせむ。"
 japan_monarchy.4.t: "昭和時代"
 japan_monarchy.4.d: "[SCOPE.sCharacter('emperor_scope').GetFirstName]親王が日本国天皇の皇位を継承した。[SCOPE.sCharacter('emperor_scope').GetHerHis|U]の即位により、元号は「開明なる平和と調和の誓い」を意味する「[SCOPE.sCharacter('emperor_scope').GetFirstName]」に改められた。"
 japan_monarchy.4.f: "高石家の四世代がラジオの周りに集まっていた。そこから聞こえる声はまるで井戸の底から響いているようで、しかも雑音だらけだ。義揚がダイヤルをあちこち回すと、再び声が、今度ははっきりと力強く流れてきた。\n\n「…内閣官房長官は新元号を発表する詔書を公布しました。本日より、元号は[SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting]元年に改められます…」\n\n母の視線がちゃぶ台に置かれた新聞へと移る。「光文じゃないの？本当かしら？」\n\n当惑したような囁きが部屋に満ち、義揚はラジオの音量を上げた。だがそれは無駄だった。ほかに何かあるのなら、明日の新聞を読むしかなかった。"
 japan_monarchy.4.a: "渡津海の浜の真砂を数えつつ、君が千歳のあり数にせむ。"
 japan_monarchy.5.t: "一世一元"
 japan_monarchy.5.d: "朝廷の政治的優位性が回復したことを受け、天皇は元号制度を改革する詔書を布告した。今後は新たな天皇の即位とともに新しい元号を定め、その在位の間は同じ元号を用いることになる。"
 japan_monarchy.5.f: "#bold 帝国詔書#!\n\n太乙を体して位に登り、景命を膺けて以て元を改む。洵に聖代の典型にして、万世の標準なり。朕、否徳と雖も、幸に祖宗の霊に頼り、祇みて鴻緒を承け、躬万機の政を親す。乃ち元を改めて、海内の億兆と与に、更始一新せむと欲す。其れ[ROOT.GetCountry.GetCustom('JAP_era_year_name')]四年を改めて、[SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting]元年と為す。今より以後、旧制を革易し、一世一元、以て永式と為す。" # Shortened 'One Emperor, One Era' edict - 今後年號ハ御一代一號ニ定メ慶應四年ヲ改テ明治元年ト爲ス及詔書
 japan_monarchy.5.a: "主者施行せよ。"
 japan_monarchy.6.t: "太上天皇の崩御"
 japan_monarchy.6.d: "現天皇の父、退位された太上天皇が崩御された。[SCOPE.sCharacter('retired_emperor_scope').GetSheHe|U]は皇室の権威回復に尽力したことで知られ、その功績を称えて[SCOPE.sCharacter('retired_emperor_scope').GetFirstName]という諡号が贈られた。"
 japan_monarchy.6.f: "東峯は筆を墨に浸した。穂先が紙の上を走り、その日の日付と年、そして天候を綴っていく。それは次の行へ移り、動きを止めた。\n\nどのような言葉が相応しいのだろうか。起きた事実の重さを、どう表現すべきなのだろうか。太上天皇が朝廷の復興に心血を注がれたという噂は耳にしていた。その在位期間に、天皇が復活させた儀式の報せを受けた記憶が蘇る。そして今日、朝廷からの使者を迎え、その真実を知ったのだ。\n\n筆が再び紙に触れる。 「天皇の尊号に関する先例の照会あり。皇統譜を紐解き、勘申に及ぶ…」"
 japan_monarchy.6.a: "その遺志を、後裔たちは果たすであろうか？"
