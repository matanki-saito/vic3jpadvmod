 zaibatsu.1.t: "企業帝国"
 zaibatsu.1.d: "[ROOT.GetCountry.GetAdjective]という国家と[SCOPE.gsInterestGroup('zaibatsu_ig').GetName]の揺るぎない結びつきが、[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]における財閥の権力を盤石なものとした。政治家には統治する役割が与えられているかもしれないが、実際に支配するのは軍人と財界の幹部たちである。"
 zaibatsu.1.f: "[SCOPE.sCharacter('pm_scope').GetFullNameNoFormatting]は、屋根付きの桟敷席から取組を見下ろしていた。贔屓の力士が相手に土俵際まで追いつめられたとき、[SCOPE.sCharacter('pm_scope').GetSheHe]は自分が拳を白くなるほど強く握りしめていることに気づいた。首相の傍らには、少しも動じぬ様子で[SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting]が立っていた。\n\n行司が勝者に軍配を向けると、下の席から歓声が沸き起こった。座布団が雨のように宙を舞い、土俵へと降り注ぐ。[SCOPE.sCharacter('relevant_zaibatsu_exec').GetFirstNameNoFormatting]は[SCOPE.sCharacter('pm_scope').GetFirstNameNoFormatting]の方へ顔を向け、微笑んだ。土俵の向こう側、壁のひとつに刻まれていたのは、[SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting]の#italic 紋#!だった。"
 zaibatsu.1.a: "[ROOT.GetCountry.GetCapital.GetCityHubName]を光の海のように輝かせよう。"
 zaibatsu.1.b: "我が国の供給網は、まだいくらでも強化できる。"
 zaibatsu.2.t: "封じ込め"
 zaibatsu.2.t_1: "均す手"
 zaibatsu.2.d: "[SCOPE.sCharacter('pm_scope').GetLastName]内閣の取り組みにより、[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]における[SCOPE.gsInterestGroup('zaibatsu_ig').GetName]の支配力は弱まった。政治家が国を治め、財界の幹部たちは利益の追求に専念することになる。"
 zaibatsu.2.d_1: "[SCOPE.sCharacter('pm_scope').GetLastName]内閣の自由貿易政策によって、[SCOPE.gsInterestGroup('zaibatsu_ig').GetName]が[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]を支配するうえで要となっていた、国中に張り巡らされた軍産契約の網は断ち切られた。政治家が国を治め、財界の幹部たちは利益の追求に専念することになる。"
 zaibatsu.2.f: "[SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting]本社の最上階会議室へ、幹部たちが次々と入ってきた。[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]が入ったのは、秘書たちに続いて3番目だった。[SCOPE.sCharacter('name_a_scope').GetSheHe|U]は扉のそばの席に腰を下ろし、上役たちが通り過ぎていくのを見守った。目の前の茶からは、かすかに湯気が立ちのぼっていた。\n\n最後に入ってきたのは[SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting]だった。[SCOPE.sCharacter('relevant_zaibatsu_exec').GetHerHis|U]の視線は、その場にいる部下たちひとりひとりの上を順に滑っていった。[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]はその目に、この大実業家がこれまで一度も見せたことのない色を見て取った。疲労だ。顔に落ちる陰は以前にも増して深く、銀色の髪もいっそう薄くなっているように見えた。"
 zaibatsu.2.a: "主権は我々だけのものだ。"
 zaibatsu.2.b: "国民に知らしめよ。[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]は金では買えぬと。"
