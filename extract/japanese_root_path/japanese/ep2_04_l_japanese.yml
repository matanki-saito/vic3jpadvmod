 fraction_of_country_levels_owned_by_zaibatsu_ge_to_25_tt: "[concept_zaibatsu]が所有する[Concept('concept_building_level','$concept_building_levels$')]の、[ROOT.GetCountry.GetAdjective]の$concept_building_levels$全体において占める割合が[SCOPE.ScriptValue('je_zaibatsu_complete_fraction_threshold')|v%0]以上である（現在[SCOPE.ScriptValue('fraction_of_country_levels_owned_by_zaibatsu')|v%]）"
