 ep2_meiji_pulse.1.t: "切捨御免"
 ep2_meiji_pulse.1.d: "[SCOPE.sState('relevant_treaty_port_state').GetName]の旅行中、すれ違う折に下馬を拒んだ[SCOPE.sCountry('relevant_gp').GetAdjective]の商人が、[SCOPE.sCharacter('daimyo_scope').GetFullName]の供の者によって殺害された。 [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')]の大名は、この殺害について、無礼を働いた平民を斬る権利の下で合法だと主張している。"
 ep2_meiji_pulse.1.f: "異国人の一団が、銃兵隊の隊列を強引に横切ろうと割って入った。四方から怒号が飛び交う。自らを取り囲む武装した男たちに気づくと、先頭の異国人は手綱を強く引き、馬を急旋回させた。その勢いで、銃兵隊のひとりが危うく鞍上から落とされるところだった。[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]が刀を抜く。周りの仲間たちもそれに続いた。\n\n[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]が最初の一撃を放ち、異国人の脇腹を深々と斬り裂いた。相手は悲鳴を上げ、必死にもう一度手綱を引いた。だが、無駄だった。最も近くにいた銃兵も刀を抜いて斬りかかった。赤い弧が、雲のように宙に舞った。"
 ep2_meiji_pulse.1.a: "[SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')]は、我々の邪魔をすることしか頭にないようだ。"
 ep2_meiji_pulse.11.t: "生麦事件"
 ep2_meiji_pulse.11.d: "[SCOPE.sCountry('japan_scope').GetName]で商取引を行っていた[ROOT.GetCountry.GetAdjectiveNoFlag]の商人、[SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting]が、現地の領主である[SCOPE.sCharacter('daimyo_scope').GetFullName]に殺された。当該領主は、自国の法に照らして自らの行為は正当であると主張し、その犯罪に対するいかなる賠償も拒否している。"
 ep2_meiji_pulse.11.f: "#b 社説#!\n\n現状においては、[ROOT.GetCountry.GetNameNoFormatting]に残された道は、戦争に備えるか、さもなくば日本に別れを告げるか、そのいずれかしかないと本紙はあらためて断言する。かの地に築いた足場を放棄するなど、考慮にすら値しない。ゆえに、両帝国のあいだに衝突が起こるものと見ておくべきである。この考えを快く思わぬ[SCOPE.sCulture('primary_culture_scope').GetCustom('getPluralDemonym')]は多いが、[ROOT.GetCountry.GetCapital.GetCityHubName][SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')]は、これが不可避であるどころか、正当であるとすら考えている。その理由はただひとつ、日本人が[SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting]殺害の下手人を処罰することを拒んでいるからであり…（#italic 二面に続く#!）" #largely copied from The Anglo-Japanese War, New York Times, 1863
 ep2_meiji_pulse.11.a: "#italic 誰か#!が責任を取らねばならない。この件を大君に提起せよ。"
 ep2_meiji_pulse.11.b: "東洋への関与を深めることは、本当に我々の望みなのだろうか？"
 modifier_namamugi_incident_prestige_loss: "商人の殺害を黙認"
