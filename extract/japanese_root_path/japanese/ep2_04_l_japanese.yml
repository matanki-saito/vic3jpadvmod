l_japanese:
 japan_politics.1.t: "実学"
 japan_politics.1.d: "[ROOT.GetCountry.GetName]が開国したことで、蘭学の学派の多くは時代遅れとなった。より新しい思想が[ROOT.GetCountry.GetAdjectiveNoFormatting]の知識人たちの間に広がりはじめたなか、その先駆けとなったのが「実学」の学派である。"
 japan_politics.1.f: "「ただその大切なる目当ては、この人情に基づきてまず一身の行ないを正し、厚く学に志し、博く事を知り、銘々の身分に相応すべきほどの智徳を備えて、政府はその政を施すに易く、諸民はその支配を受けて苦しみなきよう、互いにその所を得てともに全国の太平を護らんとするの一事のみ。今余輩の勧むる学問ももっぱらこの一事をもって趣旨とせり」\n\n—福沢諭吉、『学問のすゝめ』" # Translated by Eiichi Kiyooka
 japan_politics.1.a: "学問によって富が得られる。"
 japan_politics.2.t: "大財閥"
 japan_politics.2.d: "[ROOT.GetCountry.GetName]の工業化に伴い、[SCOPE.gsInterestGroup('industrialists_ig').GetName]は製造業経済へと多角化を進めてきた。彼らは自らの富と国家との繋がりを利用し、産業基盤の大部分を自分たちの支配下に集中させるに至った。"
 japan_politics.2.f: "大蔵卿は、仲買人たちの入札の様子をバルコニーから見下ろしていた。米会所の時代であれば、取引の終わりは、男が手桶で群衆に水を浴びせかけることで告げられていたものだ。\n\n今、その役目を担うのは、木槌を握り、時計を凝視している男である。彼の机の近くでは、誰かが年利七分の債券を買い求めようと手を伸ばす仲買人の海に半ば埋もれながら、債券をしっかりと口にくわえて契約書に署名をしている。その喧騒は耳をつんざくほどで、買いと売りの声が混ざり合い、岩に砕ける波のような音を響かせていた。\n\n時計が時を告げると、机の男は青銅の円盤に木槌を叩きつけた。群衆からは不満の叫びが湧き起こり、土壇場の取引の音はさらに大きくなるばかりだった。男はぶつくさ言いながら机の下に身をかがめ、手桶を取り出した。"
 japan_politics.2.a: "今や、国を治めるのは銀行家だ。"
 japan_politics.3.t: "一般市民"
 japan_politics.3.d: "江戸の身分制度の崩壊により、共通の国民意識に基づく市民社会が生まれた。かつて[SCOPE.gsInterestGroup('pb_ig').GetName]とされていた者たちは、今や何よりもまず、愛国者たる市民としての自覚を持つようになった。"
 japan_politics.3.f: "市蔵は頭をゆっくりと前後に動かし、銅鏡に映る新しい髪型を確かめた。彼の髪はこれまでにないほど短く刈り込まれ、物心ついた頃から結い続けてきた髷はもうそこにはない。切り立ての毛先は太く、ざらついており、彼は何度も手を伸ばしてその感触を確かめずにはいられなかった。\n\n彼は唐突に頭を振った。これまでとは違う髪の揺らぎを感じる。それは首元をこする高い襟のついた、彼の新しい衣服と同じようなものだ。窮屈ではあるが、そこには利もある。この新しい恰好が彼の立場を世間に示し、店に客を惹きつけるのだ。彼の商売は文明的であり、彼は納税者であり、衛兵であり、国民であった。すなわち、文明人だったのである。"
 japan_politics.3.a: "国家の強さは、その国民の安寧にある。"
