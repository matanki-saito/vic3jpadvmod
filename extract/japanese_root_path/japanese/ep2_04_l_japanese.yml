 shogunate_strategy_title_decide_loc: "改革の戦略を決定"
 shogunate_strategy_title_revise_loc: "改革の戦略を見直し"
 shogunate_strategy_title_decide_desc_loc: "徳川の権力を存続させるには、幕府を改革しなければならない。将軍は2つの改革の道のいずれかを選ぶことができる。朝廷との一体化によって幕府の正統性を取り戻すか、天皇の権力を制限付きで回復し、自らを議会制政府の首長に据えるかだ。"
 shogunate_strategy_title_revise_desc_loc: "将軍の現在の改革戦略は必ずしも有利とは言えないことが判明した。方針の変更には代償が伴うが、失敗した路線には固執しないのが一番である。"
 je_meiji_restoration_proclaim_imperial_restoration: "王政復古の嘆願"
 je_meiji_restoration_proclaim_imperial_restoration_desc: "[ROOT.GetCountry.GetCustom('get_imperial_restoration_button_loc')]"
 imperial_restoration_unavailable_loc: "天皇は引き続き日本の主権者である。勅許がなければ、将軍は何百もの大名の中で一番強大であるというだけの存在に過ぎない。幕府の存続—あるいはその没落—は、すべて朝廷の意志にかかっている。"
 imperial_restoration_kobu_gattai_loc: "この危機を終わらせるには、幕府と朝廷の一体化が不可欠である。諸大名には、将軍の命令が勅命に基づくものであり、将軍が朝廷の全面的な信任を得ていることを納得させねばならない。この目的を達成するため、将軍は我が身を投げ出して、権威の再確立を天皇に委ねる必要がある。\n\nこのような策略には、清水の舞台から飛び下りるつもりで臨まなければならない。もし朝廷の協力が得られなければ、徳川家は復讐に燃える敵対勢力の中に孤立することになる。"
 imperial_restoration_kogi_yoron_loc: "この危機を終わらせるには、天皇の統治が不可欠だ。王政復古を実現しつつ徳川の権力を存続させるには、将軍が自身に有利な条件でこれを遂行しなければならない。将軍の改革の締めくくりは、行政権を天皇に返上し、徳川家の新たな役割を改革された朝廷内で確立することである。\n\nこのような策略には、清水の舞台から飛び下りるつもりで臨まなければならない。もし朝廷の協力が得られなければ、徳川家は復讐に燃える敵対勢力の中に孤立することになる。"
 je_meiji_restoration_imperial_marriage: "皇室の婚姻をまとめる"
 je_meiji_restoration_imperial_marriage_desc: "#b 公武合体#!の構想は、最も文字通りの意味での結合、すなわち現職の$RULER_TITLE_SHOGUN$と皇女の政略結婚を必要とする。$RULER_TITLE_SHOGUN$に朝廷から提示された重大な条件を受け入れる用意がなければ、この結合を実現することはできない。"
