 ep2_meiji.1.t: "尊王攘夷"
 ep2_meiji.1.d: "鎖国の終焉は、外国の侵入に対する無力感を呼び起こし、[ROOT.GetCountry.GetRuler.GetLastName]の権威を揺るがしている。幕府の敵対勢力は「#italic 尊王攘夷#!」、すなわち「天皇を敬い、異人を退けよ」という標語のもとに結集している。"
 ep2_meiji.1.f: "京都にある旅籠の二階、窓から遠く離れた奥まった一室で、黒装束の十数人の浪士たちが机を囲んで集まっていた。外では通りの物音をかき消すほどの激しい雨が降りしきっている。怒りに満ちた囁きが交わされ、不満は糾弾へと変わり、やがて誓約が結ばれて、一人の侵入者に対する死の宣告が下された。\n\nはるか遠方、磯を見下ろす屋敷では、緑の着物を纏った男が、空に立ち昇る一本の煙を見つめていた。連なる丘が海岸沿いの建造物に長い影を落とし、日が地平へと近づくにつれ、眼下の炉の輝きは次第に強さを増していった。その向こうには、水面に反射している船々の明かりが見える。いつの日か、自らの大砲がそれらを水平線の彼方に追い払うことを彼は願っていた。"
 ep2_meiji.1.a: "我らは新たな環境に適応せねばならん。"
 ep2_meiji.2.t: "幕府のあり方"
 ep2_meiji.2.d: "幕府の改革派は2つの統治論に分かれている。#italic 公武合体#!論は、朝廷との融合を通じて[GetLawType('law_bakufu').GetName]の正統性を刷新することを目指す。一方、公議政体論は、[SCOPE.sCharacter('shogun_scope').GetLastName]家を首班とする議会制の確立を目指すものである。"
 ep2_meiji.2.f: "亭主は卓の上に干菓子の盆を置き、客の一人一人に薄茶を注いだ。卓を囲んで3人の男が座っている。亭主と第一の客は髷を結い、第二の客は短髪であった。彼らの前の茶碗から湯気が立ち上っている。\n\n亭主は短髪の男に視線を向け、口を開いた。\n\n「おかえり、[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]#italic 君#!。君からの便りは受け取るたびに興味が深まるばかりだった。異人たちとの過ごすのはどんなものか、もう少し詳しく聞かせてくれないか？」"
 ep2_meiji.2.a: "幕府を刷新しなければならない。"
 ep2_meiji.2.b: "公議こそが啓蒙の道だ。"
 traditionalist_shogun_warning_tt: "@warning! [GetIdeology('ideology_traditionalist').GetName]の[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]は、#b 議会政治#!の導入に消極的"
 traditionalist_shogun_warning_present_tt: "[concept_ruler]は[GetIdeology('ideology_traditionalist').GetName]の[concept_ideology]を#b 持っていない#!"
 ep2_meiji.3.t: "皇室の婚姻"
 ep2_meiji.3.d: "天皇は、[SCOPE.sCharacter('shogun_scope').GetFullName]と皇女[SCOPE.sCharacter('imperial_princess_scope').GetFullName]の婚姻の取り決めに同意した。この婚姻は、将軍が[SCOPE.sTreaty('relevant_treaty_scope').GetName]を破棄し、再び鎖国政策へと回帰することを条件としている。"
 ep2_meiji.3.d2: "天皇は、[SCOPE.sCharacter('shogun_scope').GetFullName]と皇女[SCOPE.sCharacter('imperial_princess_scope').GetFirstName]の婚姻の取り決めに同意した。この婚姻は、将軍が外国人を追放し、再び鎖国政策へと回帰することを条件としている。"
 ep2_meiji.3.f: "行列は中山道全体を埋め尽くした。三万もの人足、家臣、そして内親王の随員たちが列をなし、尾張藩の兵士たちに周囲を守られながら飯島宿から塩尻宿まで続いている。行列の中心では、金と赤の絹で飾られた御輿に内親王が揺られている。その傍らには、[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]と[SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')]、[SCOPE.sCharacter('daimyo_3_scope').GetCustom('japan_domain_by_character')]と[SCOPE.sCharacter('daimyo_4_scope').GetCustom('japan_domain_by_character')]、[SCOPE.sCharacter('daimyo_5_scope').GetCustom('japan_domain_by_character')]と[SCOPE.sCharacter('daimyo_6_scope').GetCustom('japan_domain_by_character')]を筆頭に、十数もの藩から集まった侍たちが従った。\n\n御輿の中で、内親王は御簾のわずかな隙間から外を見つめていた。宿場町が次々と過ぎ去っていくが、どこも戸を閉ざし、静まり返っている。この先#italic 三十里#!、内親王には自らの運命に思いを馳せる時間がたっぷりあった。"
 ep2_meiji.3.a: "国益のために。"
 has_broken_relevant_treaty_tt: "[SCOPE.sTreaty('relevant_treaty_scope').GetName]を破棄した"
 ruler_does_not_have_imperial_marriage_tt: "[SCOPE.sCharacter('imperial_marriage_ruler').GetFullName]が死亡または引退"
 je_meiji_imperial_marriage: "皇室の婚姻"
 je_meiji_imperial_marriage_reason: "公武合体を進めるなかで、将軍[SCOPE.sCharacter('imperial_marriage_ruler').GetFullName]は皇女[SCOPE.sCharacter('imperial_princess_scope').GetFirstName]との政略結婚を取り付けた。この婚姻に対する天皇の同意は、[GetGeographicRegion('geographic_region_home_islands').GetName]から外国人を追放し、再び鎖国政策へと回帰することを前提としている。\n\n将軍がその誓約を果たせば、この婚姻は日本の名目上の統治者と実際の統治者との間に生じた亀裂の修復に大いに貢献するだろう。"
 je_will_fail_tt: "[concept_journal_entry]が#b 失敗#!する"
 je_has_timed_out_tt: "[concept_journal_entry]が#b タイムアウト#!する"
 ep2_meiji.4.t: "[ROOT.GetCountry.GetCustom('get_sexagenary_cycle_term')]戦争"
 ep2_meiji.4.d: "領地と官位の剥奪に憤った[SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle]の[SCOPE.sCharacter('shogun_scope').GetFullName]とその忠実な家臣たちが、朝廷に反旗を翻した。[SCOPE.sCharacter('shogun_scope').GetSheHe|U]は、天皇の権力の復古を覆し、幕府を復活させようとしている。"
 ep2_meiji.4.f: "「天皇の臣である[SCOPE.sCharacter('shogun_scope').GetFirstNameNoFormatting]は、先月九日以来の情勢を謹んで考察いたしましたが、これら一連の出来事はいずれも朝廷の真意によるものではなく、すべて[SCOPE.sCharacter('councilor_scope').GetLastNameNoFormatting]公の奸臣どもの陰謀に端を発しているものと存じます。このことは天下に知れ渡っており、江戸、長崎、野州、総州をはじめとする諸国で騒乱が生じております。\n\nこれらは天地ともども憎むべき所業であるため、あの奸臣どもを引き渡す勅命を下されますよう、恐れながらお願い申し上げます。もしこの願いが聞き届けられない場合は、我々はやむなく彼らを誅するしかありません」" # Edited petition by Yoshinobu
 ep2_meiji.4.a: "これこそが我々の願いだ。逆臣を討ち、平和を取り戻すのだ。" # Emperor Meiji's plausibly fraudulent imperial decree of 1867
 ep2_meiji.4.b: "天皇は盗賊たちの配下に置かれている。"
 ep2_meiji.41.d: "権力を固持しようとする[SCOPE.sCharacter('shogun_scope').GetLastName]家に憤り、王政復古派の諸藩による連合軍が[SCOPE.sCharacter('shogun_scope').GetFullName]に反旗を翻した。彼らは徳川の影響を排除し、天皇の政治的主権の回復を目指している。"
 ep2_meiji.41.f: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]は城壁の上に立ち、眼下を見つめていた。その視線の先では、[SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')]の兵士の隊列が門から次々と出陣していく。紺色の筒袖に陣笠という新式の軍服姿の近代化された一団もあれば、赤、緑、青という伝統的な装束のままの者たちもいる。新式の軍服を着た者たちが列の先頭に配置されると、[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]の数メートル左に陣取った外国人の観戦武官たちから称賛の視線が集まった。彼らの後にはマスケットライフルを携えた騎馬武者が続き、さらにその後ろには砲兵隊が控えていた。\n\n[SCOPE.sState('revolter_state').GetCityHubName]郊外には集結地が置かれており、彼らはそこで同盟諸藩の軍と合流して、将軍の軍勢に立ち向かうべく進軍することになっていた。遥か彼方、その壁のような剣と銃剣の向こうには、囚われの身となった天皇が待ちわびている。"
 ep2_meiji.41.a: "この狂信者たちを撃退しなければならない。"
 ep2_meiji.41.b: "尊王攘夷だ！"
 kinmon_civil_war_tt: "[ROOT.GetCountry.GetName]は#b 幕府#!と#b 朝廷#!の間の#r $concept_civil_war$#!に陥る"
 ep2_meiji.5.t: "大政奉還"
 ep2_meiji.5.d: "反[GetLawType('law_bakufu').GetName]派からの圧力の高まりに直面し、[SCOPE.sCharacter('shogun_scope').GetFullName]は自らの統治権を朝廷に返上すると天皇に奏上した。"
 ep2_meiji.5.f: "「朝廷のもとに権力を一つとしなければ、我が国の根本的な原則を維持することはできません。そのため、これまでの旧習を改め、政権を朝廷に返上すべきと考えます。\n\n広く天下の公議を尽くし、聖断を仰いだうえで、皆が心を同じくして国に尽くせば、必ずこの皇国を守り抜き、海外万国と肩を並べることができると存じ上げます」\n\n—徳川慶喜、1867年"
 ep2_meiji.5.a: "彼の足下には支えるものは何もない。"
 ep2_meiji.51.t: "勅許"
 ep2_meiji.51.d: "[SCOPE.sCharacter('shogun_scope').GetFullName]による政権返上の上表に対し、天皇が返答を下した。将軍の上奏は聞き届けられ、天皇の政治的主権が回復した。"
 ep2_meiji.51.f: "「日本国天皇は、諸外国の君主およびその臣民に対し、将軍[SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting]が自らの願いにより統治権を返上することを許可した旨を布告する。朕は今後、国内外のすべての事柄において最高の権威を有するものとする。これに伴い、諸条約において用いられてきた『大君』の称号は、『天皇』の称号に改められるべきである。外交事務を担当すべき官吏は、すでにこれを任命した。条約締結国の代表者各位が本布告を承認することを望む」"
 ep2_meiji.51.a: "感動の極みだ。"
 ep2_meiji.52.t: "勅許"
 ep2_meiji.52.d: "[SCOPE.sCharacter('shogun_scope').GetFullName]による政権返上の上表に対し、天皇が返答を下した。そこには、将軍は今後も朝廷の信任を受け、幕府が引き続き政権を保持すると記されていた。"
 ep2_meiji.52.f: "[ROOT.GetCountry.GetCustom('japan_choshu_castle_name')]城には軍靴の音が響いていた。この一週間のさらに詳しい知らせを持って、伝令や家臣たちが一日中出入りを繰り返している。 [SCOPE.sCharacter('choshu_daimyo_scope').GetFullNameNoFormatting]は自らその報告を受けていた。どの引見でも固く沈黙を守ったままだ。将軍が凱旋したこと、会津藩が御所の守護を任されたこと—情勢の変化を聞くごとに、その眉間の皺はますます深くなった。\n\n表御殿の外では、すでに日が沈んでいた。[SCOPE.sCharacter('choshu_daimyo_scope').GetFirstNameNoFormatting]は集まった二十名の家臣を上段から見渡した。「長州は屈さぬ」と、[SCOPE.sCharacter('choshu_daimyo_scope').GetSheHe]は言った。「このこと、肝に銘ぜよ」\n\nそして立ち上がると、部屋を後にした。"
 ep2_meiji.52.a: "諸分家は彼を受け入れた。"
 ep2_meiji.6.t: "王政復古の大号令"
 ep2_meiji.6.d: "[SCOPE.sCharacter('shogun_scope').GetLastName]家に反対する朝廷内の勢力が天皇を説得し、自らの主権回復を正式に宣言する勅令が下された。この勅令により幕府は廃止され、あらゆる公職から[SCOPE.sCharacter('shogun_scope').GetFullName]を排除した政府が樹立される。"
 ep2_meiji.6.f: "「[SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting]は、長く委ねられてきた政務の権限を朝廷に返上することを願い出るとともに、将軍職を辞する意向を示した。その申し出は受理された。周知のとおり、我が国は先帝が深く憂慮されていた未曽有の国難に直面している。そのため、陛下の賢明なる御熟慮により、皇政復古と国威回復の礎を築くことが決定された。\n\nこれより摂政・関白・将軍の職を廃止し、新たに総裁・議定・参与の三職を置く。すべての政務は文武の別、公家平民の別なく、人々の公正な議論をもって決定されるものとする」" #- Modifier text of the Great Proclamation of the Restoration of Imperial Rule
 ep2_meiji.6.a: "孤立無援だ。"
 ep2_meiji.7.t: "大君制"
 ep2_meiji.7.d: "朝廷には統治の実務能力が欠けていたため、govern[SCOPE.sCharacter('shogun_scope').GetLastName]家の同盟者たちは、[SCOPE.sCharacter('shogun_scope').GetFullName]に「大君」の称号を認めるよう天皇を説得した。これにより、[SCOPE.sCharacter('shogun_scope').GetHerHim]は朝廷要職の長に就くことになる。"
 ep2_meiji.7.f: "「諸藩の大名が追々参集すれば、やがて議論が行われることになる。近ごろは公議の気運が世に満ち、この言葉が世に広く唱えられている以上、世論に従わざるを得ない。ゆえに切に願うのは、できる限り意見を一致させ、この参集の趣旨が正しく打ち立てられるよう取り計らうことである。\n\nもし議論の過程で不和が生じ、争いにまで至るようなことがあれば、たとえ御家の勝利に帰したとしても、それは諸外国が外より迫るなか、兄弟が内で争うのと同じことである」\n\n—西周助『議題草案』"
 ep2_meiji.7.a: "再び足場が固まった。"
 ep2_meiji.8.t: "朝廷と幕府"
 ep2_meiji.8.d: "天皇家との婚姻関係と、天皇への誓紙により、[SCOPE.sCharacter('shogun_scope').GetFullName]は朝廷と幕府の間の緊張を和らげた。天皇は将軍が恒久的な平和を保証してくれると確信し、引き続き隠遁生活を続けることができる。"
 ep2_meiji.8.f: "国の風\n吹き起こしても\n天つ日を\nもとの光に\nかへすをぞ待つ\n\n—孝明天皇"
 ep2_meiji.8.a: "嵐は止んだ。"
 ep2_meiji.9.t: "同輩中の首席"
 ep2_meiji.9.d: "自信と巧みな策を通じて、[SCOPE.sCharacter('taikun_scope').GetFullName]は天皇の復権と自らの一族の存続の両方を達成した。[SCOPE.sCharacter('taikun_scope').GetLastName]の大君は近代$JAP$の貴族階級における「同輩中の首席」として君臨することになる。"
 ep2_meiji.9.f: "天皇はもはや御簾の奥には座していなかった。御前の卓を囲んで廷臣たちが居並び、大君が天皇の左に座していた。誰もが新たな宮廷礼装をまとい、その袖口と胸元には精巧な金箔の装飾が施されていた。見慣れぬ席で身じろぎするたび、勲章が触れ合ってかすかな音を立てた。\n\nこの一時間というもの、議論の進行を担っていたのは大君であり、天皇は一言も発しなかった。ただ静かに耳を傾け、発言者ひとりひとりに順に視線を送るばかりであった。部屋の端では、かつて#italic 尊王攘夷#!を奉じていた人物が、アメリカへの使節派遣の必要性を説いていた。"
 ep2_meiji.9.a: "将軍が倒れ、大君が台頭する。"
 ep2_meiji.9.b: "天皇は天子であり、徳川はその手足である。"
 modifier_continuity_and_enlightenment: "継続と啓蒙"
