 shogunate.1.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName]の任命" # Ieyoshi
 shogunate.1.d: "[SCOPE.sCharacter('shogun_scope').GetLastName]家の新たな当主として、[SCOPE.sCharacter('shogun_scope').GetFullName]は天皇から将軍の職を宣下された。この新しい将軍はまだ個人としての権威を確立しておらず、多くの[SCOPE.gsInterestGroup('daimyo_scope').GetName]から嘲りの目で見られている。"
 shogunate.1.f: "さまざまな色の装束をまとった大名たちが、虹のような列をなして大広間を進んだ。その最上段の高座には黒と赤の装束に身を包んだ将軍が座し、右脇には天皇の宣旨を収めた箱が置かれている。\n\n赤、青、紫などの衣を纏った貴族たちが一人、また一人と平伏し、刀や黄金を献上した。将軍も、平伏する者たちも言葉を発することはない。下位の者たちは拝謁を許されず、広間の外にひしめき合っている。庭からは掛け声が上がった。"
 shogunate.1.a: "ご昇進、ご昇進！"
 shogunate.2.t: "後継者問題"
 shogunate.2.d: "[SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle]の長男、[SCOPE.sCharacter('iesada_scope').GetFirstName]の体調不良により、彼が[SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle]の職務を全うできるかを懸念する声が上がっている。外様大名は[SCOPE.sCharacter('armed_forces_leader').GetFullName]を先導者として結集し、代わりの将軍候補に[SCOPE.sCharacter('yoshinobu_scope').GetFullName]を担ぎ出した。"
 shogunate.2.f: "[SCOPE.sCharacter('armed_forces_leader').GetFirstNameNoFormatting]の寝所には誰もいなかった。障子は閉め切られ、縁先は人払いをしてある。[SCOPE.sCharacter('armed_forces_leader').GetSheHe|U]は白紙を前にして、枕元に座っていた。その目は閉じられている。隣の廊下を猫が歩いても、その音を聞き逃しはしないだろう。しかし[SCOPE.sCharacter('armed_forces_leader').GetSheHe]は、誰かが耳をそばだてているのではないかという疑心を消し去ることができなかった。まだこの段階では、野望を自分の心の中にしっかりと留めておくのが最善なのだ。\n\n朝廷もこの事態を[SCOPE.sCharacter('armed_forces_leader').GetHerHim]と同じように捉えるだろうか？そう信じるに足る理由はあったが、それは山積する疑問の中で最も簡単なものに過ぎなかった。[SCOPE.sCharacter('armed_forces_leader').GetHerHis|U]の思考は巡る。いかにして勅許を取り付けるべきか。そして、その勅許が闇に葬られないようにするには、どうすればよいのか。"
 shogunate.2.a: "[GetLawType('law_bakufu').GetName]中枢の意向が通るだろう。"
 shogunate.2.b: "この状況には、断固たる指導力が必要だ。"
 shogunate.3.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName]の任命" # Iesada
 shogunate.3.d: "[SCOPE.sCharacter('shogun_scope').GetLastName]家の新たな当主として、[SCOPE.sCharacter('shogun_scope').GetFullName]は天皇から将軍の職を宣下された。幼い頃から病弱であったため、将軍の健康状態を発端としてその後継を巡る争いがすでに巻き起こっている。"
 shogunate.3.f: "$shogunate.1.f$"
 shogunate.3.a: "ご昇進、ご昇進！"
 shogunate.4.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName]の任命" # Yoshinobu
 shogunate.4.d: "[SCOPE.sCharacter('shogun_scope').GetLastName]家の新たな当主として、[SCOPE.sCharacter('shogun_scope').GetFullName]は天皇から将軍の職を宣下された。改革派の諸藩にいる新将軍の支持者たちは、彼の統治に大きな期待を寄せている。"
 shogunate.4.f: "$shogunate.1.f$"
 shogunate.4.a: "ご昇進、ご昇進！"
 shogunate.5.t: "一橋派と南紀派"
 shogunate.5.d: "将軍家慶の後継をめぐって生じた諸派は、子のない[SCOPE.sCharacter('shogun_scope').GetFullName]の後継を巡って再び衝突した。外様大名や下級[SCOPE.gsInterestGroup('armed_forces_ig').GetName]からなる一橋派は[SCOPE.sCharacter('yoshinobu_scope').GetFullName]を支持し、一方で譜代[SCOPE.gsInterestGroup('daimyo_ig').GetName]からなる南紀派は、[SCOPE.sCharacter('iemochi_scope').GetFullName]を支持している。"
 shogunate.5.f: "使者は無表情のまま、高座の男の前で床を見つめている。男の筆は紙の上で宙に浮いたまま動きを止めた。\n\n「義勝様への言伝だ」と奉行は言った。「朝廷の中には、上様のご不例について良からぬ憶測に浸っている者がいる。まるで上様が物言わぬ存在であるかのように議論しているのだ。そのような前提で作られた草案が現れたなら、私に知らせよ」"
 shogunate.5.a: "将軍の御意志は、[SCOPE.sCharacter('iemochi_scope').GetFirstName]の統治である。"
 shogunate.5.b: "朝廷は、経験豊かな後継者を求めている。"
 shogunate.6.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName]の任命" # Iemochi
 shogunate.6.d: "[SCOPE.sCharacter('shogun_scope').GetLastName]家の新たな当主として、[SCOPE.sCharacter('shogun_scope').GetFullName]は天皇から将軍の職を宣下された。若年ではあるが、この将軍はすでに冷静沈着かつ細緻な判断力を備えているとの評判を得ている。"
 shogunate.6.f: "$shogunate.1.f$"
 shogunate.6.a: "ご昇進、ご昇進！"
 shogunate.6.a_regency: "[SCOPE.sCharacter('shogun_scope').GetSheHe|U]は、忠実な後見人のもとで統治することになる。"
 shogunate.6.b_regency: "一橋派と妥協し、[SCOPE.sCharacter('yoshinobu_scope').GetFirstName]を[SCOPE.sCharacter('shogun_scope').GetHerHis]の将軍後見職に任命する。"
 shogunate.7.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName]の任命" # Iesato
 shogunate.7.d: "[SCOPE.sCharacter('shogun_scope').GetLastName]家の新たな当主として、[SCOPE.sCharacter('shogun_scope').GetFullName]は天皇から将軍の職を宣下された。世情に明るく、柔軟な思考を持つこの将軍は、[GetLawType('law_bakufu').GetName]の改革派諸派を後援するものと期待されている。"
 shogunate.7.f: "$shogunate.1.f$"
 shogunate.7.a: "ご昇進、ご昇進！"
 shogunate.8.t: "暑い夏"
 shogunate.8.d: "夏の暑さにより、年老いた[SCOPE.sCharacter('shogun_scope').GetFullName]の健康が急激に悪化した。いまや床に伏す[SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle]は、衰えゆく心臓との最後の戦いに臨まねばならない。"
 shogunate.8.f: "将軍の寝床は窓に向けて移されていた。海から吹き込む涼風が自分たちが動かす扇の助けになればと、侍従たちは考えたのだ。床の足元の開いた長持ちに氷が入れられ、額には濡れた手拭が当てられている。\n\nだが、今日は風がなかった。沈みゆく夕日の下で陽炎のようにゆらめく空気は容赦なく、すべてを包み込んでいる。もはや彼には、眼下の波の形すら判然としなかった。"
 shogunate.8.a: "もう終わりだ。"
 shogunate.8.b: "オランダ渡来の治療をしよう。"
