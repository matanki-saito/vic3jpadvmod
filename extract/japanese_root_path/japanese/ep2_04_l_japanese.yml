 ep2_meiji_pulse.3.t: "下関戦争"
 ep2_meiji_pulse.3.d: "長州藩の大名である[SCOPE.sCharacter('choshu_daimyo_scope').GetFullName]は、外国人を追放せよという天皇の命令に従う意向を示した。[SCOPE.sCharacter('choshu_daimyo_scope').GetSheHe|U]は自らの海軍に対し、下関海峡を通過するすべての外国艦船を砲撃するよう命令した。その結果、[SCOPE.sCountry('relevant_gp').GetAdjective]戦艦との交戦が発生している。"
 ep2_meiji_pulse.3.f: "白昼の雷鳴が火の山のなだらかな斜面を轟きわたり、正毅は思わず空を見上げた。そこにあったのは、ふくらんだ白い雲だった。\n\n「見ろ！」と次郎が叫ぶ。視界に手が入り込み、下方を指さした。全速力の蒸気船が眼下の海峡を突き進み、正毅には見えぬ何かへ向けて砲撃を加えていた。船体からは破片が飛び散っていたが、それでもなお進み続ける。その上空では、また別の雲が広がりつつあった。"
 ep2_meiji_pulse.3.a: "あの外国人たちは我々ができないことをしている。"
 ep2_meiji_pulse.3.b: "藩が和解に達するのを支援する。"
 ep2_meiji_pulse.3.c: "協定と引き換えに、西洋人に港を提供する。"
 treaty_name_shimonoseki_war_indemnity: "下関戦争の賠償金"
 modifier_defeated_westerners: "敗北した西洋遠征隊"
 modifier_bombardment_of_domain: "藩城下への砲撃"
 ep2_meiji_pulse.4.t: "[SCOPE.sCountry('relevant_gp').GetAdjective]公使館の焼き討ち"
 ep2_meiji_pulse.4.d: "[SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')]藩の#italic 尊王攘夷派#!の侍たちが、[SCOPE.sState('edo_state').GetCityHubName]で建設中の[SCOPE.sCountry('relevant_gp').GetAdjective]公使館を襲った。この町で最初の西洋式建築となるはずだった建物は焼け落ち、犯人たちは行方をくらました。"
 ep2_meiji_pulse.4.f: "ふたりの男が頭巾で顔を覆ったまま、丘の上に身を落ち着けた。そこからは、公使館になるはずだった建物を見下ろすことができた。その黒く焼け焦げた残骸からは、橙色の光がなおも立ち昇っている。燃えやすい場所はあらかた焼き尽くされ、炎は奥の太い梁にしがみつくようにして、かろうじてその命を保っていた。\n\nやがて光が完全に消えても、ふたりの男はそこを動かなかった。ひとりが、立ち昇る煙の柱を見つめたまま、静かな声で言う。\n\n「あの灰が雪のように降りかかってきたら、さぞ美しいだろうな」"
 ep2_meiji_pulse.4.a: "[SCOPE.sState('edo_state').GetCityHubName]はもはや統治不能だ。"
 ep2_meiji_pulse.4.b: "[SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')]藩の者が市中で武器を携帯することを禁止する。"
 shimonoseki_indemnity_tt: "[ROOT.GetCountry.GetName]は[SCOPE.sCountry('relevant_gp').GetName]に対し、#v 10#!年にわたって@money!#v 300万#!の賠償金を支払う"
 shimonoseki_indemnity_port_tt: "[GetStateRegion('STATE_KANSAI').GetName]の$HUB_NAME_STATE_KANSAI_port_japanese$の町は、[SCOPE.sCountry('relevant_gp').GetAdjective]の[concept_treaty_port]として開港される"
 modifier_ungovernable_capital: "統治不能を認める"
 ep2_meiji_pulse.5.t: "血塗られた復讐"
 ep2_meiji_pulse.5.d: "幕府の大老である[SCOPE.sCharacter('tairo_scope').GetFullName]が、江戸城の門で[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]と[SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')]の両藩の浪士によって暗殺された。刺客たちが残した斬奸趣意書には#italic 尊王攘夷#!の理念が綴られており、外国勢力に対する大老の譲歩を糾弾している。"
 ep2_meiji_pulse.5.f: "忠三郎は、五六郎が行列の前へ進み出るのを見た。[SCOPE.sCharacter('tairo_scope').GetCustom('japan_domain_by_character')]藩の護衛のひとりが、彼を遮ろうと動く。だが五六郎はその暇を与えず、刀を抜いて踏み込む。[SCOPE.sCharacter('tairo_scope').GetCustom('japan_domain_by_character')]藩士の顔は真っ二つに裂け、そこから噴き出す血潮が大きな弧を描いた。その仲間たちは、仇を討たんと一斉に前へ躍り出た。\n\n忠三郎は雨合羽を脱ぎ捨て、懐から短銃を抜いた。駕籠の側面に狙いを定め引き金を引く。銃声が、刃の打ち合う音と怒号を切り裂いた。続けてもう一発。護衛のひとりが忠三郎に向き直ったその瞬間、[SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')]藩の浪人、治左衛門がその胴へ刀を振り下ろした。斬り合うふたりの向こうに、忠三郎は駕籠の戸口から雪積もる路上へと流れ出る赤い川を見た。彼は脇差を抜き、駕籠へ向かって駆けた。"
 ep2_meiji_pulse.5.a: "武士たちが再び剣を交えた。"
 modifier_tairo_assassinated: "大老の暗殺"
 ep2_meiji_pulse.6.t: "池田屋事件"
 ep2_meiji_pulse.6.d: "[SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName]の志士たちの拷問から得た情報を手掛かりに、[GetLawType('law_shinsengumi').GetName]は[SCOPE.sState('kyoto_state').GetName]の旅籠、池田屋に集結していた謀反の疑いのある者たちを急襲した。この襲撃は、池田屋内部はおろか周辺も巻き込む激しい斬り合いに発展している。"
 ep2_meiji_pulse.6.f: "新選組が扉を破ってなだれ込んできたとき、大高は手すりに身を預けて踏みこたえた。浅葱色の#italic 羽織#!の袖に滲んだ血痕は、薄暗い灯火の下では白地を黒く染めているように見えた。彼は刀を構え、迎え撃つ姿勢を取った。\n\nふたりの隊士が隊列から離れ、彼の守る階段を並んで駆け上がってくる。大高は刀を打ち込み、受け止められた手応えを得ると、すぐさま態勢を立て直した。刃が噛み合い、火花が散る。もうひとりが斬り込んできた。彼は一歩退き、手首を返し——\n\n炎に照らされた鋼の閃き。そして、胸に冷たいものが走った。"
 ep2_meiji_pulse.6.a: "新選組の活躍に褒賞を与えよ。"
 ep2_meiji_pulse.6.b: "このような暴力は、報復を招くだけだ。"
 modifier_shinsengumi_meddling: "傍若無人な新選組"
 modifier_shinsengumi_crackdown: "新選組による取り締まり"
 modifier_refrained_from_crackdowns: "新選組の抑制"
 sufficient_pressure_from_sonno_joi_tt: "[SelectLocalization(SCOPE.sPoliticalMovement('meiji_movement_scope').IsValid, SCOPE.sPoliticalMovement('meiji_movement_scope').GetName, 'movement_meiji_restorationist_name')]の[concept_activism]が@activism_red! $RADICALISM_PROTESTING$（#v [GetDefine('NPolitics', 'RADICALISM_PROTESTING_THRESHOLD')|%0]#!）を上回っている"
 ep2_meiji_pulse.7.t: "禁じられた門"
 ep2_meiji_pulse.7.d: "[SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName]に同調する[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]藩の兵たちが、[SCOPE.sState('kyoto_state').GetName]御所に突入し、武力によって天皇を復権させようとした。[SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')]藩および会津藩の兵たちがこれを迎え撃っている。"
 ep2_meiji_pulse.7.f: "蛤御門には砲煙が立ち込めており、京の町は火の手に包まれつつあった。\n\n会津兵は城壁沿いに密集して布陣し、[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]藩の大砲や街道に向けて、絶え間なく一斉射撃を浴びせていた。数秒おきに、飛んでくる弾丸が誰かの肉を打ち、銃声の爆ぜる音を一瞬だけ突き抜けて悲鳴が聞こえてくる。幸三は大砲の車輪に身を寄せ、銃の弾詰まりを必死に直そうとしていた。ほんの#italic 一間#!先には、幸三の隊の組頭がうつ伏せに倒れていた。両腕も両脚もない。それでもなお、身をよじらせていた。"
 ep2_meiji_pulse.7.a: "[SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')]と会津は襲撃者の撃退に成功した。"
 ep2_meiji_pulse.7.b: "御所は[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]に掌握された。"
 coup_resistance_below_daimyo_coup_strength_tt: "[ROOT.GetCountry.GetName]の[concept_coup_resistance]（[SCOPE.ScriptValue('country_coup_resistance')|v2]）が [SCOPE.sCharacter('daimyo_1_scope').GetFullName]の[concept_coup_strength]（[SCOPE.sCharacter('daimyo_1_scope').MakeScope.Var('monthly_cached_commander_coup_strength').GetValue|v2]）を下回っている"
 ep2_meiji_pulse.8.t: "[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]征伐"
 ep2_meiji_pulse.8.d: "[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]の御所襲撃の報復として、将軍は#italic 尊王攘夷#!派をその藩から追放するための征伐を命じた。[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]に同情的な重臣たちは、罪を負う者たちの切腹と引き換えに、和睦を結ぶという調停案を提示している。"
 ep2_meiji_pulse.8.f: "[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]藩主の[SCOPE.sCharacter('daimyo_1_scope').GetFullNameNoFormatting]は城の露台に立ち、遠くを見つめていた。はるか彼方では、近づきつつある軍勢の篝火が、幾筋もの煙となって空を濁していた。\n\n「将軍は、家老3名の切腹を求めております」と家臣は言った。「さらに、側近4名の打ち首、そして5人の公家の追放を」\n\n[SCOPE.sCharacter('daimyo_1_scope').GetFirstNameNoFormatting]は篝火の方へ目を向けた。少なく見積もっても、何百とある。かつて青かった地平は、いまや病んだような色に変わっていた。やがて、彼は口を開いた。\n\n「…[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]藩は、恭順する」"
 ep2_meiji_pulse.8.a: "戦わずして相手を打ち負かすことができるなら、それでもよい。"
 ep2_meiji_pulse.8.b: "あの藩は徹底的に粛清すべきだ。"
 modifier_daimyo_house_arrest: "大名の謹慎"
 modifier_daimyo_executed: "大名の領地召上"
 ep2_meiji_pulse.9.t: "攘夷実行の勅命"
 ep2_meiji_pulse.9.d: "西洋列強が[ROOT.GetCountry.GetName]に強要した条約に憤った天皇は、将軍を介することなく、[ROOT.GetCountry.GetAdjectiveNoFormatting]の地から外国人を排斥せよとの勅命を直接下した。[SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName]の兵たちは天皇の大義のもとに結集している。"
 ep2_meiji_pulse.9.f: "家臣は大砲の脇に立ち、海峡の方を見つめていた。この刻限、海峡を往く蒸気船は、沈みゆく夕日に照らされて黒い影絵と化していた。傍らでは、長州藩の下級武士たちが、槊杖と黒色火薬の袋を手に忙しなく立ち働いている。\n\nふと火の山を見上げ、その麓に広がる下関の町並みに目を遣ると、あの勅書の一節が脳裏をよぎった。「たとえ国土が灰燼に帰そうとも、通商のための開港は断じて許さぬ」と、そこには記されていた。\n\nあれは正しかったのだろうか？あのなだらかな緑の斜面が黒く焼かれることを、花咲く野が焼き払われることを、我が故郷が踏み潰されることを、己は許せるのか？——許せる、と彼は思った。一片の迷いもなく。"
 ep2_meiji_pulse.9.a: "この件について話し合うため、将軍は上洛せねばならない。"
 ep2_meiji_pulse.9.b: "この勅令は偽物だ。なかったことにせよ。"
