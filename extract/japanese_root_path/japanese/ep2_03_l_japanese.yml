l_japanese:
 #Japan Single-Fire Events
 japan_events.31.t: "[SCOPE.sState('kabuki_theatre_state').GetCityHubName]の歌舞伎小屋が焼失"
 japan_events.31.d: "[SCOPE.sState('kabuki_theatre_state').GetName]の有名な歌舞伎小屋が火事で焼け落ちた。一座は再建の計画を立てているが、[SCOPE.gsInterestGroup('relevant_ig').GetName]の面々、特に[SCOPE.sCharacter('relevant_leader').GetFullName]は、これに乗じて[SCOPE.sState('kabuki_theatre_state').GetCityHubName]での娯楽を規制し、役者たちに芝居小屋を市街地の外へと移転させようとしている。"
 japan_events.31.f: "火の見櫓の上では、一人の見張りが落ち着かない様子で[SCOPE.sState('kabuki_theatre_state').GetCityHubName]を見張っていた。夜も更けたころ、彼は見張り台から火事の兆しを見つけた。煙がなびき、火の粉の刺激臭が周囲に立ち込めるなか、彼は急いで半鐘を打ち鳴らす。\n\n不意を突かれた町人たちは危険を知らされ、火消したちが屋根に登って炎を抑えようと奔走する。ようやく火は消し止められたが、すでに多大な被害が出たことは明らかだった。この破壊的な火災によって、名の知れた歌舞伎小屋もただ灰燼に帰してしまった。"
 japan_events.31.a: "再建は市街地の外だ。"
 japan_events.31.b: "一座に再建を許す。"
 modifier_kabuki_regulated: "歌舞伎小屋の取り締まり"
 modifier_theatre_affronted_official: "面目を失った役人"
 modifier_shogunate_opposition_ig_approval: "日和見主義の反対派"
 japan_events.32.t: "浮世の絵"
 japan_events.32.d: "[SCOPE.sState('ukiyo_e_state').GetCityHubName]で活動する多作な浮世絵師の作品が、国内外の芸術家たちの創造意欲を掻き立てている。"
 japan_events.32.f: "[SCOPE.sState('ukiyo_e_state').GetCityHubName]郊外の賑やかな芝居町を描いた人気の木版画がある。銀色の月光が人でいっぱいの大通りを照らし、その姿が地面に影を落としている。通りの東側には茶屋や人形浄瑠璃の小屋が並び、その反対側、つまり西側には、それぞれ太鼓櫓を備えた3つの歌舞伎小屋が建っている。\n\n「これほどまでに力強く正確な筆使い、そしてまさに置くべき場所に施された極めて繊細なぼかしは、熟練の手によってのみ成し遂げられるものだ。そして、これほど律動的に全体を構成し、力強いと同時にこの上なく優美な人物像を思い描けるのも、熟達した精神だけである」\n— F.W.G.、『#italic シカゴ美術館紀要#!』"
 japan_events.32.a: "[ROOT.GetCountry.GetAdjectiveNoFormatting]の芸術は、疑いなく今後も世界的な名声を高めていくだろう。"
 japan_events.32.b: "素晴らしい。これらの作品の制作をさらに奨励しよう。"
 modifier_ukiyo_e_prestige: "木版画の多作"
 modifier_ukiyo_e_production: "木版画の制作"
 japan_events.33.t: "伝統との格闘"
 japan_events.33.d: "[ROOT.GetCountry.GetAdjectiveNoFormatting]文化に対する西洋化の影響は大きい。習慣が急速な変化するなか、[SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]である[SCOPE.sCharacter('relevant_character').GetFullName]は、民衆が抱く伝統への反感を和らげるため、相撲の大会を[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]で後援している。"
 japan_events.33.f: "寺の境内に新設された相撲場には、[SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]が後援するこの催しに好奇心をそそられた人々が集まり始めている。その中には、こうした伝統との繋がりを維持することに懐疑的な、西洋かぶれの貴族や政治家たちの姿もある。相撲の黄金時代は過ぎ去って久しいが、[SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]である[SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting]の観戦により、この競技の文化的重要性が人々の間で再評価されるかもしれない。"
 japan_events.33.a: "[SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]の尽力により、この競技に対する大衆からの評価は回復するだろう。"
 japan_events.33.b: "この[ROOT.GetCountry.GetAdjectiveNoFormatting]の競技の伝統は、長く続いていくだろう。"
 modifier_restored_sumo_popularity: "相撲人気が回復"
 modifier_traditional_sports_movement_support: "国技"
 japan_events.34.t: "[SCOPE.sState('whaling_state').GetPortHubName]での捕鯨事故"
 japan_events.34.d: "[SCOPE.sState('whaling_state').GetName]沖を航行していた船が2頭の鯨を発見した。母子のセミクジラであった。今期の不漁に喘いでいた捕鯨団は、悪天候を顧みず海へと漕ぎ出した。100人以上が行方不明だと報告されている。"
 japan_events.34.f: "船の篝火はすでに視界から消え、船団の姿も陸からはもはや確認できなくなってしまった。[SCOPE.sState('whaling_state').GetPortHubName]の港は大騒ぎになっている。\n\n「どれほど苦しい時でも、我々は親子連れの鯨だけは捕ることを避けてきたのだ」と、一人の男が言う。「あの鯨たちは逃がしてやるべきだった」\n\n「馬鹿を言うな」と、彼の従兄弟が言い返す。「あれは天からの恵みだ。船団はすぐに、大漁で戻ってくるさ」"
 japan_events.34.a: "$bg_whaling$は[SCOPE.sState('whaling_state').GetNameNoFormatting]の重要な産業だ。"
 japan_events.34.b: "今後、[SCOPE.sState('whaling_state').GetNameNoFormatting]では$bg_fishing$の方に力を入れる。"
 modifier_whaling_deaths: "捕鯨による犠牲者"
 modifier_redouble_on_whaling: "捕鯨の未来"
 modifier_fishing_not_whaling: "漁業の未来"
 japan_events.35.t: "放火防止策"
 japan_events.35.d: "[SCOPE.gsInterestGroup('relevant_ig').GetName]は、[SCOPE.sState('relevant_state').GetCityHubName]市中での放火件数の増加によって、[ROOT.GetCountry.GetName]での[SCOPE.sGoods('expensive_good').GetName]の価格が上昇していることを懸念している。彼らは厳格な放火対策をさらに強化する必要があると主張している。"
 japan_events.35.f: "火の見櫓から半鐘が鳴り響き、差し迫った危険を全住民に知らせている。[SCOPE.sState('relevant_state').GetCityHubName]の市街地で再び火災が発生し、住宅や商店が炎に包まれているのだ。火消したちが消火に駆けつけるなか、通りには$strata_commoners_townspeople$が大勢集まってきた。隣人に疑いの目を向ける者もいれば、これは事故なのか、それとも放火犯の仕業なのかと推測を始める者もいる。一つ確かなのは、[SCOPE.sGoods('expensive_good').GetNameNoFormatting]の価格がまもなく何倍にも跳ね上がるということだ。"
 japan_events.35.a: "厳格な措置が必要だ。放火の疑いがある者を処刑せよ。"
 japan_events.35.b: "逮捕に協力した者は、これまでの罪を赦免されるものとする。"
 modifier_arson_measure_strict_ig: "厳格な放火対策"
 modifier_arson_measure_strict_pop: "放火犯の処刑"
 modifier_arson_measure_lenient_ig: "寛大な放火対策"
 # Colonization of Korea Content
 je_colonize_korea: "朝鮮統監府"
 je_colonize_korea_reason: "#italic 「善政と平和のもとにあってこそ、産業と商業は大いに発展する。これにより東亜の平和は、いよいよ確かな基盤の上に築かれることとなろう」\n—『明治天皇紀 第12巻』#!\n\n朝鮮半島に恒久的な足場を築くべき時が来た。そうすることで初めて、[JournalEntry.GetCountry.GetName]と[GetGeographicRegion('geographic_region_east_asia').GetName]全体の将来の繁栄と安寧を確かなものにできる。[GetGeographicRegion('geographic_region_korea').GetName]を真に掌握するには、その発展を我らの監督下に置き、この大望を決して揺るがせてはならない。"
 je_colonize_korea_is_owned_by_tt: "[JournalEntry.GetCountry.GetName]が所有している"
 je_colonize_korea_culture_percent_seoul_tt: "$STATE_SEOUL$において、[GetCulture('japanese').GetName]人が[Concept('concept_pop','$concept_population$')|l]の#bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!以上である"
 je_colonize_korea_culture_percent_busan_tt: "$STATE_BUSAN$において、[GetCulture('japanese').GetName]人が[Concept('concept_pop','$concept_population$')|l]の#bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!以上である"
 je_colonize_korea_culture_percent_yangho_tt: "$STATE_YANGHO$において、[GetCulture('japanese').GetName]人が[Concept('concept_pop','$concept_population$')|l]の#bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!以上である"
 je_colonize_korea_culture_percent_sariwon_tt: "$STATE_SARIWON$において、[GetCulture('japanese').GetName]人が[Concept('concept_pop','$concept_population$')|l]の#bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!以上である"
 je_colonize_korea_culture_percent_pyongyang_tt: "$STATE_PYONGYANG$において、[GetCulture('japanese').GetName]人が[Concept('concept_pop','$concept_population$')|l]の#bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!以上である"
 je_colonize_korea_fail_tt: "#bold [GetGeographicRegion('geographic_region_korea').GetName]#!はもはや[ROOT.GetCountry.GetAdjective]の支配下にない"
 korea_colinzation_2b_executive_tt: "[concept_executive]が「#tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_loyal_prominence_tt $modifier_peninsula_control_loyal_prominence$#!」を#v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#!年間獲得する"
 korea_colinzation_2b_company_tt: "[concept_company]が「#tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_company_bonus_tt $modifier_peninsula_control_company_bonus$#!」を#v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#!年間獲得する"
 modifier_peninsula_control_loyal_prominence_tt: "[GetStaticModifier('modifier_peninsula_control_loyal_prominence').GetName|v]\n[GetStaticModifier('modifier_peninsula_control_loyal_prominence').GetDesc]"
 modifier_peninsula_control_company_bonus_tt: "[GetStaticModifier('modifier_peninsula_control_company_bonus').GetName|v]\n[GetStaticModifier('modifier_peninsula_control_company_bonus').GetDesc]"
 korea_colinzation_3b_tt: "誰かがこの失敗の責任を負わねばならない。"
 korea_colinzation_3b_ig_leader_tt: "1人の[concept_leader]が、#tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_loyal_prominence_loss_tt $modifier_peninsula_control_loyal_prominence$#!を#v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#!年間獲得する"
 korea_colinzation_3b_ig_tt: "1つの[concept_interest_group]が、#tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_approval_pol_str_loss_tt $modifier_peninsula_control_approval_pol_str_loss$#!を#v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#!年間獲得する"
 modifier_peninsula_control_loyal_prominence_loss_tt: "[GetStaticModifier('modifier_peninsula_control_loyal_prominence_loss').GetName|v]\n[GetStaticModifier('modifier_peninsula_control_loyal_prominence_loss').GetDesc]"
 modifier_peninsula_control_approval_pol_str_loss_tt: "[GetStaticModifier('modifier_peninsula_control_approval_pol_str_loss').GetName|v]\n[GetStaticModifier('modifier_peninsula_control_approval_pol_str_loss').GetDesc]"
 korea_colonization.2.t: "有望な未来"
 korea_colonization.2.d: "今や世界は、[GetGeographicRegion('geographic_region_korea').GetName]が[ROOT.GetCountry.GetName]の一部であり、我が国の完全な支配下にあることを知っている。半島に我々の足場を築いたことで、この成功はさらに、世界の舞台における我が国の地位の高さを示すものとなった。"
 korea_colonization.2.f: "国家統合という構想がいま現実のものとなり、[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]である[ROOT.GetCountry.GetRuler.GetFullNameNoFormatting]の抱く野心はいっそう膨らんでいった。[ROOT.GetCountry.GetRuler.GetSheHe]は[ROOT.GetCountry.GetCapital.GetCityHubName]の自室で、この事業の成功と半島の発展に満足しながら、その感慨を短歌にしたためている。\n\n同刻、$STATE_SEOUL$では[GetCulture('korean').GetNameNoFormatting]の官僚が、新たな社会秩序に反発する市民たちの抗議を抑え込んでいた。彼はきわめて平静な口調で彼らに語りかけ、この統合こそが万人の繁栄を保証するのだと言い聞かせた。"
 korea_colonization.2.a: "半島の将来の繁栄と安寧には、明るい見通しが立っている。"
 korea_colonization.2.b: "事業は我が国の計画の中核を担ってきた。"
 modifier_peninsula_control_prestige_authority: "半島における威信"
 modifier_peninsula_control_assimilation_migration: "同化の加速"
 modifier_peninsula_control_loyal_prominence: "卓越した監督力"
 modifier_peninsula_control_company_bonus: "企業への表彰"
 korea_colonization.3.t: "失われた機会"
 korea_colonization.3.d: "[GetGeographicRegion('geographic_region_korea').GetName]はもはや我々の支配下にはない。その経済的・外交的影響は、今後何年にもわたって[ROOT.GetCountry.GetName]に及ぶことになるだろう。"
 korea_colonization.3.f: "政府が半島の秩序維持に失敗したことを受け、[ROOT.GetCountry.GetAdjectiveNoFormatting]の官吏たちは協議のため一堂に会したが、その場には苛立ちと不満が満ちていた。近年[ROOT.GetCountry.GetNameNoFormatting]が積み上げてきた大きな国力に対する今回の打撃を前に、今後どう立て直すべきかについて妥協を拒む者も少なくない。\n\n議論の喧騒を押しのけるようにして、ひとりの紳士が声を上げた。「この失態については、[SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting]が責任を負うべきではないか」"
 korea_colonization.3.a: "我々は皆、この事業の失敗という重荷をともに負わねばならない。"
 korea_colonization.3.b: "[SCOPE.sCharacter('relevant_ig_leader').GetFullName]と[SCOPE.gsInterestGroup('relevant_ig').GetName]が、この失敗の責任を負わねばならない。"
 modifier_peninsula_control_prestige_loss: "衰える支配力"
 modifier_peninsula_control_loyal_prominence_loss: "名声の減衰"
 modifier_peninsula_control_approval_pol_str_loss: "薄れゆく影響力"
 JE_COLONIZE_KOREA_STATES_HEADER: "残っている[Concept('concept_state', '$concept_states$')]:"
 JE_COLONIZE_KOREA_STATES_TT: "$JE_COLONIZE_KOREA_STATES_HEADER$ [GetScriptedGui('je_colonize_korea_states_sgui').ExecuteTooltip(GuiScope.SetRoot(GetPlayer.MakeScope).End)]"
 JE_COLONIZE_KOREA_STATES_LIST_ENTRY_OWNED_STATE: "[THIS.GetState.GetCustom('colonize_korea_state_owned_by_japan')] $je_colonize_korea_is_owned_by_tt$"
 JE_COLONIZE_KOREA_STATES_LIST_ENTRY_INCORPORATED_STATE: "[THIS.GetState.GetCustom('colonize_korea_state_is_incorporated')] $TRIGGER_IS_INCORPORATED$"
 JE_COLONIZE_KOREA_STATES_LIST_ENTRY_TURMOIL: "[THIS.GetState.GetCustom('colonize_korea_state_turmoil')] 動揺度が[THIS.ScriptValue('je_colonize_korea_state_turmoil_max')|v%1]未満（[THIS.GetState.CalcTurmoil|v%1]）"
 JE_COLONIZE_KOREA_STATES_LIST_ENTRY_CULTURE: "[THIS.GetState.GetCustom('colonize_korea_state_is_assimilated')] [THIS.ScriptValue('je_colonize_korea_state_japanese_culture_min')|v%1] [GetCulture('japanese').GetName] [concept_culture] （[THIS.ScriptValue('japanese_culture_fraction')|v%1]）"
