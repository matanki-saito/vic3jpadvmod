l_japanese:
 ## Interest Tier Types
 interest_tier_none: "なし"
 interest_tier_none_desc: "この$concept_interest_tier_short$では、[concept_country]はその[concept_strategic_region]に対してまったく、あるいはごくわずかしか関与しておらず、$concept_country$と$concept_strategic_region$のどちらにも影響を及ぼしません。"
 interest_tier_observant: "観察"
 interest_tier_observant_desc: "この$concept_interest_tier_short$では、[concept_strategic_region]に外交拠点を確立するための第一歩となる取り組みが行われており、海軍艦艇が沿岸を哨戒していたり、[Concept('concept_local_country', '$concept_local_countries$')]と使節が交換されていたりします。"
 interest_tier_engaged: "積極的"
 interest_tier_engaged_desc: "この$concept_interest_tier_short$では、[concept_country]は現地の事案に関与しはじめ、[Concept('concept_treaty', '$concept_treaties$')]を締結したり、より恒常的な活動の場を確立したりしています。"
 interest_tier_influential: "影響力あり"
 interest_tier_influential_desc: "この$concept_interest_tier_short$では、[concept_strategic_region]での活動の場が完全に確立され、[Concept('concept_country', '$concept_countries$')]は長期的な協定を結ぶとともに、自国の権益を主張するようになります。\n\n@information! この$concept_strategic_region$に[Concept('concept_capital_state', '$concept_capital_state_short$')]を持つ$concept_countries$は、この$concept_interest_tier_short$を下回ることはありません。"
 interest_tier_pervasive: "浸透"
 interest_tier_pervasive_desc: "この$concept_interest_tier_short$では、[concept_country]は[concept_strategic_region]で強大な支配力を確立しています。権力が集約される中で、[Concept('concept_great_power', '$concept_great_powers$')]と[Concept('concept_local_country', '$concept_local_country_short$')]の勢力が覇権を巡って争うようになります。"
 interest_tier_hegemonic: "覇権的"
 interest_tier_hegemonic_desc: "この$concept_interest_tier_short$では、[concept_country]は[concept_strategic_region]において陰の実力者としての不動の地位を確立しています。他国が#italic 残っている場合#!、それらの国々は内政に干渉されない保証を得たければ、覇権国に従属するか、当該国と交渉しなければなりません。"
 ## Interface
 INTEREST_TIER_TYPE_BOUNDS_DESC: "[concept_involvement]が[InterestTierType.GetLowerBound|v]から[InterestTierType.GetUpperBound|v]までのときに適用されます"
 INTEREST_TIER_TYPE_NO_EFFECT: "#italic 効果なし#!"
 INTEREST_TIER_ACTIVE: "[Country.GetName][ConcatIfNeitherEmpty(' ', AddLocalizationIf(Country.IsLocalPlayer, 'あなた'))]に対する#i #b 現在のランク#!#!"
 INTEREST_TIER_ACTIVE_TOOLTIP: "#header [InterestTierType.GetName]#! $INTEREST_TIER_ACTIVE$\n$INTEREST_TIER_BOUNDS_DESC$\n[SelectLocalization(EqualTo_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_CURRENT_INVOLVEMENT_DESC', 'INTEREST_TIER_TARGET_INVOLVEMENT_DESC')]\n$TOOLTIP_DELIMITER$\n$INTEREST_TIER_EFFECTS_AND_BREAKDOWN$"
 INTEREST_TIER_INACTIVE_TOOLTIP: "#header [InterestTierType.GetName]#!\n$INTEREST_TIER_BOUNDS_DESC$\n$TOOLTIP_DELIMITER$\n#title 効果:#!#indent_newline:3 \n[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)]#!"
 INTEREST_TIER_EFFECTS_AND_BREAKDOWN: "#title 効果:#!#indent_newline:3 [ConcatIfNeitherEmpty('\n', InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', AddLocalizationIf(And(And3(StringIsEmpty(InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetStateModifier.GetDesc)), StringIsEmpty(InterestTierType.GetTradeAdvantageDesc)), 'INTEREST_TIER_NO_EFFECT'))]#!\n\n#title [concept_involvement]は以下の理由により#v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#!:#!#indent_newline:3 \n[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]#!\n $INTEREST_TIER_ACTIVE$: #i #b （現在有効）#!#!"
 INTEREST_TIER_PREDICTED: "#i #b （予測）#!#!"
 INTEREST_TIER_BOUNDS_DESC: "[concept_involvement]が[InterestTierType.GetLowerBound|v0]から[InterestTierType.GetUpperBound|v0]までのときに適用されます"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC: "[Country.GetName]の[concept_involvement]は#v [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#!"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC: "[Country.GetName]の[concept_involvement]は[AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetTargetInvolvementIn(StrategicRegion.Self), Country.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP')][AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN')]"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC_PLAYER_CONTEXT: "我々の[concept_involvement]は現在[GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon] #v [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#!"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC_PLAYER_CONTEXT: "我々の[concept_involvement]は現在[GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon] [AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self), GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT')][AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self), GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT')]"
 INTEREST_TIER_TARGET_UP: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#!（@arrow_up_up!#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#!/週）"
 INTEREST_TIER_TARGET_DOWN: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#!（@arrow_down_down!#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#!/週）"
 INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#!（@arrow_up_up!#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#!/週）"
 INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#!（@arrow_down_down!#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#!/週）"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN_TITLE: "#title$concept_involvement$の目標値#v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#!の要因:#!"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN: "[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]"
 INTEREST_TIER_EFFECTS_TITLE: "#title 効果:#!"
 INTEREST_TIER_EFFECTS: "[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetDescription)]"
 INTEREST_TIER_NO_EFFECT: "#italic 効果なし#!"
 INTEREST_TIER_TRADE_ADVANTAGE_EXPORTS_DESC: "現地の$concept_markets$における[Concept('concept_trade','$concept_exports$')][concept_trade_advantage] $VAL|0=+v$"
 INTEREST_TIER_TRADE_ADVANTAGE_IMPORTS_DESC: "現地の$concept_markets$における[Concept('concept_trade','$concept_imports$')][concept_trade_advantage] $VAL|0=+v$"
 INTEREST_TIER_ON_ACTIVATE_EFFECT: "#title 獲得した場合:#!"
 INTEREST_TIER_ON_DEACTIVATE_EFFECT: "#title 失った場合:#!"
 STRATEGIC_REGION_AI_STANCE_TT_HEADER: "[Country.GetNameNoFormatting]が[StrategicRegion.GetName]で#b [Country.GetAIStrategicRegionStanceTypeIn(StrategicRegion.Self).GetNameNoFormatting]#!の[Concept('concept_strategic_region_stance', '$concept_strategic_region_stance_short$')]を取った理由:\n$TOOLTIP_DELIMITER$"
 ## Effects
 interest_tier_effect_establish_missions_decree: "@checkmark! [Concept('concept_unincorporated_state','$concept_unincorporated_states$')]で[GetDecreeType('decree_establish_missions').GetName]の[concept_decree]を有効にします"
 interest_tier_effect_colonization: "@checkmark! 地方アクション「#yellow;tooltip:[GetPlayer.GetTooltipTag],establish_colony_tooltip $establish_colony$#!」を有効にします"
 interest_tier_effect_stake_colonial_claim: "@checkmark! [Concept('concept_decentralized_nation', '$concept_decentralized_nations$')]に対して[concept_diplomatic_action]「[GetDiplomaticActionType('da_stake_colonial_claim').GetName]」を有効にします"
 interest_tier_effect_colonial_claim_generation: "@checkmark! [concept_state_region]の植民地化が[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_colonial_claim_generation_threshold')|v%0]に達すると、[concept_claim]が生じます"
 interest_tier_effect_infamy_cost_increase_high: "この[concept_strategic_region]で[Concept('concept_war_goal', '$concept_war_goals$')]を対象とした[concept_infamy]コスト[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_high_value')|=n%0]"
 interest_tier_effect_infamy_cost_increase_medium: "この[concept_strategic_region]で[Concept('concept_war_goal', '$concept_war_goals$')]を対象とした[concept_infamy]コスト[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_medium_value')|=n%0]"
 interest_tier_effect_infamy_cost_decrease_medium: "この[concept_strategic_region]で[Concept('concept_war_goal', '$concept_war_goals$')]を対象とした[concept_infamy]コスト[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_decrease_medium_value')|=p%0]"
 interest_tier_effect_can_start_diplomatic_plays: "@checkmark! この[concept_strategic_region]で[Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')]を開始できます"
 interest_tier_effect_can_join_diplomatic_plays: "@checkmark! この[concept_strategic_region]の[Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')]でいずれかの側につくことができます"
 interest_tier_effect_can_sign_alliance: "@checkmark! [GetArticleType('alliance').GetName] [Concept('concept_article', '$concept_treaties$')]を締結できます"
 interest_tier_effect_can_sign_defensive_pact: "@checkmark! [GetArticleType('defensive_pact').GetName]の[Concept('concept_article', '$concept_treaties$')]を締結できます"
 interest_tier_effect_can_sign_support_independence: "@checkmark! [GetArticleType('support_independence').GetName]の[Concept('concept_article', '$concept_treaties$')]を締結できます"
 interest_tier_effect_can_sign_guarantee_independence: "@checkmark! [GetArticleType('guarantee_independence').GetName]の[Concept('concept_article', '$concept_treaties$')]を締結できます"
 interest_tier_effect_stake_colonial_claim_unrecognized: "@checkmark! [Concept('concept_decentralized_nation', '$concept_decentralized_nations$')]と[Concept('concept_unrecognized_power', '$concept_unrecognized_powers$')]に対して[concept_diplomatic_action]「[GetDiplomaticActionType('da_stake_colonial_claim').GetName]」を有効にします"
 ## Diplomatic Actions
 da_stake_colonial_claim: "植民地請求権を主張"
 da_stake_colonial_claim_desc: "海外の[concept_state_region]に対する[concept_claim]を主張します。"
 da_stake_colonial_claim_action_notification_name: "[INITIATOR_COUNTRY.GetName]が[TARGET_STATE.GetStateRegion.GetName]の植民地に対する[concept_claim|l]を主張"
 da_stake_colonial_claim_action_notification_desc: "植民地獲得の野心を膨らませている[INITIATOR_COUNTRY.GetName]が、[TARGET_STATE.GetStateRegion.GetName]の請求権を主張しました！"
 DA_STAKE_COLONIAL_CLAIM_COOLDOWN: "#v [TimeKeeper.GetCurrentDateWithDiff( GetVarTimeRemaining( GetPlayer.MakeScope, 'da_stake_colonial_claim_cooldown') )]#!まで、このアクションを再び実行することはできません"
 DA_STAKE_COLONIAL_CLAIM_EMPTY_EFFECT: "他の大陸の[concept_state_region]を選択して[concept_claim|l]を主張してください"
 ## Notifications
 notification_colonial_claim_generated_name: "[SCOPE.sState('colony_notification_state').GetName]が#bold 主要植民地#!化"
 notification_colonial_claim_generated_desc: "[SCOPE.sState('colony_notification_state').GetName]が十分な規模に拡大したため、[SCOPE.sState('colony_notification_state').GetStateRegion.GetName]全体の[concept_claim]が認められました。"
 notification_colonial_claim_generated_tooltip: "#header $notification_colonial_claim_generated_name$#!\n$TOOLTIP_DELIMITER$\n$notification_colonial_claim_generated_desc$"
