 ship_type_frigate_desc: "軽武装の帆船。主に偵察、哨戒、護衛業務に使われる。"
 ship_type_iron_frigate: "甲鉄フリゲート艦"
 ship_type_iron_frigate_desc: "帆走フリゲートを鉄製船体に進化させた艦船。従来のフリゲートの役割を維持する一方、耐久力と火力が向上している。"
 ship_type_ship_of_the_line: "戦列艦"
 ship_type_ship_of_the_line_desc: "戦列での運用を目的に設計された大型戦艦。戦列艦は複数の甲板に多数の砲を搭載している。"
 ship_type_monitor: "モニター艦"
 ship_type_monitor_desc: "沿岸海域での使用を目的に設計された、低乾舷の装甲艦。"
 ship_type_coastal_defense_ship: "沿岸防衛艦"
 ship_type_coastal_defense_ship_desc: "港湾および沿岸海域での使用を目的に設計された、重装備かつ重装甲の艦船。"
 ship_type_destroyer: "駆逐艦"
 ship_type_destroyer_desc: "艦隊および護衛任務を目的に設計された、高速かつ重武装の艦船。"
 ship_type_aircraft_carrier: "航空母艦"
 ship_type_aircraft_carrier_desc: "航空機の離着陸が可能な艦船。航空母艦は偵察だけでなくいくつかの攻撃任務にも従事する。"
 ship_type_torpedo_boat: "水雷艇"
 ship_type_torpedo_boat_desc: "大型で低速な戦艦に壊滅的な打撃を与えるべく設計された、小型で機敏な艦船。"
 ship_type_torpedo_boat_destroyer: "水雷艇駆逐艦"
 ship_type_torpedo_boat_destroyer_desc: "小型の水雷艇に対抗するべく設計された艦船。自らも魚雷攻撃を行うことが可能。"
 ship_type_light_cruiser: "軽巡洋艦"
 ship_type_light_cruiser_desc: "遠距離の哨戒、通商保護、戦力投射を想定して建造された軽装甲巡洋艦。"
 ship_type_armored_cruiser: "装甲巡洋艦"
 ship_type_armored_cruiser_desc: "重装甲帯を備えた大型の巡洋艦。戦艦を除くほとんどの標的と交戦できる能力を持つ。"
 ship_type_protected_cruiser: "防護巡洋艦"
 ship_type_protected_cruiser_desc: "高速かつ航続距離の長い巡洋艦。 重要箇所を保護する装甲甲板を備える。"
 ship_type_seaplane_tender: "水上機母艦"
 ship_type_seaplane_tender_desc: "偵察や限定的な攻撃任務を目的に、水上機を搭載・発進できるように設計された艦船。"
 ship_type_early_ironclad: "初期装甲艦"
 ship_type_early_ironclad_desc: "蒸気機関と鉄製装甲を備えた、強力な遠洋航行用の艦船。"
 ship_type_modern_ironclad: "近代型装甲艦"
 ship_type_modern_ironclad_desc: "多くの新しい装備を採用し、従来の装甲艦を発展させた近代的な装甲艦。"
 ship_type_pre_dreadnought: "前ドレッドノート"
 ship_type_pre_dreadnought_desc: "主砲と副砲を混載した強力な戦艦。"
 ship_type_dreadnought: "ドレッドノート"
 ship_type_dreadnought_desc: "単一口径巨砲を搭載した、革命的な戦艦。"
 ship_type_super_dreadnought: "超ドレッドノート"
 ship_type_super_dreadnought_desc: "さらなる大口径砲と重装備を備えた、大型化されたドレッドノート級艦船。"
 ship_type_submarine: "潜水艦"
 ship_type_submarine_desc: "主に敵の商船に対して使用することを目的とする、潜水能力を持つ艦船。"
 ship_type_troop_ship: "兵員輸送船"
 ship_type_troop_ship_desc: "兵員や物資を世界各地に輸送するために設計された、専用の補給艦。"
 ship_type_supply_ship: "補給艦"
 ship_type_supply_ship_desc: "軍需品をある場所から別の場所へ輸送する艦船。"
 ship_graphics_type_borodino: "ボロジノ"
 ship_graphics_type_borodino_desc: "ボロジノ級前ドレッドノートは、日露戦争当時のロシア帝国海軍における最新鋭戦艦。ロジェストヴェンスキー提督率いる第2太平洋艦隊の主力艦として配備されたが、対馬海戦にて同級の4隻が撃沈または捕獲された。"
 ship_graphics_type_mikasa: "三笠"
 ship_graphics_type_mikasa_desc: "日露戦争を通じて東郷提督の旗艦を務めた前ドレッドノート戦艦。戦争中の主要な艦隊行動すべてに参加し、日本の海軍力向上を象徴する不朽の存在となっている。"
 ship_graphics_type_dingyuan: "定遠"
 ship_graphics_type_dingyuan_desc: "北洋艦隊が誇る鉄甲戦艦。鎮遠とともに清朝末期の軍事近代化を象徴する特に際立った存在であった。鴨緑江海戦で勇猛に戦ったものの、清帝国海軍の慢性的な予算不足によりその性能を最大限に発揮することはなかった。"
 ship_group_capital_ships: "主力艦"
 ship_group_capital_ships_desc: "戦列での運用を目的とした艦船で、現役の艦船の中では最も大きく、最高の戦闘能力を持つ。"
 ship_group_cruisers: "巡洋艦"
 ship_group_cruisers_desc: "巡洋艦は小型かつ軽武装の艦船で、長距離の巡航任務を目的とする。"
 ship_group_torpedo_craft: "魚雷艇"
 ship_group_torpedo_craft_desc: "小型で機動性が高く、自走魚雷を主武装とする艦船。"
 ship_group_supply_ships: "補給艦"
 ship_group_supply_ships_desc: "軍艦隊の任務を支援し再補給を行う、民間用または専用に設計された艦船。"
