l_japanese:
 edo_system: "江戸の身分制度"
 # Edo Social Classes
 strata_samurai_high: "上位の侍" # High-Class Samurai
 strata_samurai_high_desc: "大名や上級家臣など、武士階級の上層に属する者は主要な役職の大部分を独占しているだけでなく、多大な世襲の威信を享受している。"
 strata_samurai_low: "下位の侍" # Low-Class Samurai
 strata_samurai_low_desc: "御家人や足軽などの下級の武士や家臣で、上位層の武士の下で行政や軍事の実務を担当する。"
 strata_religious: "寺社" # Priests
 strata_religious_desc: "神社の神職たちは寺院組織を通じて編成され、当局によって管理されている。彼らは地域の生活や学問、宗教儀式において影響力を持っているが、法的に定められた身分制度からはやや外れた存在である。"
 strata_commoners_peasants: "百姓" # Peasants
 strata_commoners_peasants_desc: "平民階級の下位区分である「百姓」は、日本の社会階層の圧倒的多数を占めている。百姓の階級の人々は村に登録され、地域の義務や租税に拘束される。百姓はその職業ではなく登録によって定義されているため、農民だけでなく、農村の職人や商人も百姓に含まれる。"
 strata_commoners_townspeople: "町人" # Townspeople
 strata_commoners_townspeople_desc: "平民階級の下位区分である「町人」は、日本の都市部の主要な住民である。町人の階級の人々は町制度を通じて登録され、伝統的に工芸や商業に従事している。かなりの富や影響力を蓄えることはできるが、武士の身分ではないため社会的な流動性は制限されている。"
 strata_outcastes: "穢多・非人" # Outcastes Eta, Hinin, etc.
 strata_outcastes_desc: "穢多と非人は、日本社会の最下層を構成している。彼らは厳しい差別の対象となっており、墓掘り、物乞い、大道芸などの「穢れた」職業に結び付けられている。"
 # Edo Social System Laws
 lawgroup_edo_social_system: "江戸の身分制度"
 lawgroup_edo_social_system_desc: "$lawgroup_edo_social_system$の施行"
 law_strict_edo_system: "厳格な身分制"
 law_strict_edo_system_desc: "法律上・職業上の機会から、その身分に許される住居の門の数に至るまで、あらゆることが国家によって厳格に規制され、施行されている。規則へのいかなる違反も厳しく処罰され、町人や農民が正式に武士の階級に入る方法は存在しない。"
 law_intermediate_edo_system: "緩和された身分制"
 law_intermediate_edo_system_desc: "法的規制や奢侈禁止令が緩和され、平民も次第に社会的な影響力や地位を得られるようになりつつある。裕福な町人や農民は、御家人、すなわち下級武士の地位を購入して得ることが可能になっている。"
 law_lax_edo_system: "緩い身分制"
 law_lax_edo_system_desc: "かつては武士にしか許されなかった地位や役割が平民にも開放され、残る奢侈禁止令や職業上の制限も選択的にしか施行されず、通常は特に重大な違反にのみ限定されている。"
 # Tenpo Crisis
 je_tenpo_crisis: "天保の危機"
 je_tenpo_crisis_reason: "1830年に宣言された天保、すなわち「天の加護」の時代は、当初はその名に相応しい吉兆で幕を開けた。しかし、[GetGeographicRegion('geographic_region_honshu').GetName]の悪天候によってまもなく米価は急騰し、全国的な飢饉が発生する。その一方で[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]の富と影響力の増大は、既存の[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]による秩序を脅かしている。\n\nその間、西洋の[Concept('concept_great_power','$concept_great_powers$')]はこれまでにないほど大胆になっており、商船や砲艦が我が国の沿岸に近づきつつある。\n\nこれらの問題に対処するため、改革志向の有力者たちは自身の構想を幕府に示している。\n\n#tooltippable;tooltip:tenpo_reformer_tt #b 改革派の計画#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_lax')][ROOT.GetCountry.GetNameNoFlag]が[GetLawType('law_lax_edo_system').GetName]を施行している\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_bureaucrats')][ROOT.GetCountry.GetNameNoFlag]が[GetLawType('law_hereditary_bureaucrats').GetName]を施行#b していない#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_urbanization')][ROOT.GetCountry.GetNameNoFlag]が[Concept('concept_state','$concept_states$')]を#v 3#!つ保有し、[GetBuildingType('building_urban_center').GetName]のレベルが#v 3#!である\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_clout')][GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName][concept_interest_group]の[concept_clout]が#v 10#!以上である\n#tooltippable;tooltip:tenpo_hardliner_tt #b 強硬派の計画#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_strict')][ROOT.GetCountry.GetNameNoFlag]が[GetLawType('law_strict_edo_system').GetName]を施行している\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_social_control')][ROOT.GetCountry.GetNameNoFlag]が[GetLawType('law_shinsengumi').GetName]を施行している\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_rural')][ROOT.GetCountry.GetNameNoFlag]が[GetBuildingType('building_rice_farm').GetName]を#v 40#!レベル保有している\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_pb_marginalized')][GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName][concept_interest_group]が[concept_marginalized]である\n#tooltippable;tooltip:tenpo_shared_tt #b 共通の計画#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_famine')][GetCulture('japanese').GetName][concept_homeland][concept_state]が[concept_famine]に苦しんで#b いない#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_gdp')][ROOT.GetCountry.GetNameNoFlag]の[Concept('concept_gdp','$concept_gdp_short$')]が@gdp!#v [Country.MakeScope.Var('tenpo_gdp_goal').GetValue|k0]#!以上である\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_army_size')][ROOT.GetCountry.GetAdjectiveNoFlag]軍の[concept_power_projection]が#v 500#!\nを超える• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_naval_size')]我が国の所有[Concept('concept_state','$concept_states$')]において、保有する[GetBuildingType('building_naval_fortification').GetName]のレベルが#v 10#!以上である"
 je_tenpo_crisis_complete_header: "以下の条件を満たすと天保の改革に成功:\n"
 je_tenpo_crisis_failure_header: "以下の条件を満たすと天保の改革に失敗:\n"
 je_tenpo_crisis_success_tt: "我々は少なくとも#v 8#!つの計画目標を達成している"
 je_tenpo_crisis_success_2_tt: "達成した#tooltippable;tooltip:tenpo_shared_tt #b 共通#!#!、#tooltippable;tooltip:tenpo_reformer_tt #b 改革派#!#!、または#tooltippable;tooltip:tenpo_hardliner_tt #b 強硬派#!#!の目標の数に応じて報酬は変わる。"
 je_tenpo_crisis_success_outcome_tt: "達成した#b 共通#!、#b 改革派#!、または#b 強硬派#!の目標の数に応じて報酬は変わる。"
 je_tenpo_crisis_success_outcome_1_tt: "#b 強硬派#!の計画をより多く達成した場合:"
 je_tenpo_crisis_success_outcome_2_tt: "#b 改革派#!の計画をより多く達成した場合:"
 je_tenpo_crisis_success_outcome_3_tt: "達成した#b 強硬派#!と#b 改革派#!の計画の数が同じ場合:"
 modifier_tenpo_crisis_reward_hardliner: "秩序への回帰"
 modifier_tenpo_crisis_reward_reformer: "新体制の確立"
 modifier_tenpo_crisis_reward_balanced: "慎重な改革"
 modifier_rice_hoarding: "大規模な米の買い占め"
 tenpo_hardliner_tt: "#b 強硬派の派閥#!は、日本社会が道徳的に退廃しており、その退廃は伝統への回帰によってのみ阻止できると考えている。\n\n彼らはより厳格な贅沢禁止令の導入を支持し、侍が都市の贅沢を捨てて、質素な地方行政官という理想の役割に戻ることを求めている。"
 tenpo_reformer_tt: "#b 改革派の派閥#!は、日本社会は取り返しがつかないほど変化しており、国家の法律は美化された過去の理想ではなく、国の実際の状況に基づくべきだと考えている。\n\n彼らは日本の平民の政治的地位の向上と、商業の振興を支持している。"
 tenpo_shared_tt: "#b 強硬派#!と#b 改革派#!のどちらの派閥も、日本を外部の脅威から守ることが不可欠であり、食料安全保障と経済の問題に対処しなければならないと考えている。"
 button_je_tenpo_combat_rice_hoarding: "米の買い占めとの闘い"
 button_je_tenpo_combat_rice_hoarding_desc: "[ROOT.GetCountry.GetNameNoFlag]の政治的・経済的な不安定さに乗じて、質の悪い輩が大量の米を買い占めてため込み、米価格をつり上げている。その結果、日本の多くの家庭が食べる米を十分に購入する手段を失いつつある。"
 button_je_tenpo_frugal_ordinance: "倹約令を発布"
 button_je_tenpo_frugal_ordinance_desc: "都市部の[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]の間で進む退廃は、我々の統治の安定を脅かしている。彼らは今や身分をわきまえずに振る舞い、人目もはばからず富を誇示している。\n\n贅沢品、娯楽、文学にさらなる法的規制を課し、社会における自らの役割を彼らに思い出させなければならない。"
 button_je_tenpo_confiscate_land: "上知令を発布"
 button_je_tenpo_confiscate_land_desc: "江戸および大阪から10#italic #tooltippable;tooltip:glossary_ri 里#!#!の範囲には、天領、大名領、旗本領が複雑に入り組んでいる。統一された行政機構の欠如が国防に深刻な影響を及ぼしており、この土地を最大限に活用することもできないでいるため、ある有力な老中がこれを没収して統合することを提案した。\n\n土地を失う領主には、国内の他の場所に代わり土地が与えられることになる。"
 modifier_consolidation_payments: "土地統合補償金の支払い"
 modifier_consolidated_state_land: "十里統合法"
 glossary_ri: "#b #italic 里#!#!は中国の#italic 里#!に由来する伝統的な単位である。\n\n里の規定上の長さは時代とともに変化したが、江戸時代後期では1里はほぼ36#italic 町#!、すなわち3.9kmに相当した。"
 modifier_tenpo_crisis_ongoing: "天保の混乱"
 tenpo_events.1.t: "天の加護の時代"
 tenpo_events.1.d: "数年に及ぶ悪天候の後、[ROOT.GetCountry.GetNameNoFlag]の地は[concept_famine]に襲われている。貧困層や困窮した人々が日々の暮らしにあえぐなか、幕府はさらなる対策を求める人々からの不満の高まりに直面している。"
 tenpo_events.1.f: "妻が織る布は市場でいつも高値で売れ、景気がよかったころにはたまに菓子を買う余裕さえあった。だが今では、それもせいぜい四、五合の米にしかならない。これでは一日食べるのがやっとだと彼は思った。野草や雑草を混ぜたとしても、必要な一週間分にはとても足りない。\n\n家に帰る途中で、彼は昔馴染みの寅の家が見える場所で足を止めた。痘瘡はすでに寅の子供のうち2人の命を奪っていた。もしあの蓑の噂が本当なら、この数週間でさらに多くの命が失われることになるだろう。米の袋をきつく握りしめ、彼は静かに祈りを捧げてその場を後にした。"
 tenpo_events.1.a: "天よ、我々を守りたまえ！"
 tenpo_events.1.tt_1: "#r 深刻な#![GetHarvestConditionType('torrential_rains').GetName]が[GetGeographicRegion('geographic_region_honshu').GetName]を襲い、国にとって何より大切な#b 米の収穫#!を#r 壊滅#!させただけでなく、[ROOT.GetCountry.GetAdjectiveNoFlag]の[concept_food_security]を大幅に悪化させている。"
 tenpo_events.1.tt_2: "[GetGeographicRegion('geographic_region_honshu').GetName]全土で、金貸しや米の買い占めを疑われた者の家屋が、いわゆる#italic #tooltippable;tooltip:glossary_uchikowashi 打ち壊し#!#!を企む暴徒たちの標的となっており、#r 全国的#!な[concept_devastation]を招いている。"
 glossary_uchikowashi: "#b #italic 打ち壊し#!#!とは、金貸し、米の買い占め人、価格をつり上げる商人など、道義に反するとみなされた者の財産を民衆が破壊する行為を指す。\n\nこれらの行為はしばしば略奪を伴ったが、打ちこわしの首謀者たちは多くの場合、自らの行為の正当性を示すために、あえて略奪を控えた。"
 tenpo_events.2.t: "哲学者の侍の乱"
 tenpo_events.2.d: "既存の秩序、そして[SCOPE.sState('osaka_scope').GetName]を苛む[concept_famine]に対処できないその無力さに幻滅し、奉行であり学者でもある[SCOPE.sCharacter('oshio_scope').GetFullName]が地元当局に対して反乱を起こした。[SCOPE.sCharacter('oshio_scope').GetHerHis]の支持者たちが役所に火を放ったため、[SCOPE.sState('osaka_scope').GetCityHubName]の大部分がすでに炎に包まれている。"
 tenpo_events.2.f: "「我々には唐の湯王や周の武王のような武威もなく、孔子や孟子のような仁徳もない。しかしもう堪忍し難くなった。天下のため、たとえそれが我々の血筋に災いをもたらそうとも、行動を起こすことを決意した。\n\nまず民衆を苦しめ悩ませている諸役人を誅伐し、その後には、奢侈に肥え太った大坂の富裕な町人たちも同様に誅裁する。\n\nそのうえで、彼らが穴蔵に蓄え込んだ金銀や銭、そして倉や屋敷に隠している米俵を取り出し、これを分配、配当する」\n\n—大塩平八郎、『#italic 檄文#!』抜粋"
 tenpo_events.2.a: "自衛団を招集し、この反逆者を磔にしろ。"
 tenpo_events.2.b: "やむにやまれぬ、義のための行為だ。"
 tenpo_events.2.c: "反乱者たちは現地の駐屯部隊を圧倒し、[SCOPE.sState('osaka_scope').GetCityHubName]を占領した。"
 tenpo_events.2.tt_1: "[SCOPE.sCharacter('oshio_scope').GetFullName]は捕縛を逃れ、焼身自殺した。"
 tenpo_events.2.tt_2: "[SCOPE.sCharacter('oshio_scope').GetFullName]は当局によって拷問され、塩を塗られ、磔にされた。"
 tenpo_events.2.tt_3: "現地の自衛団が#b 反乱を鎮圧#!し、それ以上の拡大を防いだ。"
 tenpo_events.2.tt_4: "[concept_agitator]の[SCOPE.sCharacter('oshio_scope').GetFullName]には形ばかりの軽い罰が科され、活動の継続が許された。"
 modifier_osaka_burning: "血判状"
 modifier_controversial_pardon: "物議を醸す恩赦"
 tenpo_events.3.t: "強制的な改革"
 tenpo_events.3.d: "改革の進捗に満足した[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]は、担当する老中たちの成果を称賛した。[ROOT.GetCountry.GetAdjective]の国家は来たるべき内外のいかなる試練も克服できると確信しているのだ。"
 tenpo_events.3.f: "「十二でございます、上様」老中首座はそう言うと、机の上に筆を置いた。「畿内からの報告も概ね同様で、我々の改革は根付き始めたようです」\n\n上段に座った[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]が短く頷いた。「よし。追って朝廷にも知らせるように。さて、長崎奉行からの報告についてだが……」"
 tenpo_events.3.a: "これで[ROOT.GetCountry.GetAdjective]の道徳的・政治的な衰退が終焉を迎えることを祈るばかりだ。"
 tenpo_events.3.b: "農民から武士に至るまで、我々は皆、帝の臣下ではないのか？"
 tenpo_events.3.c: "国家の安定こそが何よりも重要だ。"
 tenpo_outcome_hardliner_tt: "我々は#b 改革派#!よりも#b 強硬派#!の計画をより多く達成した"
 tenpo_outcome_reformer_tt: "我々は#b 強硬派#!よりも#b 改革派#!の計画をより多く達成した"
 tenpo_outcome_balanced_tt: "我々は同じ数の#b 強硬派#!と#b 改革派#!の計画を達成した"
 tenpo_events.4.t: "行動と無策"
 tenpo_events.4.d: "改革計画の成果に満足できず、さらに老中首座たちに対する民衆の不満が高まっていることを受けて、[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]は[SCOPE.sCharacter('roju_scope').GetFullName]の職を解いた。"
 tenpo_events.4.f: "転封。元老中はその言葉を噛みしめたが、決して気に入る言葉ではなかった。しかし、昨日の出来事を考えれば江戸に留まるよりはましなのだろう。残った従者たちは、いまだに池や庭に投げ込まれた瓦や石を片付けていたし、あの日聞いた脅しの言葉は耳から離れない。\n\n彼はその言葉をもう一度反芻してみた。すると、今度はそれほど嫌な響きには感じられなかった。それに、と彼は思った。以前から一度はこの目で月山を見てみたいと思っていたのだ。"
 tenpo_events.4.a: "この愚か者の顔など二度と見たくない。"
 tenpo_events.4.b: "彼の決定をすべて元に戻し、そのことを民衆に知らしめよ。"
 tenpo_events.4.tt_1: "[SCOPE.sCharacter('roju_scope').GetFullName]が#r 降格#!され、#b 出羽#!国に転封された。"
 modifier_tenpo_fail: "天保の改革の打ち切り"
 tenpo_events_4_demotion_tt: "[concept_in_government]の[concept_interest_group]の[concept_leader]が、降格されたうえで転封される" # tooltip for event_outcome_failed_effect_desc in je_tenpo_crisis
 tenpo_events.5.t: "領主たちが中央集権化に抵抗"
 tenpo_events.5.d: "[SCOPE.sState('kanto_scope').GetName]と[SCOPE.sState('kansai_scope').GetName]での領地没収の試みは、現地の領主たちから幅広い反対を受けている。中でも、軍功の恩賞として与えられた土地を持つ者たちからの不満の声が特に大きい。"
 tenpo_events.5.f: "「今私がこの名で保有しているのは、軍功によって祖先が賜った土地だ。関ヶ原以来代々この土地を耕し、収穫を増やして、決して不平を言うことなく主君に年貢を納めてきた。\n\nこれほどの奉公が、今我々が受けているこの扱いに値するというのか？正当な補償もなく移住させられることが、我々への褒美であるというのか？」"
 tenpo_events.5.a: "手に負えなくなる前に中央集権化を中止する。"
 tenpo_events.5.b: "移転した者たちに、補償として追加の土地を与える。"
 tenpo_events.5.c: "これが[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]の御意向であることを彼らに思い出させよ！"
 modifier_heavy_handed_land_confiscations: "強硬な土地没収"
 modifier_promotions_and_koku_redistribution: "昇進と石高の再配分"
 modifier_reckless_roju: "無謀な老中"
 modifier_will_of_the_shogun: "将軍の名の下に"
 tenpo_events.6.t: "龍穴の獅子"
 tenpo_events.6.d: "[SCOPE.sCountry('china_scope').GetAdjective]に対する[SCOPE.sCountry('britain_scope').GetName]の勝利は、我が国を大いに震撼させた。中国のジャンク船や軍隊は、圧倒的な[SCOPE.sCountry('britain_scope').GetAdjectiveNoFormatting]の軍事力の前にひとたまりもなく敗れた。そして今、[ROOT.GetCountry.GetName]が同様の攻撃に耐えられるかどうかを、多くの者が疑問視している。"
 tenpo_events.6.f: "「西は甘露寺、東は金山寺に至るまで、鎮江周辺の土地は黒と白の異人であふれていた。それは碁盤に散らばる碁石にも似て、地元の人々は彼らが去る日が果たして来るのかと案じていた」\n\n—嶺田楓江、『#italic 海外新話#!』"
 tenpo_events.6.a: "天よ、我々を守りたまえ。我々の武士は頼りにならぬかもしれない。"
 tenpo_events.6.b: "中国からの不都合な報告はすべて検閲せよ。"
 tenpo_events.6.c: "我々は、異人の波を打ち砕く断崖である。"
 modifier_opium_war_aftermath: "門前の異人"
 modifier_defenses_strengthened: "沿岸部の駐屯地の強化"
 tenpo_events.7.t: "高島流"
 tenpo_events.7.d: "アヘン戦争後の日本の将来を憂慮し、長崎奉行の[SCOPE.sCharacter('takashima_scope').GetFullName]はオランダ式の近代的軍隊を組織した。そして、同様の施策を全国に促している。"
 tenpo_events.7.f: "「彼が率いる兵の陣笠は奇妙な王冠のようで、号令はオランダ人の耳障りな言葉で下される。しかし、訓練が行き届いた陣形を備え、統制が取れている。命中率は多少劣るものの、我が家臣たちの倍近い速さで一斉射撃ができる」\n\n「では、砲術については？」\n\n「他に並ぶものがないほどだ。導入を躊躇っているうちに、異人の襲来を退ける機会を失うことになるかもしれない」"
 tenpo_events.7.a: "異人の武器と戦術の採用を許可する。"
 tenpo_events.7.b: "伝統的砲術の諸派を優遇しろ。"
 modifier_inoue_tatsuke_primacy: "井上・田付派の優位"
 modifier_favouring_traditional_musketry_houses: "伝統的な砲術諸派を優遇"
 modifier_favouring_takashima: "砲術諸派の冷遇"
 modifier_takashima_school: "高島流の推進"
 tenpo_events.8.t: "一碗の飯のために"
 tenpo_events.8.d: "米の買い占めや価格のつり上げに対する非難の声が高まり、[SCOPE.sState('tenpo_unrest_state_scope').GetName]では百姓と商人の間の緊張が限界を超えた。百姓の隊列は野盗や物乞いが加わって膨れ上がり、地方当局は今や藩全体に及ぶ一揆に直面している。"
 tenpo_events.8.f: "彼は最初の一人だった。悪徳商人の屋敷を襲い、不当に得た金品を民衆に分け与えた、あの陽気な仲間の一人だった。しかし、焚き火の傍らで視線を巡らすと、残った仲間がごくわずかであることに気がついた。栄吉と松蔵はまだそこにいたが、義憤に燃えていたあのころの面影はほとんどない。福松は二日目に命を落とし、七日目には竹七が続いた。残った者たちは、奉行の手勢に追われ、木の葉のように散り散りになってしまった。\n\n彼らに代わって加わった者たちの気質には羞恥と絶望を抱かずにはいられなかったが、他に道はない。鋸引きの刑にされることを思えば、彼らのようなろくでもない仲間でさえ天の恵みに思えた。"
 tenpo_events.8.a: "兵を派遣してこの悪党どもを鎮圧せよ。"
 tenpo_events.8.b: "騒乱が自然に収まるのに任せる。"
 tenpo_events.8.c: "村の庄屋たちに働きかけて混乱を静めさせる。"
 modifier_consulted_headsmen: "村の譲歩"
 modifier_lingering_brigandry: "止まらない野盗行為"
 modifier_brutal_anti_bandit_campaigns: "残虐な討賊作戦"
 je_taming_the_north: "北方の管理"
 je_taming_the_north_reason: "#b [SCOPE.sState('hokkaido_state_scope').GetName]開拓使#!、いわゆる#b 開拓使#!の設置により、かつての辺境の地は活気に溢れるようになった。新たな土地と機会を求め、毎日のように新しい人々が南方から到来しているのだ。\n\nしかし、これは単なる人の流入ではない。入植者たちと一緒に、官僚、知識人、そして近代化を志す、先見の明を持った者たちが、この地を形作るという使命を抱いてやって来ている。自らが描く[ROOT.GetCountry.GetName]の未来の姿を今、[SCOPE.sState('hokkaido_state_scope').GetName]で実現しようという意欲に燃えながら。"
 taming_the_north_agriculture_potentials_goal_tt: "アクション「#b $button_je_taming_the_north_agriculture_potentials$#!」を#v 3#!回使用した"
 taming_the_north_agriculture_arable_goal_tt: "アクション「#b $button_je_taming_the_north_agriculture_arable_land$#!」を#v 3#!回使用した"
 taming_the_north_colonies_goal_tt: "アクション「#b $button_je_taming_the_north_establish_colonies$#!」を使用した"
 je_taming_the_north_additional_goal_pre: "我が国が#b $STATE_SAKHALIN$#!全域を所有している場合、#b $modifier_tamed_north$#!の[concept_timed_modifier]が$STATE_SAKHALIN$[concept_state_region]にも適用される:"
 je_taming_the_north_additional_goal: "我が国が[SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]の全土を所有している場合、#b $modifier_tamed_north$#!の[concept_timed_modifier]が[SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]にも適用される:"
 je_taming_the_north_additional_goal_completed: "我が国が[SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]の全土を所有しているため、#b $modifier_tamed_north$#!の[concept_timed_modifier]が[SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]にも適用される:"
 modifier_tamed_north: "模範的な植民地"
 modifier_northern_learnings: "開拓使の学習"
 button_je_taming_the_north_establish_colonies: "国の補助で植民地を設立"
 button_je_taming_the_north_establish_colonies_desc: "十分な数の入植者がいない植民地は失敗する運命にある。北方へ入植する家族たちを[ROOT.GetCountry.GetName]全土から呼び込めるような奨励策を検討すべきだ。"
 button_je_taming_the_north_integrate_ainu: "アイヌの法的保護を実施"
 button_je_taming_the_north_integrate_ainu_desc: "今まで、開拓使は[GetCulture('ainu').GetName]に対し、彼らを強制的に同化させ、その文化を抹消する姿勢を取ってきた。しかし、北方の居住者である[GetCulture('ainu').GetNameNoFormatting]たちとより公平な関係を築こうとする我々の段階的な試みは、両民族の間に関係改善をもたらしている。\n\nそこで、[GetCulture('ainu').GetNameNoFormatting]を[ROOT.GetCountry.GetAdjective]の法の下で保護されるべき同胞たる民族として法的に明文化し、[GetCulture('japanese').GetName]と同じ権利と義務を認めるという提案が[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]になされた。"
 ainu_frenship_tt: "我が国はこれまで、さまざまな#b イベント#!において、一貫して[GetCulture('ainu').GetName]の利益を推進してきた"
 button_je_taming_the_north_sapporo_agricultural_college: "札幌農学校を設立"
 button_je_taming_the_north_sapporo_agricultural_college_desc: "北方は、農業や土地管理の最新理論を試すのにうってつけの舞台だ。知識のある外国人を招いて最先端の農学校を設立し、土地の科学的改良を進める中核としよう。"
 sapporo_partner_positive_catalyst_tt: "条件を満たすランダムな国との間で、#g ポジティブ#!な [concept_diplomatic_catalyst]が発生する"
 button_je_taming_the_north_agriculture_potentials: "新しい作物を導入"
 button_je_taming_the_north_agriculture_potentials_desc: "この島で利用できる耕作地は何より重要だが、真の経済発展は適切な作物を育ててこそ実現される。\n\n#b 札幌農学校#!が先導する農業分野の新たな進展により、これまで不可能と思われていた作物を、この極寒の辺境に導入することが可能となる\n\n利用可能なオプション:\n• #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_opimizing_existing_variants_tt $modifier_opimizing_existing_variants$#!（スケーリング）\n• [GetBuildingType('building_rice_farm').GetName]\n• [GetBuildingType('building_dye_plantation').GetName]\n• [GetBuildingType('building_opium_plantation').GetName]\n• [GetBuildingType('building_vineyard').GetName]"
 established_sapporo_college_tt: "我々は#b 札幌農学校#!を設立した"
 hokkaido_agriculture_potentials_tt: "このディシジョンは合計#v 3#!回実行できる。（現在[ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_potentials_counter_var').GetValue|v0]）"
 modifier_opimizing_existing_variants_tt: "[GetStaticModifier('modifier_opimizing_existing_variants').GetName|v]\n[GetStaticModifier('modifier_opimizing_existing_variants').GetDesc]"
 button_je_taming_the_north_agriculture_arable_land: "開拓を続行"
 button_je_taming_the_north_agriculture_arable_land_desc: "ここの広大な土地は未墾の地ではあるが、大きな可能性を秘めている。大山脈が豊かな水をもたらし、耕地を北へと広げる十分な機会を与えてくれるのだ。\n\n我々は不屈の[GetCulture('japanese').GetName]魂の証として、湿地を干拓し、田畑に水を引いて、この地を支配してみせる。"
 hokkaido_agriculture_arable_tt: "このディシジョンは合計#v 3#!回実行できる。（現在[ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_arable_counter_var').GetValue|v0]）"
 hokkaido_events.1.t: "第八の道"
 hokkaido_events.1.d: "[SCOPE.sState('hokkaido_scope').GetName]、すなわちアイヌの地を日本へ編入するのに伴い、この土地の新たな地位を反映した新しい名前を選定しなければならない。新設された開拓使はいくつかの案を提示し、[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]による裁可を仰いだ。"
 hokkaido_events.1.f: "「あそこは野蛮人の地にすぎん。湿地と泥だらけでな。貧しい漁師と人食いどものうろつく地じゃて。そんな呪われとる場所に、[ROOT.GetCountry.GetCapital.GetCityHubName]で得られん何を求めておるというのじゃ？」\n\n「目的です、母上。それに、自分自身の力で築ける何かを」"
 hokkaido_events.1.a: "その名前を#tooltippable;tooltip:hokkaido_events.1_tt_3 #b 北海道#!#!、すなわち「北海の道」とする。" # 北加伊道
 hokkaido_events.1.b: "この地の居住者たちに敬意を表し、#tooltippable;tooltip:hokkaido_events.1_tt_2 #b 北加伊道#!#!とする。" # 北海道
 hokkaido_events.1.c: "#tooltippable;tooltip:hokkaido_events.1_tt_4 #b 海島道#!#!、すなわち「海の島の道」の方が明らかによい案だ。"
 hokkaido_events.1.e: "#tooltippable;tooltip:hokkaido_events.1_tt_5 #b 日高見道#!#!には実に文学的な響きがある。"
 hokkaido_events.1.tt_1: "#b 札幌#!市が設置され、#b 函館#!に替わってこの島の新たな行政の府となる。"
 modifier_ainu_heritage_aknowleged: "加伊の地"
 modifier_breaking_new_ground: "新たな大地を切り開く"
 modifier_hokkaido_naval_connections: "海に囲まれた道"
 modifier_call_of_the_frontier: "辺境からの呼び声"
 the_ainu_will_appreciate_this_tt: "@information! [GetCulture('ainu').GetName]はこれを忘れないだろう"
 hokkaido_events.1_tt_2: "#b 北加伊道#!\n開拓判官であった松浦武四郎の言葉によれば、#italic 加伊#!とはアイヌの人々が自らの民族を指す古い現地語であるという。"
 hokkaido_events.1_tt_3: "#b 北海道#!\n松浦武四郎の当初の案に対する政府の別案。武四郎が提案した#italic 加伊（かい）#!の文字が、同音の#italic 海（かい）#!に置き換えられている。\n\n@information! 実際の歴史において選ばれたのはこの案。"
 hokkaido_events.1_tt_4: "#b 海島道#!\n何よりもまず、この島を規定するのは海との関わりである。その事実を新たな名称にも反映するべきだ。"
 hokkaido_events.1_tt_5: "#b 日高見道#!\n北東の辺境の地を指す大和時代の古称。これを選択することで、新たな植民地は日本の古代に確かに根ざすことになる。"
 hokkaido_events.2.t: "新天地"
 hokkaido_events.2.d: "この地域にどのように入植するのが最善なのかを、[SCOPE.sState('hokkaido_state_scope').GetName]開拓使はしばらくの間決めかねていた。今や行政官たちはしびれを切らし、最終的な判断を下すよう求めている。"
 hokkaido_events.2.f: "幼いころ、彼の父はよく一族の祖先について語っていた。戦国の世を生きた、誇り高く気高い武士たちのことを。質素ながら威厳ある姿と、数々の武勲のことを。幼き日の彼はそうした話に心を奪われたものだが、大人になった今、それはただ物悲しさを運んでくるばかりだった。書類仕事に追われ、街のどこかで酔っ払い、威厳を保つためだけに帯刀している男——そんな父が、過去の美徳を声高に称える。その皮肉は、彼にとって耐えがたいものだった。\n\nだから父に家業の経営を手伝えと言われたとき、彼は軽蔑を込めてそれを拒み、すぐさま北へ向かった。もしかすると、北の大地にこそ一族の救いがあるのかもしれない。"
 hokkaido_events.2.a: "屯田兵による入植を優先する。"
 hokkaido_events.2.b: "素朴な農民こそが[ROOT.GetCountry.GetName]の屋台骨だ。"
 hokkaido_events.2.c: "ほとんどの[GetCulture('japanese').GetName]人の入植を、[GetCulture('ainu').GetName]が使用していない場所に制限する。"
 modifier_tondenhei_settlements: "屯田兵開拓地"
 modifier_peasant_settlements: "農民開拓地"
 modifier_restricted_settlements: "アイヌ中核地の保護"
 hokkaido_events.2.tt_1: "[concept_capital_state]にいる全[GetCulture('japanese').GetName]人[Concept('concept_pop', '$concept_pops$')]の#v 1.5%#!が[SCOPE.sState('hokkaido_state_scope').GetName]に移住する"
 hokkaido_events.2.tt_2: "[SCOPE.sState('hokkaido_migration_origin_scope').GetName]（[GetGeographicRegion('geographic_region_home_islands').GetName]で[Concept('concept_gdp','$concept_gdp_short$')]が最も低い[Concept('concept_state', '$concept_states$')]の一つ）にいる全[GetCulture('japanese').GetName]人[Concept('concept_pop', '$concept_pops$')]の#v 3%#!が[SCOPE.sState('hokkaido_state_scope').GetName]に移住する"
 modifier_old_swords_in_new_lands: "新天地の古い刀"
 modifier_go_north_young_man: "若者よ、北へ行け"
 hokkaido_events.3.t: "進歩の種子"
 hokkaido_events.3.d: "札幌農学校での最近の成果を受け、[SCOPE.sState('hokkaido_state_scope').GetName]の農地に新たな作物を導入する提案が行われた。"
 hokkaido_events.3.f: "#b 個人研究記録 154#!\n最新の試験結果を受け、西方種の接ぎ木は取りやめ、南方種へ切り替えた。学生たちは、栽培限界をかなり北まで押し上げられる見込みだと言っている。上川以北に届く可能性すらあると。収量の見込みを見極めるには追加調査が必要だが、感触は悪くない。明日は学部長との面会を申し入れた。新しいネクタイを買わねば。"
 hokkaido_events.3.a: "すでにある作物の改良に注力せよ。"
 hokkaido_events.3.b: "現地で[GetBuildingType('building_rice_farm').GetName]を作れるよう、耐寒性の強い品種を開発し、する。"
 hokkaido_events.3.c: "ここの低地は藍の[GetBuildingType('building_dye_plantation').GetName]によく適している。"
 hokkaido_events.3.e: "ここではケシがよく育つ。[GetBuildingType('building_opium_plantation').GetName]こそが未来だ。"
 hokkaido_events.3.g: "特別なブドウの品種を使って[GetBuildingType('building_vineyard').GetName]を作ろう。"
 button_je_taming_the_north_complete: "我々は持てる技術を総動員してこの地を開発してきた"
 modifier_introducing_new_crops: "新しい作物の導入"
 modifier_opimizing_existing_variants: "耐寒性の強い品種"
 hokkaido_events.4.t: "土壌の成長" # Markens Grøde really does sound better in Norwegian
 hokkaido_events.4.d: "かつての広大な原野が価値ある農地に転換されたことで、[SCOPE.sState('hokkaido_state_scope').GetName]開拓使はまた一つ重要な節目を迎えた。"
 hokkaido_events.4.f: "実に見事なものだった。十年前なら、彼の目の前を流れるこの川を安全に航行できる船といえば、大きくてもせいぜい小さな手漕ぎ舟くらいのものだった。それが今では、澄んだ山の空気へ黒煙を吐き上げる巨大な蒸気船から、作業員たちが木箱や麻袋を次々と荷揚げしている。次の水門の工事用資材だろうか？あるいは、さらに上流で進む排水事業のためのものか？はたまた、その先の谷にできた新しい村から届いた物資にすぎないのか？彼にはわからなかった。だが、実のところそんなことはどうでもよかった。何を運んでいようと、その船が運んでいるのは未来だったのだから。"
 hokkaido_events.4.a: "我々が鍬を振るうたびに、この土地は形作られていく。"
 hokkaido_events.4.b: "そして我々が家を建てるたびに、この地は成長していくのだ。"
 hokkaido_events.4.tt_1: "[SCOPE.sState('hokkaido_migration_origin_scope').GetName]（[GetGeographicRegion('geographic_region_home_islands').GetName]で[Concept('concept_gdp','$concept_gdp_short$')]が最も低い[Concept('concept_state', '$concept_states$')]の一つ）にいる全[GetCulture('japanese').GetName]人[Concept('concept_pop', '$concept_pops$')]の#v 2%#!が[SCOPE.sState('hokkaido_state_scope').GetName]に移住する"
 modifier_immigration_burst: "移住の波"
 modifier_open_to_business: "商売開始"
 hokkaido_events.5.t: "少年よ、大志を抱け…"
 hokkaido_events.5.d: "[SCOPE.sCountry('sapporo_partner_country_scope').GetAdjective]の職員が指導した札幌農学校の第1期生が卒業を迎え、習得した新しい技能を実践に移そうと意欲に燃えている。一方、学校の評議会は学校の今後の運営方針と重点項目について審議を重ねている。"
 hokkaido_events.5.f: "「…金銭のためでも、私欲のためにでもなく、そしていわゆる名声という空しいもののためでもなく、人として達成しうるすべてのことを達成するために、大志を抱きなさい」\n\n―ウィリアム・スミス・クラーク、#italic 札幌農学校教頭の退任挨拶#!"
 hokkaido_events.5.a: "農学校は農業にだけ注力していればよいのだ。"
 hokkaido_events.5.b: "工学部の拡充を優先すべきだ。"
 hokkaido_events.5.c: "人文学部を設立し、地元文化の研究を始める。"
 hokkaido_events.5.tt_1: "#b 札幌#!の[SCOPE.sCountry('sapporo_partner_country_scope').GetAdjective]人職員の影響により、地元に[GetCulture('japanese').GetName]の[SCOPE.sReligion('sapporo_partner_religion_scope').GetName]コミュニティが形成される"
 hokkaido_events.5.tt_2: "[concept_journal_entry]「#b $je_taming_the_north$#!」で「#b $button_je_taming_the_north_agriculture_potentials$#!」および「#b $button_je_taming_the_north_agriculture_arable_land$#!」がアンロックされる"
 modifier_sapporo_expanded_agricultural_faculty: "革新的な農業手法"
 modifier_sapporo_expanded_engineering_faculty: "最先端の工学部"
 modifier_sapporo_humanities_faculty: "札幌文化研究会"
 hokkaido_events.6.t: "アイヌモシリ、シサムモシリ"
 hokkaido_events.6.d: "国内で議論がくすぶる中、[ROOT.GetCountry.GetCapital.GetCityHubName]は[SCOPE.sState('hokkaido_state_scope').GetName]の法的地位に関する新たな勅令を発布した。これによってアイヌの居住地が正式に画定され、[ROOT.GetCountry.GetAdjective]の公的な官僚機構と並行して存在する限定的な機関が設置されることになった。"
 hokkaido_events.6.f: "「ヒンナ！ヒンナ！」歯のほとんど抜け落ちたアイヌの老婆は、ニタリと笑って彼に汁物の椀を差し出した。その中に盛られた獣肉の取り合わせを見て、この場に両親がいなくて本当によかったと、彼は天に感謝した。\n\n「平和のためだ…」彼はそう呟くと、引きつった笑みを浮かべながらその椀を受け取った。"
 hokkaido_events.6.a: "「この地には、両者が共存するのに十分な広さがある」"
 modifier_opposes_ainu_rights: "蛮族の譲歩"
 modifier_supports_ainu_rights: "アイヌの権利の明文化"
 hokkaido_events.7.t: "開拓使の最終決議"
 hokkaido_events.7.d: "政府の委託任務が成功したことを正式に発表し、[SCOPE.sState('hokkaido_state_scope').GetName]開拓使は、残っている責務を国に移管することを決定した。"
 hokkaido_events.7.f: "#b 布告第八号#!\n[SCOPE.sState('hokkaido_state_scope').GetNameNoFormatting]開拓使をここに廃止し、函館・札幌・根室の三県を設置する。各県の管轄境界については、追って布告するものとする。"
 hokkaido_events.7.a: "将来の植民地事業にとっての輝かしい模範である…"
 hokkaido_events.7.b: "…そしてそれは[GetGeographicRegion('geographic_region_home_islands').GetName]にとっても同じである。"
 modifier_external_applications: "開拓使: 国外出願"
 modifier_domestic_applications: "開拓使: 国内出願"
 hokkaido_events.8.t: "大義なき開拓使"
 hokkaido_events.8.d: "[SCOPE.sStateRegion('hokkaido_state_region_scope').GetName]を失い、開拓使は任務を完了できないまま解散を余儀なくされた。これに対し、憤慨した市民たちが[ROOT.GetCountry.GetName]の街頭に繰り出し、国家の威信失墜と自身の投資の損失の両方に抗議の声を上げている。"
 hokkaido_events.8.f: "疲れ果てた名誉行政官は、執務室の椅子にドスンと腰を落としてから、盃に酒をなみなみと注いだ。そして一息に飲み干すと、机上に広げられた地図へと視線を落とした。そこには細かな走り書きや注記、印などがびっしりと記されている。これらはすべて、彼が生涯かけて熱意を傾けてきた数多の構想の痕跡である。だが今や、構想も気力も尽き果て、どの書き込みからも滲みだす当時の楽観が、かえって彼を嘲るような趣を帯びていた。\n\nもう知ったことか、何もかも——そう思うと、彼はもう一杯酒を注いだ。"
 hokkaido_events.8.a: "遺憾だが、この結末は政府の統制が及ぶものではない。"
 modifier_lost_northern_investments: "失われた北への投資"
