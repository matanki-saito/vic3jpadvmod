 ## The Hidden Domain JE
 je_ryukyu_rivalry: "隠された領地"
 je_ryukyu_rivalry_reason: "#b 薩摩藩#!による#b 1609年の侵攻#!以来、[SCOPE.sCountry('ryukyu_scope').GetName]王国は実質的に[SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetName, 'JAP')]の領地であった。しかし、薩摩藩に従属しながらも、首里の宮廷は引き続き[SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetName, 'CHI')]から冊封を受け、北京に朝貢使節を派遣することで、独立国の体裁を保ってきた。\n\nこの体制は数世代の間維持されてきたが、西洋列強の進出と日本の開国により、東アジアの勢力均衡は変化した。今や双方は琉球との関係を明確にせねばならず、それが南方諸島を巡る公然たる争いを引き起こしている。\n$TOOLTIP_DELIMITER$\n@warning! #r 失敗:#! \n [SCOPE.sCountry('ryukyu_scope').GetNameNoFlag]の主張度が#variable 100%#!に到達する\n [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetNameNoFlag, 'JAP')]または[SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetNameNoFlag, 'CHI')]が[Concept('concept_subject','従属化')]または#b 併合#!される\n [SCOPE.sCountry('ryukyu_scope').GetNameNoFlag]が非当事国によって[Concept('concept_subject','従属化')]または#b 併合#!される\n\n@information! 揺さぶりの条件:\n #v 金銭譲渡#!の[concept_article]（#g @money!0.1-2K#!）を[SCOPE.sCountry('ryukyu_scope').GetName]と結ぶ\n [SCOPE.sCountry('ryukyu_scope').GetName]との[concept_relations]を#v 親しみ#!または#v 友好#!にする\n 最も高い[concept_naval_power_projection]を有する\n [SCOPE.sCountry('ryukyu_scope').GetName]に[concept_obligation]を負わせる\n [concept_journal_entry]アクションを使用する"
 #je_ryukyu_rivalry_goal:1 "You are asserting more influence over [SCOPE.sCountry('ryukyu_scope').GetName] than your rival."
 je_ryukyu_rivalry_victory_japan: "#b 日本#!の勝利条件:\n"
 je_ryukyu_rivalry_victory_china: "#b 中国#!の勝利条件:\n"
 je_ryukyu_rivalry_victory_ryukyu: "#b 琉球#!の勝利条件:\n"
 ryukyu_rivalry_sway_tt: "完全に自陣営に付くよう琉球に揺さぶりを掛けることにより、琉球に対する敵対勢力の支配力を断ち、その[Concept('concept_subject','従属')]を再び可能にすることができる。\n\n揺さぶりの条件:\n #v 金銭譲渡#!の[concept_article]（#g @money!0.1-2K#!）を琉球と結ぶ\n 琉球との[concept_relations]を#v 親しみ#!または#v 友好#!にする\n 最も高い[concept_naval_power_projection]を有する\n 琉球に[concept_obligation]を負わせる\n [concept_journal_entry]アクションを使用する"
 ryukyu_rivalry_assertiveness_tt: "琉球はバーが#v 100%#!に到達すると中立を主張する。 いったん中立を主張すると、以後#v 50#!年間、[concept_diplomatic_action]を通じて[concept_subject]にすることができなくなる。\n\n揺さぶりバーが#v -20#!から#v +20#!の間である場合、主張度バーは毎月#g 0.5#!ずつ増加する。\n\n琉球は利用可能なアクションのうち、揺さぶりに影響を与えるものを使って日本と中国を互いに牽制させることで、中立を主張できる。\n\n例:\n#v 金銭譲渡#!の[concept_article]（#g @money!0.1-2K#!）を両陣営と結ぶ、またはどちらの陣営とも結ばない\n 両陣営との[concept_relations]を#v 親しみ#!または#v 友好#!にするか、どちらの陣営ともそうならないようにする\n 両陣営に[concept_obligation]がある、またはどちらに対してもない\n 一方が優勢または劣勢になったときに、前述の条約を破棄または締結する"
 ryukyu_rivalry_completion_japan_victory_tt: "[SCOPE.sCountry('ryukyu_scope').GetName]が[SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetName, 'JAP')]と[Concept('concept_unification', '統合')]する"
