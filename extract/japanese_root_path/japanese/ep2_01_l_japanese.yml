l_japanese:
 japan_events.1.t: "すべての人のための郵便"
 japan_events.1.d: "近代主義の思想家たちが[ROOT.GetCountry.GetName]内で影響力を強めるにつれ、旧来の飛脚制度の限界が次第に明らかになってきた。封建秩序の解体であれ、国民の識字率の向上であれ、いまや近代国家を支えうる中央集権的な郵便制度を整備するための条件は整っている。"
 japan_events.1.f: "政府の印章を付けた制服の伝令たちが、いつになく大量の手紙が入った郵袋を抱えて街路を駆け抜けていった。首都では、官吏たちが前かがみで地図をのぞき込み、夜を徹して経路の調整と切手の枚数の確認に追われていた。旧来の飛脚網が乱されることに商人たちが不満を漏らす一方で、好奇心いっぱいの子供たちは、初めての手紙を新しい郵便箱に押し込んだ。慣習によって分断されていたこの国が、いまや一つの声で語り始めようとしていた。"
 japan_events.1.a: "全国的な展開に必要なすべての資金を投入しよう。"
 japan_events.1.b: "主要な市街地に重点を置く。"
 japan_events.1.c: "地方を優先すべきだ。"
 japan_events.1.e: "この改革を[SelectLocalization(SCOPE.sCharacter('JAP_maejima_hisoka').IsValid, SCOPE.sCharacter('JAP_maejima_hisoka').GetFullName, 'maejima_hisoka_string')]に委ねよう。"
 japan_events.1.g: "旧来の飛脚制度を残そう。"
