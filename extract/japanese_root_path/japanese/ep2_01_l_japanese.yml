 japan_events.3.t: "一年の数え直し"
 japan_events.3.d: "新暦の採用により、一年がひそかに短縮された。数えられる日数が減ったことで、賃金や家賃、そして税金が旧制度のもとでの見通しとはもはや合わなくなっている。労働者は自らの賃金が減っていることに気づき、官吏たちはその食い違いの説明に苦労している。"
 japan_events.3.f: "労働者たちは硬貨を何度も数え直し、不満げに首を振った。手を荒らして働いたにもかかわらず、それに見合った報酬は得られない。一年は短くなり、失われた一日一日が、疲れた腕と空っぽの懐に爪痕を残していく。"
 japan_events.3.a: "一年が短くなったのだ。仕方がない。"
 japan_events.3.b: "負担を皆で負うのだ。"
 japan_events.3.c: "安定のために、損失を受け入れよう。"
 japan_single_fire_events_lost_income_mod: "一年の短縮による賃金ショック"
