 japan_events.4.t: "名前の西洋化"
 japan_events.4.d: "[ROOT.GetCountry.GetName]が諸外国と外交や貿易を行うのに伴い、条約、書簡、公式文書において[GetCulture('japanese').GetName]の名前をどのように表記すべきかという問題が浮上した。西洋の代表者たちの間では、彼ら自身の慣習に従って、名を姓の前に表記することを求める傾向が強まっている。"
 japan_events.4.f: "事務員たちは前かがみの姿勢で机に向かい、外国の役人に宛てた文書にペンを走らせていた。諸外国でのわかりやすさを優先するために、長年守り続けてきた伝統を変えることが正しいのかをひそひそと議論していたところ、ある者が印章を握る手を止め、紙にインクがのるまでの一瞬、ためらいを見せた。"
 japan_events.4.a: "外交文書では西洋の慣習を採用する。"
 japan_events.4.b: "伝統的な姓名の順序を維持する。"
 japan_events.4.c: "新時代が到来したのだ。あらゆる場合において、西洋の慣習を採用しよう。"
 japan_single_fire_events_name_order_westernized_mod: "姓名表記を西洋化"
 japan_single_fire_events_name_order_traditional_mod: "伝統的な姓名順を維持"
 japan_single_fire_events_name_order_resistance_mod: "姓名表記に関する文化的論争"
 japan_single_fire_events_name_order_approval_mod: "行政上の明確化"
 japan_events.5.t: "漢文の問題"
 japan_events.5.d: "布告や規則、そして記録は長らく、教育を受けた一握りの者しか理解できない古典的な言語に依存してきた。改革論者たちは、口語体による行政が透明性と効率性を高めると主張したが、一方で伝統そのものが書き言葉に権威を与えてきたのだと譲らない者もいた。"
 japan_events.5.f: "官僚たちは夜遅くまで机に向かい、静かな決意を胸に訓令の文言を休むことなく書き直した。一人が目をこすって一息つき、それからまた、一点一画も書き落とさぬよう作業を続けた。その一筆一筆が、混乱と無秩序に対するささやかな戦いのように感じられた。"
 japan_events.5.a: "行政において口語体を推進する。"
 japan_events.5.b: "内部文書の限定的な改革を許可する。"
 japan_events.5.c: "すべての国家文書で伝統的な漢文を保持する。"
 japan_language_partial_language_reform_mod: "限定的な行政言語改革"
 japan_single_fire_events_language_reform_support_mod: "口語行政の支持"
 japan_single_fire_events_language_traditionalist_opposition_mod: "口語行政への反対"
