 japan_events.2.t: "統一されていない暦"
 japan_events.2.d: "何世紀もの間使われてきた日本の太陰太陽暦は、西洋世界とのずれがますます大きくなりつつある。商人たちは外国の取引相手との調整が困難だと不満を漏らし、民衆からは祭礼や家賃、納税期限の食い違いによる混乱が報告されている。"
 japan_events.2.f: "事務員たちは背を丸めて座り、帳簿の一行一行を慎重に書き写していた。書き換えを繰り返すうちに紙の山は積み上がり、もはや存在しない月を追い続ける彼らの目は痛む。旧来の暦は静かに消え去ろうとしていた。"
 japan_events.2.f_telegraph: "配達人たちは通りを急ぎ、次々と通知を届けた。人々は足を止めて告知の一つ一つに目を通したが、ついていけないほどの速さで日付が変わることに目を回した。知らせは瞬く間に広まり、旧来の暦はほぼ一夜にして消え去った。"
 japan_events.2.a: "直ちに暦の改革を進める。"
 japan_events.2.b: "[GetTechnology('electric_telegraph').GetName]を利用して変化を促進する。"
 japan_events.2.c: "ひとまず旧来の制度を残そう。"
