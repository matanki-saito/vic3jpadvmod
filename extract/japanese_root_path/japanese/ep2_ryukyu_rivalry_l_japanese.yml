 modifier_ryukyu_rivalry_scholars_pleased: "貢納秩序の維持"
 modifier_ryukyu_rivalry_honor_kikoeogimi: "儀礼上の紛糾"
 modifier_ryukyu_rivalry_diplomatic_appeasement: "外交的宥和"
 modifier_ryukyu_rivalry_armed_forces_discontent: "無策への懸念"
 # Events
 ryukyu_rivalry.1.t: "朝貢に関する協議"
 ryukyu_rivalry.1.d: "[SCOPE.sCountry('ryukyu_scope').GetName]は[ROOT.GetCountry.GetName]への支持を高めている。これに応じて、[SCOPE.sCountry('rival_scope').GetName]は独自の外交努力を急ぎ、表向きは礼を示しつつ、裏では[SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]の朝貢関係に伴う義務を着実に強化している。"
 ryukyu_rivalry.1.f: "琉球王府の広間には、封印された箱が丁寧に並べられていた。廷臣たちが御簾の向こうで囁き合うなか、手紙が読み上げられた。一通の書状は中国の朱印で封じられ、もう一通は日本の繊細な筆致で綴られている。一節ごとに義務と約束が述べられ、二つの大国がこの王国を自らの側に手繰り寄せようとしていた。"
 ryukyu_rivalry.1.a: "[SCOPE.sCountry('rival_scope').GetName]に対して正式な抗議を行う。"
 ryukyu_rivalry.1.b: "[SCOPE.sCountry('ryukyu_scope').GetName]に築き上げた繋がりを活用する。"
 ryukyu_rivalry.1.c: "長年に及ぶ我々の後援を王府に思い出させよ。"
 ryukyu_rivalry.1.e: "この件は介入に値しない。"
 ryukyu_rivalry.1.tt1: "[SCOPE.sCountry('ryukyu_scope').GetName]が[ROOT.GetCountry.GetName]の従属国であり、[concept_liberty_desire]が#v 25#!未満である"
 ryukyu_rivalry.1.tt2: "[SCOPE.sCountry('ryukyu_scope').GetName]が[ROOT.GetCountry.GetName]の従属国ではなく、[concept_relations]が#v 友好#!以上である"
 ryukyu_rivalry.1.tt3: "[ROOT.GetCountry.GetName]は少なくとも3つの[Concept('concept_building','$concept_buildings$')]を[SCOPE.sCountry('ryukyu_scope').GetCapital.GetName]に所有している"
 ryukyu_rivalry.2.t: "港での競合"
 ryukyu_rivalry.2.d: "[SCOPE.sCountry('ryukyu_scope').GetName]の港に[SCOPE.sCountry('rival_scope').GetAdjective]の使節団が滞在していることで、多くの[GetCulture('ryukyuan').GetName]商人が彼らに注目し、協力するようになっている。これによって王府内における彼らの地位が高まる一方、我々自身の影響力が減退している。"
 ryukyu_rivalry.2.f: "商人の帳簿は閉じられ、別の印章の下で再び開かれた。かつて我々の保証を求めていた者たちは、今や別の応接間に居座って、改定された関税やより安全な航路について話し合っている。金にとって、もっと頼りがいのある後ろ盾が見つかったということなのだろう。"
 ryukyu_rivalry.2.a: "卑劣な手段だ。"
 ryukyu_rivalry.3.t: "[SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]の将軍を訪問"
 ryukyu_rivalry.3.d: "将軍である[SCOPE.sCharacter('ryukyu_general_scope').GetFullName]が、随行の将校たちとともに[SCOPE.sCountry('ryukyu_scope').GetName]に到着した。沿岸防衛を視察するらしい。彼らは恭順の意をもって丁重に受け入れられており、それに伴って王府での[SCOPE.sCountry('rival_scope').GetName]の影響力は強まる一方、我々のそれは僅かずつ損なわれている。"
 ryukyu_rivalry.3.f: "将軍が側近たちと共に城壁を歩き、砲台や見張り塔の一つ一つを注意深く観察する。琉球の部隊は、評価の視線が注がれていることを痛いほど感じながら整列した。ひとつひとつの所作、そしてひとつひとつの敬礼が、両勢力の間に張り巡らされた見えざる糸をさらに強くしていった。"
 ryukyu_rivalry.3.a: "情勢が危うさを増している。"
 ryukyu_rivalry_risk_of_confrontation: "@warning! [SCOPE.sCountry('china_scope').GetName]と[SCOPE.sCountry('japan_scope').GetName]の両軍が沿岸防衛を視察しているとなれば、#r 衝突#!が発生してもおかしくない"
 ryukyu_rivalry.4.t: "将軍の訪問"
 ryukyu_rivalry.4.d: "将軍である[SCOPE.sCharacter('ryukyu_general_scope').GetFullName]が、随行の[SCOPE.sCountry('from_scope').GetName]の将校たちとともに[SCOPE.sCountry('ryukyu_scope').GetName]に迎えられた。我々の沿岸防衛をぜひ視察したいという。彼らは恭順の意を持って丁重に受け入れられている。"
 ryukyu_rivalry.4.f: "$ryukyu_rivalry.3.f$"
 ryukyu_rivalry.4.a: "彼らを厳重に監視せよ。"
 ryukyu_rivalry_officer_arrives: "[SCOPE.sCountry('from_scope').GetName]からの[concept_general]が利用可能になる"
 ryukyu_rivalry.5.t: "[SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]の運命"
 ryukyu_rivalry.5.d_victor: "[SCOPE.sCountry('ryukyu_scope').GetName]における我々の努力は実を結んだ。持続的な外交、経済、そして政治的圧力により、王府は今や我々の指示を仰ぐようになり、その主権をめぐる問題は我々に有利な形で解決した。"
 ryukyu_rivalry.5.d_loser: "我々の努力にもかかわらず、[SCOPE.sCountry('victor_scope').GetName]は[SCOPE.sCountry('ryukyu_scope').GetName]に対し決定的な影響力を確立した。王府は新しい政治的現実を受け入れ、諸島は完全に[SCOPE.sCountry('victor_scope').GetNameNoFormatting]の勢力圏に組み込まれた。"
 ryukyu_rivalry.5.d_ryu: "我々が維持しようとしてきた均衡は、もはや保つことができない。[SCOPE.sCountry('victor_scope').GetName]からの圧力が高まるなか、我が王府は新しい政治的取り決めを受け入れた。[SCOPE.sCountry('ryukyu_scope').GetName]の未来は、今や彼らの権勢の下で展開していくことになる。"
 ryukyu_rivalry.5.f_annexed: "[SCOPE.sCountry('victor_scope').GetCapital.GetName]で発行された墨痕鮮やかな布告は、印章が乾く間もなく那覇の市場の広場で読み上げられた。[SCOPE.sCountry('ryukyu_scope').GetAdjectiveNoFormatting]の旗は降ろされ、統治者の旗に替えられた。日没までの間に行政庁が設置され、新たな布令が掲示された。"
 ryukyu_rivalry.5.f_subject: "[SCOPE.sCountry('victor_scope').GetCapital.GetNameNoFormatting]で発行された墨痕鮮やかな布告は、印章が乾く間もなく那覇の市場の広場で読み上げられた。勅令はそれぞれ、帝国における[SCOPE.sCountry('ryukyu_scope').GetName]の新たな地位を定めるものである。王国は長らく遠方の朝廷に朝貢してきたが、今やその官吏たちは正式に、より大きな力に対する義務に縛られることとなった。日没までの間に、彼らの運命は定まった。"
 ryukyu_rivalry_ryukyu_vassalise_tt: "[SCOPE.sCountry('ryukyu_scope').GetName]が[SCOPE.sCountry('victor_scope').GetName]の[concept_puppet]になる"
 ryukyu_rivalry_ryukyu_transfer_subject_tt: "[SCOPE.sCountry('ryukyu_scope').GetName]が[concept_subject]として[SCOPE.sCountry('victor_scope').GetName]に移譲される"
 ryukyu_rivalry_ryukyu_annex_tt: "[SCOPE.sCountry('victor_scope').GetName]が[SCOPE.sCountry('ryukyu_scope').GetName]を併合する"
 ryukyu_rivalry.5.a: "これですべてが決したのだ。"
 ryukyu_rivalry.6.t: "[SCOPE.sCountry('ryukyu_scope').GetCapital.GetNameNoFormatting]での対立"
 ryukyu_rivalry.6.d_brawl: "[SCOPE.sCountry('japan_scope').GetName]ならびに[SCOPE.sCountry('china_scope').GetName]から派遣された将校たちが、[SCOPE.sCountry('ryukyu_scope').GetName]の沿岸防衛の視察中に衝突した。この争いで死者が発生し、琉球の王宮は懸念の視線を投げかけている。"
 ryukyu_rivalry.6.d_accident: "沿岸の防衛設備を視察するために派遣された[SCOPE.sCountry('japan_scope').GetName]からの部隊と[SCOPE.sCountry('china_scope').GetName]からの部隊が、[SCOPE.sCountry('ryukyu_scope').GetName]の同じ要塞で鉢合わせした。これによって守備隊に混乱が生じ、一時的に銃撃戦となった。"
 ryukyu_rivalry.6.d_fire: "外国の視察団に割り当てられた[SCOPE.sCountry('ryukyu_scope').GetName]の宿舎で火災が発生し、[SCOPE.sCountry('japan_scope').GetAdjective]と[SCOPE.sCountry('china_scope').GetAdjective]の代表団の区画が全焼した。出火原因は不明だが、地元の役人たちは置き忘れた灯篭が原因ではないかと囁き合っている。"
 ryukyu_rivalry.6.f: "将校の開聞は物見櫓や倉の間を駆け抜けながら、守備兵たちに命令を伝えた。号令が矢継ぎ早に叫ばれ、食い違い、そして繰り返された。やがて平穏は戻ったが、開聞は列強間の相反する使命が琉球の脆弱な状況をいかに露呈させるかを改めて思い知らされた。"
 ryukyu_rivalry.6.a: "緊張が高まっている。"
 ryukyu_rivalry_ryukyu_confrontation_tt1: "[SCOPE.sCountry('japan_scope').GetAdjective]と[SCOPE.sCountry('china_scope').GetAdjective]の[concept_infamy]が#v 6#!増加した"
 ryukyu_rivalry.7.t: "琉球の布告"
 ryukyu_rivalry.7.d_ryukyu: "長年にわたる慎重な観察と巧妙な外交を経て、我が国の評議機関は外部の干渉を排して国政を自ら執る意思を表明した。王府は外部からの影響に厳格な制限を設けて、王国の儀礼、官僚、伝統的評議機関の優位を明文化した。王国は今や、自らの進む道を定めるのである。"
 ryukyu_rivalry.7.d: "長年にわたる慎重な観察と巧妙な外交を経て、[SCOPE.sCountry('ryukyu_scope').GetName]は我が国の影響を振り切り、外部の干渉を排して国政を自ら執る意思を表明した。王府は我々の介入に厳格な制限を設けて、王国がその儀礼、官僚、伝統的評議機関を維持し、我が国の権威から距離を置く道を選んだのである。"
 ryukyu_rivalry.7.f: "首里城の磨き上げられた床に、破り捨てられた印章や朝貢台帳が散乱している。謁見の間では今なお外国勢力の影響が感じられるが、それが王国の行動を左右することはもはやない。忍耐強い外交によって勝ち取られた危うい中立という形で、琉球の道は開かれるのだ。"
 ryukyu_rivalry.7.a: "帰属を巡る問題は決着した。"
 ryukyu_rivalry.7.b: "我々には武力行使という手も残っている。"
 ryukyu_rivalry.8.t: "隠された領地"
 ryukyu_rivalry.8.d: "[SCOPE.sCountry('japan_scope').GetName]の開港に伴い、長く眠っていた[SCOPE.sCountry('ryukyu_scope').GetName]の帰属を巡る問題が再び浮上した。琉球王国は何世代にもわたり、巧みな綱渡りを続けてきた。表向きは[SCOPE.sCountry('china_scope').GetName]の朝貢国でありながら、密かに[SCOPE.sCountry('japan_scope').GetNameNoFormatting]への忠誠も保ってきたのだ。両国は今、いかにして自らの影響力を誇示するかを検討しなければならない。"
 ryukyu_rivalry.8.f: "首里城の回廊には灯籠の明かりがともり、中山の王たちが全盛期に築いた朱塗りの梁を照らしている。彩色された天井の下では、書記たちが朝貢品を薩摩の布令の傍らに置いている。王府は長い間、中華からの冊封と鹿児島の影の間で均衡を保ってきた。今のところ平穏が続いているが、帰属をめぐる問題に全力を注がねばならない日が遠からずやってくるだろう。"
 ryukyu_rivalry.8.a: "この問題はいまだに決着していない。"
