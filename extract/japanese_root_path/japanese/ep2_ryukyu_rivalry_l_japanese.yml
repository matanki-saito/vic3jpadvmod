 ryukyu_rivalry_medium_influence_loss_self_tt: "[ROOT.GetCountry.GetName]が#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 揺さぶり#!#!を#red 2#!失った"
 ryukyu_rivalry_large_influence_loss_self_tt: "[ROOT.GetCountry.GetName]が#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 揺さぶり#!#!を#red 10#!失った"
 ryukyu_rivalry_large_influence_loss_japan_tt: "[SCOPE.sCountry('japan_scope').GetName]が#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 揺さぶり#!#!を#red 10#!失う"
 ryukyu_rivalry_large_influence_loss_china_tt: "[SCOPE.sCountry('china_scope').GetName]が#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 揺さぶり#!#!を#red 10#!失う"
 ryukyu_rivalry_send_general_tt: "[ROOT.GetCountry.GetName]が[concept_general]を[SCOPE.sCountry('ryukyu_scope').GetName]に恒久的に割り当てる"
 je_ryukyu_rivalry_sway_merchants_button: "貿易監督官の派遣"
 je_ryukyu_rivalry_sway_merchants_button_desc: "那覇の港を監督することで、我々は王府に使節を置き、どの外国勢力が貿易や貢納の権利を得るかに揺さぶりをかけることができる。"
 ryukyu_rivalry_sway_merchants_button_tt: "[ROOT.GetCountry.GetName]が[SCOPE.sCountry('ryukyu_scope').GetAdjective]の[concept_capital_state]にレベル#v 2#!以上の[GetBuildingType('building_port').GetName]を所有している"
 je_ryukyu_rivalry_inspect_defenses_button: "沿岸の防衛設備を視察"
 je_ryukyu_rivalry_inspect_defenses_button_desc: "軍事アクセスが確保されれば、信頼できる将軍を派遣して琉球の要塞を視察させ、城壁や物見櫓に我々の監修と戦略的意図を反映させることができる。"
 ryukyu_rivalry_inspect_defenses_button_tt: "[ROOT.GetCountry.GetName]は[SCOPE.sCountry('ryukyu_scope').GetName]との間に#v 軍事アクセス#![concept_treaty]を締結している"
 je_ryukyu_rivalry_honor_kikoeogimi_button: "聞得大君を顕彰"
 je_ryukyu_rivalry_honor_kikoeogimi_button_desc: "聞得大君に貢物を捧げる。王府の儀式や神聖な祭祀における彼女の権威は、琉球の評議会に対する我々の影響力の拡大に役立つだろう。"
 # Modifiers
 modifier_ryukyu_rivalry_overreach: "宗主権の過剰な拡大"
 modifier_ryukyu_rivalry_landowner_discontent: "琉球を巡る対立の懸念"
 modifier_ryukyu_rivalry_merchant_influence_strain: "港湾影響力の負担"
