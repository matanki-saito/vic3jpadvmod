 # # Scripted Buttons
 je_ryukyu_rivalry_reaffirm_suzerainty_button: "[SCOPE.GetRootScope.GetCountry.GetCustom('ryukyu_rivalry_reaffirm_suzerainty')]"
 je_ryukyu_rivalry_reaffirm_suzerainty_japan: "宗主権の再確認"
 je_ryukyu_rivalry_reaffirm_suzerainty_china: "朝貢関係の再確認"
 je_ryukyu_rivalry_reaffirm_suzerainty_button_desc: "琉球王府が我々の敵対勢力に傾いている。我々の領地に対し負う義務を思い出させ、彼らを我々の影響下に引き戻さねばならない。"
 ryukyu_rivalry_reaffirm_suzerainty_button_tt: "[ROOT.GetCountry.GetName]の[SCOPE.sCountry('ryukyu_scope').GetName]に対する#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 揺さぶり#!#!が、その敵対勢力よりも少ない"
 ryukyu_rivalry_small_influence_gain_self_tt: "[ROOT.GetCountry.GetName]が#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 揺さぶり#!#!を#green 2#!獲得する"
 ryukyu_rivalry_medium_influence_gain_self_tt: "[ROOT.GetCountry.GetName]が#v 5年#!にわたり、毎月#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 揺さぶり#!#!を#green 3#!獲得する"
 ryukyu_rivalry_large_influence_gain_self_tt: "[concept_journal_entry]が終了するまで、[ROOT.GetCountry.GetName]が毎月#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 揺さぶり#!#!を#green 3#!獲得する"
