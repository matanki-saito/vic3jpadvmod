 TAX_INCOME_TOLLS: "$TAB$#tooltippable #tooltip:[GetPlayer.GetTooltipTag],TOLLS_BREAKDOWN,TariffsTooltip @money![GetPlayer.PredictTolls|D+=]#!#!の[concept_tolls]"
 TOLLS_BREAKDOWN: "#tooltip_header [concept_tolls]#!\n合計: #v @money![GetPlayer.PredictTolls|K+=]#!\n$TOOLTIP_DELIMITER$\n[GetPlayer.PredictTollsDesc]"
