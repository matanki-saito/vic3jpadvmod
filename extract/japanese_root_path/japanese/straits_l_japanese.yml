l_japanese:
 DATA_STRAIT_NAME_FORMAT: "#tooltippable_name #tooltip:$TAG$,EMPTY_STRING,StraitTooltip $NAME$#!#!"
 strait_gibraltar: "ジブラルタル海峡"
 strait_bosporus: "ボスポラス"
 strait_oresund: "エーレスンド"
 strait_malacca: "マラッカ海峡"
 strait_hormuz: "ホルムズ海峡"
 strait_bab_el_mandeb: "バブ・エル・マンデブ海峡"
 strait_tsugaru: "津軽海峡"
 strait_sunda: "スンダ海峡"
 strait_lombok: "ロンボク海峡"
 strait_ombai: "オンバイ海峡"
 TOOLTIP_TYPE_STRAIT: "[concept_strait]"
 ALLOWED_COUNTRIES_SHORT_CONCEPT: "[Concept('concept_strait_allowed_countries','$concept_strait_allowed_countries_short$')]"
 building_fortification: "海軍要塞"
 pmg_base_building_fortification: "乗組員訓練"
 pm_fortification: "定期乗組員訓練"
 TAX_INCOME_TOLLS: "$TAB$#tooltippable #tooltip:[GetPlayer.GetTooltipTag],TOLLS_BREAKDOWN,TariffsTooltip @money![GetPlayer.PredictTolls|D+=]#!#!の[concept_tolls]"
 TOLLS_BREAKDOWN: "#tooltip_header [concept_tolls]#!\n合計: #v @money![GetPlayer.PredictTolls|K+=]#!\n$TOOLTIP_DELIMITER$\n[GetPlayer.PredictTollsDesc]"
 ## Country Budget Tolls
 # Top level entry for toll income breakdown on country budget. Breakdown leads to STRAIT_TOLL_VALUE_HEADER + STRAIT_TOLL_INCOME_COUNTRY_DESC
 STRAIT_TOLL_INCOME_ENTRY: "@money!#tooltippable #tooltip:$BREAKDOWN$ [STRAIT.GetName]の[concept_tolls]（#b $TOLL_RATE_ICON$[Nbsp]$TOLL_RATE_DESC$#!）により#variable $VALUE|D+$#!#!#!"
 # Breakdown leads to STRAIT_COUNTRY_TOLL_INCOME_HEADER + TOLL_BUDGET_ENTRY
 STRAIT_TOLL_VALUE_HEADER: "#header [STRAIT.GetName]の[concept_tolls]#!\n合計: @money!#v $VALUE|D$#!\n$TOOLTIP_DELIMITER$\n"
 STRAIT_TOLL_INCOME_COUNTRY_DESC: "@money!#tooltippable #tooltip:$BREAKDOWN$ [COUNTRY.GetName]から#v $VALUE|D+$#!#!#!"
 # Breakdown leads to STRAIT_TOLL_VALUE_GOODS_ENTRY_BREAKDOWN
 STRAIT_COUNTRY_TOLL_INCOME_HEADER: "#header [COUNTRY.GetName]からの[STRAIT.GetName]の[concept_tolls]#!\n合計: @money!#v $VALUE|D+$#!\n$TOOLTIP_DELIMITER$\n"
 TOLL_BUDGET_ENTRY: "@money!#tooltippable #tooltip:$BREAKDOWN$ [STATE.GetName]への[GOODS.GetTextIcon][Nbsp]#v $QTY|D$#!の[GOODS.GetNameNoIcon]から#variable $VALUE|D+$#!#!#!"
 ## Building Expense Tolls
 # Top header for toll breakdown on a building. Gets a list of STRAIT_TOLL_EXPENSE_ENTRY_ONE_CONTROLLER or STRAIT_TOLL_EXPENSE_ENTRY_TWO_CONTROLLERS added to it at the end
 STRAIT_TOLL_BUILDING_EXPENSE_HEADER: "#header [BUILDING.GetState.GetCountry.GetFlagTextIcon][Nbsp][BUILDING.GetState.GetName]の[BUILDING.GetName]の[concept_tolls]#!\n合計: @money!#v $VALUE|D-$#!\n$TOOLTIP_DELIMITER$\n"
 # Breakdowns lead to STRAIT_TOLL_VALUE_HEADER + STRAIT_TOLL_EXPENSE_GOODS_ENTRY
 STRAIT_TOLL_EXPENSE_ENTRY_ONE_CONTROLLER: "@money!#tooltippable #tooltip:$BREAKDOWN$ #variable[STRAIT.GetName]における[COUNTRY.GetAdjective]の[concept_tolls]（#b $TOLL_RATE_ICON$[Nbsp]$TOLL_RATE_DESC$#!）により$VALUE|D-$#!#!#!"
 STRAIT_TOLL_EXPENSE_ENTRY_TWO_CONTROLLERS: "@money!#tooltippable #tooltip:$BREAKDOWN$ [STRAIT.GetName]における[FIRST_COUNTRY.GetAdjective]の[concept_tolls]（#b $FIRST_TOLL_RATE_ICON$[Nbsp]$FIRST_TOLL_RATE_DESC$#!）および[SECOND_COUNTRY.GetAdjective]の[concept_tolls]（#b $SECOND_TOLL_RATE_ICON$[Nbsp]$SECOND_TOLL_RATE_DESC$#!）により#variable $VALUE|D-$#!#!#!"
 # Breakdown leads to STRAIT_TOLL_VALUE_GOODS_ENTRY_BREAKDOWN
 STRAIT_TOLL_EXPENSE_GOODS_ENTRY: "@money!#tooltippable #tooltip:$BREAKDOWN$ [GOODS.GetTextIcon][Nbsp]$AMOUNT|vD$の[GOODS.GetName]より#variable $TOTAL_EXPENSE|D-$#!#!#!"
 # Breaks down the toll calculation. STRAIT_TOLL_RATE_DESC is added at the end for each country with a toll on the strait
 STRAIT_TOLL_VALUE_GOODS_ENTRY_HEADER: "[STRAIT.GetName]を通過する[GOODS.GetName]に課される[TARGET_COUNTRY.GetFlagTextIcon][Nbsp][TARGET_STATE.GetName]の[concept_tolls]"
 STRAIT_TOLL_VALUE_GOODS_ENTRY_BREAKDOWN: "#header $STRAIT_TOLL_VALUE_GOODS_ENTRY_HEADER$#!\n$concept_tolls$: @money!#variable $TOLL_VALUE|D$#!\n$TOOLTIP_DELIMITER$\n[TARGET_COUNTRY.GetFlagTextIcon][Nbsp][TARGET_STATE.GetName]は[STRAIT.GetName]を経由して[GOODS.GetTextIcon][Nbsp]$AMOUNT|vD$の[GOODS.GetNameNoIcon]を[Concept('concept_trade','$concept_importing$')]しています。[concept_world_market]における価格が@money!#v $PRICE|D$#!であるため、合計$concept_import$額は@money!#v $VALUE|D$#!となります。この額には#v $TOTAL_TOLL_RATE|%0$#!の$concept_toll_rate$が適用されるため、最終的な支出は@money!#variable $TOLL_VALUE|D$#!となります。\n\n$concept_toll_rate$が#v $TOTAL_TOLL_RATE|%0$#!となる要因:"
 STRAIT_TOLL_RATE_DESC: "[COUNTRY.GetAdjective]による#v $TOLL_RATE|%0$#!の$concept_tolls$（#b $TOLL_RATE_ICON$[Nbsp]$TOLL_RATE_DESC$#!）"
 STRAIT_ACCESS_PLAYER: "[GetPlayer.GetName]$YOU$の[concept_strait_access]は#b [Strait.GetAccessStatusFor(GetPlayer.Self)]#!"
 STRAIT_TOLLS_PLAYER: "[concept_tolls]による毎週の収益は@money!#v [Strait.GetTollsFor(GetPlayer.Self)|D+]#!"
 #Tolls
 TOLL_RATE_REDUNDANT: "現在の通行税"
 TOLL_RATE_HEADER_no_tolls: "なし"
 TOLL_RATE_HEADER_low_tolls: "低"
 TOLL_RATE_HEADER_medium_tolls: "中"
 TOLL_RATE_HEADER_high_tolls: "高"
 STRAIT_NO_TOLLS_TOOLTIP: "#header [concept_tolls]なし#![ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasNoTolls(State.Self), 'TAX_OR_EXPENSE_LEVEL_CURRENT'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetControllerTollRateNoTolls( Country.Self )))]\n[SelectLocalization(Strait.StateHasNoTolls(State.Self), 'STRAIT_CURRENT_REVENUE', 'STRAIT_PREDICTED_REVENUE_NO_TOLLS')]"
 STRAIT_LOW_TOLLS_TOOLTIP: "#header [concept_tolls]「低」#![ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasLowTolls(State.Self), 'TAX_OR_EXPENSE_LEVEL_CURRENT'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetControllerTollRateLowTolls( Country.Self )))]\n[SelectLocalization(Strait.StateHasLowTolls(State.Self), 'STRAIT_CURRENT_REVENUE', 'STRAIT_PREDICTED_REVENUE_LOW')]"
 STRAIT_MEDIUM_TOLLS_TOOLTIP: "#header [concept_tolls]「中」#![ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasMediumTolls(State.Self), 'TAX_OR_EXPENSE_LEVEL_CURRENT'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetControllerTollRateMediumTolls( Country.Self )))]\n[SelectLocalization(Strait.StateHasMediumTolls(State.Self), 'STRAIT_CURRENT_REVENUE', 'STRAIT_PREDICTED_REVENUE_MEDIUM')]"
 STRAIT_HIGH_TOLLS_TOOLTIP: "#header [concept_tolls]「高」#![ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasHighTolls(State.Self), 'TAX_OR_EXPENSE_LEVEL_CURRENT'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetControllerTollRateHighTolls( Country.Self )))]\n[SelectLocalization(Strait.StateHasHighTolls(State.Self), 'STRAIT_CURRENT_REVENUE', 'STRAIT_PREDICTED_REVENUE_HIGH')]"
 STRAIT_PREDICTED_REVENUE_NO_TOLLS: "現在の$concept_tolls$に由来する収益が@money!#v [Strait.GetStateTollProfitChangeNoTolls(State.Self)|D+]#!変化"
 STRAIT_PREDICTED_REVENUE_LOW: "[Strait.GetName]を通過する[Concept('concept_ship', '$concept_ships$')]からの収益予測が@money!#v [Strait.GetStatePredictedTollProfitLow(State.Self)|D+]#!\n現在の$concept_tolls$に由来する収益が@money!#v [Strait.GetStateTollProfitChangeLow(State.Self)|D+]#!変化"
 STRAIT_PREDICTED_REVENUE_MEDIUM: "[Strait.GetName]を通過する[Concept('concept_ship', '$concept_ships$')]からの収益予測が@money!#v [Strait.GetStatePredictedTollProfitMedium(State.Self)|D+]#!\n@money!#v現在の$concept_tolls$に由来する収益が [Strait.GetStateTollProfitChangeMedium(State.Self)|D+]#!変化"
 STRAIT_PREDICTED_REVENUE_HIGH: "[Strait.GetName]を通過する[Concept('concept_ship', '$concept_ships$')]からの収益予測が@money!#v [Strait.GetStatePredictedTollProfitHigh(State.Self)|D+]#!\n@money!#v現在の$concept_tolls$に由来する収益が [Strait.GetStateTollProfitChangeHigh(State.Self)|D+]#!変化"
 STRAIT_CURRENT_REVENUE: "現在の収益は@money!#v [Strait.GetStateTollRevenue(State.Self)|D+]#!"
 STRAIT_TOLL_TOOLTIP: "#header [Strait.GetName]の[concept_tolls]#!\n[SelectLocalization(And( State.GetBuilding('building_naval_fortification').IsValid, Country.IsValid ), 'STRAIT_TOLL_TOOLTIP_ACTIVE', 'STRAIT_TOLL_TOOLTIP_INACTIVE')]"
 STRAIT_TOLL_TOOLTIP_ACTIVE: "[Strait.GetStateTollTextIcon(State.Self)] #b [Strait.GetStateTollStatus(State.Self)]#!（[SelectLocalization(Country.IsLocalPlayer, 'POSITIVE_TOLL', 'NEGATIVE_TOLL')]）$concept_tolls$は[Country.GetName]が徴収"
 STRAIT_TOLL_TOOLTIP_INACTIVE: "[Country.GetName]には[GetBuildingType('building_naval_fortification').GetName]が#b ない#!ため、$concept_tolls$は徴収されません"
 POSITIVE_TOLL: "@money!#v [Strait.GetStateTollProfit(State.Self)|D=+]#!"
 NEGATIVE_TOLL: "@money!#v [Strait.GetStateTollProfit(State.Self)|D=-]#!"
 #Strait Access
 STRAIT_ACCESS_STATUS_open: "開放"
 STRAIT_ACCESS_STATUS_no_military: "軍事以外"
 STRAIT_ACCESS_STATUS_closed: "閉鎖"
 STRAIT_ALLOWED_COUNTRIES_STATUS_all: "すべての国"
 STRAIT_ALLOWED_COUNTRIES_STATUS_no_enemies: "敵以外"
 STRAIT_ALLOWED_COUNTRIES_STATUS_only_allies: "同盟国のみ"
 STRAIT_ALLOWED_COUNTRIES_STATUS_only_controller: "管理国のみ"
 STRAIT_ACCESS_TOOLTIP: "#header [Strait.GetName]の[concept_strait_access]#!\n[SelectLocalization( And( State.GetBuilding('building_naval_fortification').IsValid, Country.IsValid ), 'STRAIT_ACCESS_TOOLTIP_ACTIVE', 'STRAIT_ACCESS_TOOLTIP_INACTIVE')]"
 STRAIT_ACCESS_TOOLTIP_ACTIVE: "[Strait.GetStateStraitAccessTextIcon(State.Self)]#b [Strait.GetStateStraitAccessStatus(State.Self)]#!の$concept_strait_access$が[Country.GetName]によって設定されています\n$TOOLTIP_DELIMITER$\n#title 効果:#! #indent_newline:3 \n[Strait.GetStateStraitAccessStatusDesc(State.Self)]#![ConcatIfNeitherEmpty('\n\n', AddLocalizationIf(Strait.StateStraitAccessIsOverruled(State.Self), 'STRAIT_ACCESS_OVERRIDDEN'))]"
 STRAIT_ACCESS_OVERRIDDEN: "@warning! この$concept_strait_access$は、[Strait.GetOtherController(State.Self).GetName]によって設定された#b [Strait.GetActiveStraitAccessStatus]#!の状態に上書きされます"
 STRAIT_ACCESS_TOOLTIP_INACTIVE: "[Country.GetName]には[GetBuildingType('building_naval_fortification').GetName]が#b ない#!ため、$concept_strait_access$の制限は施行されません"
 STRAIT_ACCESS_OPEN_TOOLTIP: "#header 開放#![ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasAccessOpen(State.Self), 'CURRENT_ACCESS'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetStateAccessOpen( State.Self )))]\nすべての[Concept('concept_ship', '$concept_ships$')]が[Strait.GetName]を通過できます"
 STRAIT_ACCESS_NO_MILITARY_TOOLTIP: "#header 軍事以外#![ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasAccessNoMilitary(State.Self), 'CURRENT_ACCESS'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetStateAccessNoMilitary( State.Self )))]\n[concept_strait_allowed_countries]の$concept_ships$を除き、いかなる軍事[Concept('concept_ship', '$concept_ships$')]も[Strait.GetName]を通過できません"
 STRAIT_ACCESS_CLOSED_TOOLTIP: "#header 閉鎖#![ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasAccessClosed(State.Self), 'CURRENT_ACCESS'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetStateAccessClosed( State.Self )))]\n[concept_strait_allowed_countries]を除き、いかなる[Concept('concept_ship', '$concept_ships$')]も[Strait.GetName]を通過できません"
 CURRENT_ACCESS: "#i #b （現在の$concept_strait_access_short$）#!#!"
 #Strait Allowed Countries
 STRAIT_ALLOWED_COUNTRIES_TOOLTIP: "#header [Strait.GetName]の[concept_strait_allowed_countries]#!\n[SelectLocalization( And( State.GetBuilding('building_naval_fortification').IsValid, Country.IsValid ), 'STRAIT_ALLOWED_COUNTRIES_ACTIVE', 'STRAIT_ALLOWED_COUNTRIES_INACTIVE')]"
 STRAIT_ALLOWED_COUNTRIES_ACTIVE: "[Strait.GetStateAllowedCountriesTextIcon(State.Self)] #b [Strait.GetStateAllowedCountriesStatus(State.Self)]#!が[Country.GetName]によって許可されています\n$TOOLTIP_DELIMITER$\n#title 効果:#! #indent_newline:3 \n[Strait.GetStateAllowedCountriesStatusDesc(State.Self)]#!"
 STRAIT_ALLOWED_COUNTRIES_INACTIVE: "[Country.GetName]には[GetBuildingType('building_naval_fortification').GetName]が#b ない#!ため、制限は施行されません"
 STRAIT_NO_ENEMIES_TOOLTIP: "#header 敵以外#![ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasAllowedCountriesNoEnemies(State.Self), 'TAX_OR_EXPENSE_LEVEL_CURRENT'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetStateAllowedCountriesNoEnemies( State.Self )))]\n現在の[concept_strait_access]（#b [Strait.GetStateStraitAccessStatus(State.Self)]#!）は[Country.GetName]の敵国の[Concept('concept_ship', '$concept_ships$')]にのみ適用されます"
 STRAIT_ONLY_ALLIES_TOOLTIP: "#header 同盟国のみ#![ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasAllowedCountriesOnlyAllies(State.Self), 'TAX_OR_EXPENSE_LEVEL_CURRENT'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetStateAllowedCountriesOnlyAllies( State.Self )))]\n[concept_strait_access]に制限がある場合、[Country.GetName]の同盟国のみが現在の制限（#b [Strait.GetStateStraitAccessStatus(State.Self)]#!）を免除されます"
 STRAIT_ONLY_CONTROLLER_TOOLTIP: "#header [Concept('concept_strait_control', '$concept_strait_controller$')]のみ#![ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasAllowedCountriesOnlyController(State.Self), 'TAX_OR_EXPENSE_LEVEL_CURRENT'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetStateAllowedCountriesOnlyController( State.Self )))]\n[concept_strait_access]に制限がある場合、 [Country.GetName]とその[Concept('concept_subject', '$concept_subjects$')]のみが現在の制限（#b [Strait.GetStateStraitAccessStatus(State.Self)]#!）を免除されます"
 STRAIT_NO_CONTROL: "少なくとも#v 1#![Concept('concept_building_level', '$concept_building_level_short$')]の[GetBuildingType('building_naval_fortification').GetName]がある"
 STRAIT_TOTAL_BLOCK_REQUIRES_FULL_CONTROL: "[concept_strait]の両岸において[Concept('concept_strait_control', '$concept_strait_control$')]権が必要です"
 STRAIT_MILITARY_BLOCK_REQUIRES_FULL_CONTROL: "$STRAIT_TOTAL_BLOCK_REQUIRES_FULL_CONTROL$"
 STRAIT_ACCESS_SETTING_REDUNDANT: "現在の[concept_strait_access]の設定"
 STRAIT_ACCESS_SETTING_NOT_ALLOWED: "通行料アクセスの設定は許可されていません"
 TOLL_RATE_NOT_ALLOWED: "通行税は許可されていません"
 STRAIT_TOLL_RATE_ON_COOLDOWN: "[concept_tolls]は$DATE|v$まで再び変更できません"
 STRAIT_TOLL_RATE_GRACE_PERIOD: "$DATE|v$までは[concept_tolls]を以前の料金に戻せます"
 STRAIT_ACCESS_SETTING_ON_COOLDOWN: "[concept_strait_access]は$DATE|v$まで再び変更できません"
 STRAIT_ACCESS_SETTING_GRACE_PERIOD: "[concept_strait_access]を以前の設定に戻すのは$DATE|v$までのみ可能です"
 STRAIT_STATES_HEADER: "この$concept_strait$によって接続されている$concept_states$"
 NO_NAVAL_FORTIFICATION_TOOLTIP: "[Country.GetName]はまだ[State.GetName]に[GetBuildingType('building_naval_fortification').GetName]を建設しておらず、[Strait.GetName]を掌握していません"
 STRAIT_NAVAL_FORTIFICATION_TOOLTIP: "[State.GetName]の[State.GetBuilding('building_naval_fortification').GetName]は、上陸[Concept('concept_battle','$concept_battles$')]に対する防御を強化します"
 #Effects
 STRAIT_ACCESS_OPEN: "すべての[Concept('concept_ship', '$concept_ships$')]が[Strait.GetName]を通過できます"
 STRAIT_ACCESS_NO_MILITARY_NO_ENEMIES: "[Country.GetName]の#r 敵国#!に所属する軍事[Concept('concept_ship', '$concept_ships$')]は[Strait.GetName]を通過できません"
 STRAIT_ACCESS_NO_MILITARY_ALLIES: "[Country.GetName]の#g 同盟国#!に所属する軍事[Concept('concept_ship', '$concept_ships$')]のみが[Strait.GetName]を通過できます"
 STRAIT_ACCESS_NO_MILITARY_ONLY_CONTROLLER: "[Country.GetName]とその[Concept('concept_subject', '$concept_subjects$')]に所属する軍事[Concept('concept_ship', '$concept_ships$')]のみが[Strait.GetName]を通過できます"
 STRAIT_ACCESS_CLOSED_NO_ENEMIES: "[Country.GetName]の#r 敵国#!に所属する[Concept('concept_ship', '$concept_ships$')]は[Strait.GetName]を通過できません"
 STRAIT_ACCESS_CLOSED_ALLIES: "[Country.GetName]の#g 同盟国#!に所属する[Concept('concept_ship', '$concept_ships$')]のみが[Strait.GetName]を通過できます"
 STRAIT_ACCESS_CLOSED_ONLY_CONTROLLER: "[Country.GetName]とその[Concept('concept_subject', '$concept_subjects$')]に所属する[Concept('concept_ship', '$concept_ships$')]のみが[Strait.GetName]を通過できます"
 #Trade
 STRAIT_TRADE_HEADER: "この[concept_strait]を経由する[concept_trade]"
 STRAIT_NO_TRADE: "[concept_trade]なし"
 STRAIT_TRADE_TOOLTIP: "[StraitPanel.GetTradeBreakdown(Goods.Self)]"
 STRAIT_TRADE_BREAKDOWN: "#header $STRAIT_NAME$を経由する[GOODS.GetName]の[concept_trade]#!\n貿易の合計: $TOTAL|v0D$\n$DETAILS$"
 STRAIT_TRADE_BREAKDOWN_ENTRY: "[STATE.GetOwner.GetFlagTextIcon][STATE.GetName]との貿易額は$AMOUNT|v0D$"
