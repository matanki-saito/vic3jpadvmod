 NEGATIVE_TOLL: "@money!#v [Strait.GetStateTollProfit(State.Self)|D=-]#!"
 #Strait Access
 STRAIT_ACCESS_STATUS_open: "開放"
 STRAIT_ACCESS_STATUS_no_military: "軍事以外"
 STRAIT_ACCESS_STATUS_closed: "閉鎖"
 STRAIT_ALLOWED_COUNTRIES_STATUS_all: "すべての国"
 STRAIT_ALLOWED_COUNTRIES_STATUS_no_enemies: "敵以外"
 STRAIT_ALLOWED_COUNTRIES_STATUS_only_allies: "同盟国のみ"
 STRAIT_ALLOWED_COUNTRIES_STATUS_only_controller: "管理国のみ"
 STRAIT_ACCESS_TOOLTIP: "#header [Strait.GetName] [concept_strait_access]#!\n[SelectLocalization( And( State.GetBuilding('building_naval_fortification').IsValid, Country.IsValid ), 'STRAIT_ACCESS_TOOLTIP_ACTIVE', 'STRAIT_ACCESS_TOOLTIP_INACTIVE')]"
 STRAIT_ACCESS_TOOLTIP_ACTIVE: "[Strait.GetStateStraitAccessTextIcon(State.Self)]#b [Strait.GetStateStraitAccessStatus(State.Self)]#!の$concept_strait_access$が[State.GetController.GetName]によって設定されています\n$TOOLTIP_DELIMITER$\n#title 効果:#! #indent_newline:3 \n[Strait.GetStateStraitAccessStatusDesc(State.Self)]#![ConcatIfNeitherEmpty('\n\n', AddLocalizationIf(Strait.StateStraitAccessIsOverruled(State.Self), 'STRAIT_ACCESS_OVERRIDDEN'))]"
 STRAIT_ACCESS_OVERRIDDEN: "@warning! This $concept_strait_access$ is overruled by the #b [Strait.GetActiveStraitAccessStatus]#! status set by [Strait.GetOtherController(State.Self).GetName]"
 STRAIT_ACCESS_TOOLTIP_INACTIVE: "[State.GetController.GetName]には[GetBuildingType('building_naval_fortification').GetName]が#b ない#!ため、$concept_strait_access$の制限は施行されません"
 STRAIT_ACCESS_OPEN_TOOLTIP: "#header 開放#!\n[ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasAccessOpen(State.Self), 'CURRENT_ACCESS'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetStateAccessOpen( State.Self )))]\nすべての[Concept('concept_ship', '$concept_ships$')]が[Strait.GetName]を通過できます"
 STRAIT_ACCESS_NO_MILITARY_TOOLTIP: "#header 軍事以外#!\n[ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasAccessNoMilitary(State.Self), 'CURRENT_ACCESS'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetStateAccessNoMilitary( State.Self )))]\n[concept_strait_allowed_countries]の$concept_ships$を除き、いかなる軍事[Concept('concept_ship', '$concept_ships$')]も[Strait.GetName]を通過できません "
 STRAIT_ACCESS_CLOSED_TOOLTIP: "#header 閉鎖#!\n[ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasAccessClosed(State.Self), 'CURRENT_ACCESS'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetStateAccessClosed( State.Self )))]\n[concept_strait_allowed_countries]を除き、いかなる[Concept('concept_ship', '$concept_ships$')]も[Strait.GetName]を通過できません"
 CURRENT_ACCESS: "#i #b （現在の$concept_strait_access_short$）#!#!"
 #Strait Allowed Countries
 STRAIT_ALLOWED_COUNTRIES_TOOLTIP: "#header [Strait.GetName] [concept_strait_allowed_countries]#!\n[SelectLocalization( And( State.GetBuilding('building_naval_fortification').IsValid, Country.IsValid ), 'STRAIT_ALLOWED_COUNTRIES_ACTIVE', 'STRAIT_ALLOWED_COUNTRIES_INACTIVE')]"
 STRAIT_ALLOWED_COUNTRIES_ACTIVE: "[Strait.GetStateAllowedCountriesTextIcon(State.Self)] #b [Strait.GetStateAllowedCountriesStatus(State.Self)]#!が[State.GetController.GetName]によって許可されています\n$TOOLTIP_DELIMITER$\n#title 効果:#! #indent_newline:3 \n[Strait.GetStateAllowedCountriesStatusDesc(State.Self)]#!"
 STRAIT_ALLOWED_COUNTRIES_INACTIVE: "No restrictions are enforced by [State.GetController.GetName] due to #b not#! having a [GetBuildingType('building_naval_fortification').GetName]"
 STRAIT_NO_ENEMIES_TOOLTIP: "#header 敵以外#!\n[ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasAllowedCountriesNoEnemies(State.Self), 'TAX_OR_EXPENSE_LEVEL_CURRENT'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetStateAllowedCountriesNoEnemies( State.Self )))]\n現在の[concept_strait_access]（#b [Strait.GetStateStraitAccessStatus(State.Self)]#!）は[State.GetController.GetName]の敵国の[Concept('concept_ship', '$concept_ships$')]にのみ適用されます"
 STRAIT_ONLY_ALLIES_TOOLTIP: "#header 同盟国のみ#!\n[ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasAllowedCountriesOnlyAllies(State.Self), 'TAX_OR_EXPENSE_LEVEL_CURRENT'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetStateAllowedCountriesOnlyAllies( State.Self )))]\n[concept_strait_access]に制限がある場合、[State.GetController.GetName]の同盟国のみが現在の制限（#b [Strait.GetStateStraitAccessStatus(State.Self)]#!）を免除されます"
 STRAIT_ONLY_CONTROLLER_TOOLTIP: "#header [Concept('concept_strait_control', '$concept_strait_controller$')]のみ#!\n[ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasAllowedCountriesOnlyController(State.Self), 'TAX_OR_EXPENSE_LEVEL_CURRENT'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetStateAllowedCountriesOnlyController( State.Self )))]\n[concept_strait_access]に制限がある場合、 [State.GetController.GetName]とその[Concept('concept_subject', '$concept_subjects$')]のみが現在の制限（#b [Strait.GetStateStraitAccessStatus(State.Self)]#!）を免除されます"
 STRAIT_NO_CONTROL: "少なくとも#v 1#![Concept('concept_building_level', '$concept_building_level_short$')]の[GetBuildingType('building_naval_fortification').GetName]がある"
 STRAIT_TOTAL_BLOCK_REQUIRES_FULL_CONTROL: "Requires [Concept('concept_strait_control', '$concept_strait_control$')] of both sides of the [concept_strait]"
 STRAIT_MILITARY_BLOCK_REQUIRES_FULL_CONTROL: "$STRAIT_TOTAL_BLOCK_REQUIRES_FULL_CONTROL$"
 STRAIT_ACCESS_SETTING_REDUNDANT: "Current [concept_strait_access] setting"
 STRAIT_ACCESS_SETTING_NOT_ALLOWED: "Toll access setting is not allowed"
 TOLL_RATE_NOT_ALLOWED: "Toll rate is not allowed"
