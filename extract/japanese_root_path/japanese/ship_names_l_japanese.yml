 # Country Specific
 shipname_german_submarines_format: "$PREFIX$U-$NUM$"
 shipname_japanese_maru_format: "$PREFIX$$SHIP_NAMESAKE$丸"
 shipname_german_torpedo_boats_format: "$PREFIX$T$NUM$"
 shipname_t_torpedo_boats_format: "$PREFIX$T-$NUM$"
