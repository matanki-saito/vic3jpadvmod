l_japanese:
 je_sakoku:0 "閉ざされた国"
 je_sakoku_reason:0 "寛永年間、すなわち徳川幕府の黎明期より、$JAP$は外部の者に対して門を閉ざしてきた。許されているのは、少数の指定された港で、限られた国と行うごくわずかな交易のみである。この体制は2世紀以上にわたって続いてきたが、世界は変わりつつあり、たとえ国内の諸勢力が永遠の現状維持を望んだとしても、国を閉ざし続けることはますます難しくなっている。外国からの開国の企てを止められないのなら、我々は彼らの物品だけでなく、その思想も取り入れなければならない。"
 je_sakoku_meiji_restoration:0 "#b 天皇#!が復権し、#b 将軍#!は打倒された"
 je_sakoku_stop_being_closed_button:0 "[GetLawType('law_sakoku').GetName]を廃止"
 je_sakoku_stop_being_closed_button_desc:0 "緊迫する情勢と諸外国からの高まる圧力により、[GetLawType('law_sakoku').GetName]の終焉はもはや喫緊の課題となっている。こうした状況下では、旧来の鎖国体制を強引に終わらせることも可能だろうが、それは旧体制を支持するあらゆる勢力を激怒させるだろう。"
 notification_morrison_incident_has_incidented_name:0 "$JAP$による商船への発砲"
 notification_morrison_incident_has_incidented_desc:0 "我が国の大胆な商船が、外国貿易船に対する$JAP_ADJ$の制限を破ろうとし、沿岸の砲台から発砲を受けた。これによって両国の関係は悪化している。"
 notification_morrison_incident_has_incidented_tooltip:0 "#header $notification_morrison_incident_has_incidented_name$#!\n$TOOLTIP_DELIMITER$\n$notification_morrison_incident_has_incidented_desc$"
 light_hand_with_foreigners:0 "Light Hand With Foreigners"
 caved_to_foreign_pressure_opposition:0 "外国の圧力に屈した"
 caved_to_foreign_pressure_government:0 "外国の圧力に屈した"
 overdue_break_with_tradition:0 "遅すぎた伝統との決別"
 forced_transition_from_tradition:0 "伝統からの強制転換"
 the_picked_lock_modifier:0 "こじ開けられた錠"
 sakoku_entrenched_modifier:0 "鎖国体制の強化"
 meiji_failure_modifier:0 "失敗した維新改革"
 ep2_sakoku.1.t:0 "憂慮すべき[SCOPE.sCountry('opium_wars_loser').GetAdjectiveNoFormatting]の敗北"
 ep2_sakoku.1.d:0 "広大で由緒ある我らの隣国、[SCOPE.sCountry('opium_wars_loser').GetName]は、海の彼方の新興国にアヘンと貿易をめぐる戦争で敗れたばかりだ。あの[SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting]ですら自国の市場を制御できず、外国人を排斥できないのなら、我々がこの地の[GetLawType('law_sakoku').GetName]を維持することなどできるのだろうか？"
 ep2_sakoku.1.f:0 "「どれほどの領地、富、権力を手にしていようと、目前に展開された圧倒的な武力には比べようがない。外国人たちは今、我が国への入国をしきりに求めている。我々は[SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting]の例に倣い、彼らと同様に外国人を押し返そうとした挙句、我々の町に砲火の雨を受けるのか？それとも、我々独自の道を模索するのか？決断を下すべきは今だ。鉄の力と大砲が我が海域に侵入し、我々に代わって結論を出してしまう前に」"
 ep2_sakoku.1.a:0 "今や、考えられなかった事態を考えねばならなくなった。"
 ep2_sakoku.1.b:0 "今や、考えられなかった事態を受け入れねばならなくなった。"
 end_sakoku_button_now_available:0 "[GetLawType('law_sakoku').GetName]を強制的に早期終了させるオプションが「$je_sakoku$」に表示される。"
 ep2_sakoku.2.t:0 "錠をこじ開ける"
 ep2_sakoku.2.d:0 "国内外が騒がしくなるなか、[GetLawType('law_bakufu').GetName]は[GetLawType('law_sakoku').GetName]の即時終了を強行すると決断した。"
 ep2_sakoku.2.f:0 "税関は商人でごった返していた。そこでは疲れ果てた様子の役人が一人だけで対応している。「はい、もちろん我が国の鎖国は終わりだということです」\n\n群衆から投げかけられる10もの質問が役人の言葉を怒号のようにかき消す。「では代わりにどうなるのかですって？それは…わかりません。おそらくは―いえ、待ってください、それはだから―これは私やあなた方が勝手に決められるものではないので―」\n\n彼が発した1つの答えは、さらに20もの質問になって返ってきた。#italic 我が国は我が国だけでやっていたときの方が、ずっと仕事が楽だった#!、そう彼は思った。"
 ep2_sakoku.2.a:0 "[ROOT.GetCountry.GetNameNoFormatting]の未来は[GetLawType('law_mercantilism').GetName]にかかっている。"
 ep2_sakoku.2.b:0 "[GetLawType('law_free_trade').GetName]は[ROOT.GetCountry.GetNameNoFormatting]を解放する。"
 ep2_sakoku.2.c:0 "[GetLawType('law_protectionism').GetName]によって、我々は外国勢力と慎重に交易を行えるようになるだろう。"
 ep2_sakoku.3.t:0 "[SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting]号事件"
 ep2_sakoku.3.d:0 "[SCOPE.sCountry('morrison_incident_country').GetName]の商人が厳格な[GetLawType('law_sakoku').GetName]の規定を無視し、未認可の港での交易を試みた。彼らの商船、#italic [SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting]#!号は沿岸砲台からの砲撃を受けて退散した。これにより、もともと良好とは言えなかった[SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting]との関係は悪化した。"
 ep2_sakoku.3.f:0 "司令官は、ついに砲弾が船に命中したのを見るとにやりと笑った。法は極めて明快だ。あの船には、この海域を航行する権利などない。あの船の船長が何を思おうと知ったことではない。彼が望むのはただ一つ、あの船が引き返して立ち去ることだけだった。 "
 ep2_sakoku.3.a:0 "現地の守備隊は、成すべきことを果たしたのだ。"
 ep2_sakoku.3.b:0 "我々は[SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting]に謝罪し、商人に補償を行って事態を収拾すべきだ。"
 ep2_sakoku.3.c:0 "これを機に[GetLawType('law_sakoku').GetName]の必要性を再検討すべきだ"
 ep2_sakoku.4.t:0 "こじ開けられた錠"
 ep2_sakoku.4.d:0 "内外からの圧力を乗り越え、[GetLawType('law_sakoku').GetName]は撤回された。[ROOT.GetCountry.GetNameNoFormatting]は自らの新たな未来を開いたのだ。"
 ep2_sakoku.4.f:0 "役人は湾を見渡した。埠頭には新たな船が停泊している。見たこともない旗を掲げた、なじみのない船だ。あの船団は[ROOT.GetCountry.GetNameNoFormatting]に何をもたらすのか？そして[ROOT.GetCountry.GetNameNoFormatting]から何を奪おうとしているのか？\n\n彼は停泊する船をただじっと、長い間見つめ、やがてようやく目をそらした。いくら目を凝らしても望む答えは得られない―今日のところは。この新しい時代が祖国に何をもたらすのか、それを教えてくれるのは、時だけであった。"
 ep2_sakoku.4.a:0 "今日こそ、日本が開国する！"
 ep2_sakoku.5.t:0 "錆びついた鎖国"
 ep2_sakoku.5.d:0 "激動の政治情勢に揺れながらも[ROOT.GetCountry.GetNameNoFormatting]で[GetLawType('law_sakoku').GetName]が引き続き維持されているという事実は、この国が自ら課した孤立から脱却する望みは薄いことを示している。[GetLawType('law_sakoku').GetNameNoFormatting]は今後も存続し続けるように思われる。"
 ep2_sakoku.5.f:0 "役人は湾を見渡した。埠頭には古い船が停泊している。それは彼の父が、祖父が、そして何世代も前の祖先が目にしてきたであろう船だ。彼の子供たちもあの船を見るのだろうか？そして孫たちも？この風景が変わることは果たしてあるのだろうか？\n\n彼は停泊する船をただじっと、長い間見つめ、やがてようやく目をそらした。いくら目を凝らしても望む答えは得られない―今日のところは。祖国が本当にこのまま永遠に変わらない姿でいられるのか、それを教えてくれるのは、時だけであった。"
 ep2_sakoku.5.a:0 "錠は閉ざされたままだ。"
 meiji.14.t:0 "空虚な維新"
 meiji.14.d:0 "新たな[ROOT.GetCountry.GetCustom('JAP_era_name')]政府は華々しい改革を唱えていたが、[ROOT.GetCountry.GetNameNoFlag]には何ら大きな変化は訪れなかった。維新前と今とで国の姿はほとんど変わっていないと、批判の声が上がっている。"
 meiji.14.f:0 "工場では、巨大な蒸気機関が唸りを上げ、大きな弾み車を回し、強力な旋盤やドリルを動かしていた。それらの機械は新たな銃身を、新たな撃鉄を、新たな引き金を削り出し、膨大な兵器の山を築いている。やがてある国がこの蒸気と鉄の力を手に、世界にその名を刻むだろう。だが、その国は[ROOT.GetCountry.GetNameNoFormatting]ではない。"
 meiji.14.a:0 "燦然と輝く日が昇るのは、もはや夢の中だけだ。"
 je_end_edo_system_button_name:0 "江戸の身分制度の廃止"
 je_end_edo_system_button_desc:0 "改革と刷新の時代にあって、旧来の身分制度はもはや足枷でしかない。どのような身分にあろうとも、すべての民が国家を担う貴重な一員となりうる。"
 edo_system_not_support_enforcement_tt:0 "[GetLawType('law_intermediate_edo_system').GetName]や[GetLawType('law_strict_edo_system').GetName]の制定を支持しない"
 edo_system_ends_tt:0 "[ROOT.GetCountry.GetNameNoFlag]が[Concept('concept_social_hierarchy','$edo_system$')]を完全に廃止する"
 notification_edo_system_disappears_name:0 "江戸の身分制度の崩壊"
 notification_edo_system_disappears_desc:0 "最近の文化的および社会的な変化により、江戸の身分制度は[SCOPE.sCountry('relevant_country_scope').GetName]において認められた[concept_social_hierarchy]ではなくなりました。"
 notification_edo_system_disappears_tooltip:0 "#header $notification_edo_system_disappears_name$#!\n$TOOLTIP_DELIMITER$\n$notification_edo_system_disappears_desc$"
 je_meiji_army_barracks_condition:0 "[ROOT.GetCountry.GetAdjectiveNoFlag]のすべての[GetBuildingType('building_barrack').GetName]が以下の条件を満たしている : \n$EFFECT_LIST_BULLET$ #yellow $pm_no_organization$#!および#yellow $pm_samurai_training$#!が有効に#bold なっていない#!"
