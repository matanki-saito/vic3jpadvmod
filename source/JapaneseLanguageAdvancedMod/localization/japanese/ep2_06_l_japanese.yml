l_japanese:
 japan_earthquakes.1.t:0 "[ROOT.GetCountry.GetCustom('JAP_era_name')]の大地震"
 japan_earthquakes.1.d:0 "沖合で4日間のうちに発生した3つの地震が広範な地域に被害をもたらし、その後の津波が、沿岸部の被害をさらに深刻なものにした。"
 japan_earthquakes.1.f:0 "すぐさま、村中の人々がその異変に気づいた。先刻の地面の動揺を感じた者はいなかったようだが、潮の動きには皆が驚きを隠し得なかった。人々は様子を見ようと浜へ、そしてさらにその先へと駆けていく。生きている者の知るかぎり、これほどの引き潮がこの浜で目撃されたことはない。そこではこれまで目に触れることのなかったものが姿を現し始めていた。見慣れない筋模様の砂地。海藻の垂れ下がった岩。そんなものが浜口が見つめる間にも次々と剥き出しになっていく。しかし、下にいる村人たちは誰一人として、この不気味な引き潮が何を意味するのかに気づいていないようだった。\n\n―小泉八雲、『#italic 生き神様#!』"
 japan_earthquakes.2.t:0 "[ROOT.GetCountry.GetCustom('JAP_era_name')]の[SCOPE.sState('japan_earthquake_state').GetCityHubName]大震災"
 japan_earthquakes.2.d:0 "大地震が[SCOPE.sState('japan_earthquake_state').GetName]沿岸を襲い、[SCOPE.sState('japan_earthquake_state').GetCityHubName]の町とその城に甚大な被害を与えた。"
 japan_earthquakes.2.f:0 "大地震の後に大鯰を描いた絵が流行しはじめたとき、それらは伝統的な物語に沿ったものであった。大鯰はもう地震を起こすことがないよう、神々によって組み伏せられていたのである。\n\nしかし、時が経つにつれ、その描写は変化していった。ある絵では鯰が自ら腹を切り裂いて銭を撒き散らし、また別の絵では大工たちが鯰と酒を酌み交わしている。こうした作品には風刺的な色合いを帯び、この生き物が災厄をもたらした一方で、何らかの世直しをしているのではないかという暗示がなされていた。"
 japan_earthquakes.2.a:0 "[SCOPE.sState('japan_earthquake_state').GetCityHubName]にいる我々の家臣を救援せよ！"
 japan_earthquakes.2.b:0 "富は再建を行える者たちへの元へ流れるべきだ。"
 earthquake_vassal_support:0 "家臣を支援"
 earthquake_rebuilding_focus:0 "地震後の再建"
 earthquake_rebuilding_redistribution:0 "世直し"
 japan_earthquakes.3.t:0 "濃尾地震"
 japan_earthquakes.3.d:0 "[ROOT.GetCountry.GetName]中心部で大地震が発生した。何千という人々が死に、各地に異常な大きさの断層が生じた。"
 japan_earthquakes.3.f:0 "「人類は常に災害を犯罪のように捉え、しばしば「誰」がそれをやったのかを問うてきた。そしてその結果、地震の背後には数多くの神話の怪物や妖魔が潜むと伝えられるようになった。\n\n現代の地震学者は迷信を退けなければならないが、ときどき自分が犯罪現場を調べる刑事のような役をしていると感じるのは皮肉なことだ。どんなものが倒れ、それはどう倒れたのか―そのいった問いはすべて、最終的には「誰が」ではなく、「どのようにして」、そして「なぜ」を追求するためのものだ」"
 japan_earthquakes.3.a:0 "外国の学者を招き、これらの断層を研究させる。"
 japan_earthquakes.3.b:0 "この知識を生かして、さらに多くの気象台を設置する。"
 japan_earthquakes.3.c:0 "余震に備えよ。"
 meteorological_observatories:0 "気象台"
 meteorological_observatories_cost:0 "$meteorological_observatories$"
 earthquake_bracing_for_aftershocks:0 "余震への備え"
 japan_earthquakes.4.t:0 "三陸地震"
 japan_earthquakes.4.d:0 "三陸沖で発生した地震に伴い、大津波が[SCOPE.sState('japan_earthquake_state').GetName]を襲った。その壊滅的な被害を受け、将来の津波に教訓を伝えるための碑の建立が提案されている。"
 japan_earthquakes.4.f:0 "「死者の慰霊の碑を建てるだけでは十分ではない。生きている者にも、襲来した災厄を追憶するものは必要ではない。石に刻まれた言葉を見た者は、祖先が決して忘れてはならない教訓として、それを自分に伝えているのだと知るだろう。これらは、これから生まれてくる者たちのための碑なのだ」"
 japan_earthquakes.4.a:0 "[SCOPE.sState('japan_earthquake_state').GetName]にはそのような碑が必要だ。"
 japan_earthquakes.4.b:0 "津波が襲ったすべての場所に石碑を建てよ！"
 japan_earthquakes.4.c:0 "我々は目前の問題に注力しなければならない。"
 tsunami_stones:0 "津波石碑"
 tsunami_relief_efforts:0 "津波被害の救済活動"
 japan_earthquakes.5.t:0 "関東大震災"
 japan_earthquakes.5.d:0 "巨大な、まさに未曾有の大地震が[SCOPE.sState('japan_earthquake_state').GetCityHubName]を襲った。ほんの数分のうちに地震は市街地の大半を瓦礫に変え、数十万人の命を奪った。"
 japan_earthquakes.5.f:0 "揺れの後に押し寄せた水の壁こそが最大の脅威と思われたが、それは火災に比べれば無きに等しいものだった。あっという間に都市地全体を呑み込んだその炎の勢いは、大地と風そのものにも火が付いたかと思われるほどであった。\n\n燃え盛る建物から逃げ出した人々も、炎の竜巻に閉じ込められた。その大火は、まるで誰一人として生かしておくまいとしているかのようだった。[SCOPE.sState('japan_earthquake_state').GetCityHubName]はまさに地獄絵図と化した。"
 japan_earthquakes.5.a:0 "日本の民はこのような惨禍に対し、一丸となって立ち上がらねばならない！"
 japan_earthquakes.5.b:0 "我々の物質的な富に対するこの打撃は、退廃に対する警告なのだ。"
 japan_earthquakes.5.c:0 "我々はこれを機に、[SCOPE.sState('japan_earthquake_state').GetCityHubName]をもっと近代的な都市に再建しなければならない。"
 earthquake_national_tragedy:0 "国難"
 earthquake_divine_punishment:0 "神罰"
 earthquake_modernization:0 "近代的な再建"
 earthquake_modernization_land_confiscation:0 "土地の区画整理"
 shinbutsu_bunri_decision:0 "$je_shinbutsu_bunri$"
 shinbutsu_bunri_decision_desc:0 "$je_shinbutsu_bunri_reason$"
 elevate_buddhism_decision:0 "$je_elevate_buddhism$"
 elevate_buddhism_decision_desc:0 "$je_elevate_buddhism_reason$"
 je_shinbutsu_bunri:0 "神仏分離"
 je_shinbutsu_bunri_reason:0 "天皇の権威が回復された今、皇統を神聖視する在来の信仰を明確に区別し、その地位を高めねばならない。そのためには、何百年もの間、神仏習合という形で神道と不可分に結びついてきた、外来信仰である仏教の影響を排除する必要がある。幕府との結びつきから生じた仏教界への不満を利用すれば、神道をより上位の指導原理として据えることができるだろう。"
 je_taikyo_proclamation_button:0 "大教宣布"
 je_taikyo_proclamation_button_desc:0 "神々への信仰と天皇への崇敬からなる神道を、国家の根本原理とする"
 je_elevate_buddhism:0 "仏教の振興"
 je_elevate_buddhism_reason:0 "$JAP$の仏教界は、歴史的に幕府の統治機構と強く結びついている。一度は幕府の瓦解を回避したいま、これらの仏教諸勢力を強化すれば、幕府の権威を維持する助けとなり、天皇崇拝に依らない$JAP$の宗教的伝統を確固たるものにできるだろう。"
 je_elevate_buddhism_goal:0 "$je_communism_2_goal$"
 arahitogami:0 "現人神"
 extended_danka_system:0 "檀家制度の拡張"
 japan_religion.1.t:0 "神宮寺"
 japan_religion.1.d:0 "神宮寺では、仏教の僧侶が神道の祭祀と並んで仏事を執り行うのが常であった。しかしながら、神仏分離の過程で、こうした僧侶の役割が問い直されている。"
 japan_religion.1.f:0 "「これらの仏事にいかなる意味があるというのか？神々を悟りに導くためか？その業を浄めるためか？つまるところ、神々は崇め奉るべき存在ではなく、導きを必要とする迷える存在だと言っているに等しい。このような侮りを、もはや看過するわけにはいかぬ！」"
 japan_religion.1.a:0 "僧侶たちに改宗して神職となるよう要求する。"
 japan_religion.1.b:0 "僧侶たちから僧位を剥奪する。"
 japan_religion.1.c:0 "僧侶たちの務めをそのままにしておく。"
 forced_monk_conversions:0 "仏僧に対する改宗強制"
 monks_stripped_of_titles_opinion:0 "$monks_stripped_of_titles$"
 monks_stripped_of_titles:0 "仏僧からの僧位剥奪"
 monks_left_to_duties:0 "仏僧の職務継続"
 japan_religion.2.t:0 "本地垂迹"
 japan_religion.2.d:0 "仏が日本において神の姿で現れたとする考えは広く定着しており、それは仏と神を同一の存在の2つの側面とみなす「権現」などの用語にも反映されている。こうした用語は、仏教の影響力をいっそう強めている。"
 japan_religion.2.f:0 "「かつては理にかなっていたのだろう。天照大神は太陽である。大日如来もまた太陽である。だが、太陽はふたつに分かたれるものではなく、他の光の返照でも顕れでもない。天照大神はただ独り、己の力で輝いておられる。そして今日、[ROOT.GetCountry.GetNameNoFormatting]の空に太陽はふたつと要らぬのだ」"
 japan_religion.2.a:0 "「権現」の概念を禁ずる。"
 japan_religion.2.b:0 "八幡神を菩薩と称することを禁ずる。"
 japan_religion.2.c:0 "用語の規制は行わない。"
 banned_syncretic_terminology:0 "習合用語の禁止"
 retained_syncretic_terminology:0 "習合用語の存続"
 japan_religion.3.t:0 "汝のために鐘は鳴る"
 japan_religion.3.d:0 "仏教の影響力を排除しようとする試みにより、市井の廃仏感情に火がついた。各地で寺院の財産が接収・破壊され、完全に取り壊される寺もあれば、仏教の象徴物を剥ぎ取られる寺もある。"
 japan_religion.3.f:0 "神社に近づいた彼は、思わず足を止めた。入口の両脇で睨みを利かせていた2体の仁王像が撤去されていたのだ。その場には、ただ空白だけがあった。\n\n境内に足を踏み入れても、彼の胸には拭いがたい思いが残った。どれほど清められていようと、この神社はもはやかつてのように安穏な場所ではない。門の護り手は失われたのだ。"
 japan_religion.3.a:0 "寺院の鐘を溶かして大砲に鋳直せ！"
 japan_religion.3.b:0 "寺院の仏像を破壊もしくは撤去せよ。"
 japan_religion.3.c:0 "寺院には手を付けない。"
 smelted_temple_bells:0 "梵鐘の鋳潰し"
 smelted_temple_bells_opinion:0 "$smelted_temple_bells$"
 removed_buddha_statues:0 "仏像の撤去"
 removed_buddha_statues_opinion:0 "$removed_buddha_statues$"
 retained_buddhist_iconography:0 "仏教象徴物の存置"
 japan_religion.4.t:0 "神祇官"
 japan_religion.4.d:0 "神道の祭祀を統一し、国家の神を地域の祭祀に組み込もうとする取り組みは、地域の僧侶や神職から反発を受けている。彼らはこうした方針を伝統からの逸脱とみなしているのだ。"
 japan_religion.4.f:0 "「神道とは、各地の神社に残る既存の祭祀や慣行を、ただ漫然と続けることではない。そうしたものは外来の影響によって混濁し、穢されているのだ。天孫たる皇室の伝統を[ROOT.GetCountry.GetNameNoFormatting]全土に教え広め、神道を本来の純粋な姿へと立ち返らせねばならぬ」"
 japan_religion.4.a:0 "国家の解釈を強制する。"
 japan_religion.4.b:0 "地域の祭祀は地域の神職に任せる。"
 standardized_priest_training:0 "神職教育の統一"
 standardized_priest_training_opinion:0 "$standardized_priest_training$"
 deferred_to_local_priests:0 "地域の神職への委任"
 deferred_to_local_priests_opinion:0 "$deferred_to_local_priests$"
 japan_religion.5.t:0 "儒教と神道"
 japan_religion.5.d:0 "神仏分離の過程で、儒教の位置づけもまた問われることとなった。儒教は神道と極めて親和性が高いと見る学者が多い一方、仏教と同じ外来の影響にすぎないとして退ける声もある。"
 japan_religion.5.f:0 "「儒教は仏教と同じ道筋を経て伝わったものかもしれぬ。しかし、この教えと神々への崇敬の間に矛盾はない。むしろ両者は互いを補い合い、天地の理、君臣の道という同じ原理を包含しているのだ」"
 japan_religion.5.a:0 "儒教は神道を補完する重要な思想である。"
 japan_religion.5.b:0 "神道を古来の姿に戻さねばならない。"
 fukko_shinto:0 "復古神道"
 japan_religion.6.t:0 "開国とキリスト教"
 japan_religion.6.d:0 "[ROOT.GetCountry.GetName]は外国に門戸を開いたものの、宗教は依然として厳しく取り締まられている。キリスト教国にとっては、自らの信仰の流入は商品の輸入と同様に重要な問題だろう。"
 japan_religion.6.f:0 "「キリスト教が信徒を最も愛するのは、その死においてである。信仰のために命を捧げた者を、何よりも愛するのだ。宣教師を十字架に架け、火刑に処すたび、我々は十字架上の男から始まる物語に新たな一章を書き加えてやっているのだ。そろそろ殉教者を与えるのをやめてはどうか？」"
 japan_religion.6.a:0 "宣教師の布教活動を認めるべきだ。"
 japan_religion.6.b:0 "信仰は許すが、布教は認めない。"
 japan_religion.6.c:0 "キリスト教は今も昔も外来の脅威である。"
 permitted_christianity:0 "キリスト教の許容"
 christianity_disallowed:0 "キリスト教の禁制"
 japan_religion.7.t:0 "思想の系譜"
 japan_religion.7.d:0 "[ROOT.GetCountry.GetName]には、古くから多様な仏教宗派が並び立つ伝統があり、その多くは今なお影響力を保っている。[SCOPE.gsInterestGroup('devout_ig').GetName]が政治的な力を増すなか、ある宗派が頭角を現しつつある。"
 japan_religion.7.f:0 "「[ROOT.GetCountry.GetNameNoFormatting]では、何百年にもわたり新たな仏教宗派が興ってきた。ある宗派が他を駆逐するなどとは考えにくい。しかし、今の時勢は指導力と政治的指針を求めている。その機を他よりも巧みに掴む宗派が現れるのも、当然の成り行きであろう」"
 japan_religion.7.a:0 "浄土宗か。"
 japan_religion.7.b:0 "禅宗か。"
 japan_religion.7.c:0 "日蓮宗か。"
 japan_religion.7.e:0 "真言宗か。"
 pure_land_buddhism:0 "浄土宗"
 zen_buddhism:0 "禅宗"
 shingon_buddhism:0 "真言宗"
 japan_religion.8.t:0 "仏陀の言葉"
 japan_religion.8.d:0 "[ROOT.GetCountry.GetName]が世界に開かれたことで、仏教学者たちは海外の文献を翻訳し、その思想を近代仏教に取り入れることに関心を示している。"
 japan_religion.8.f:0 "「閉ざされた中で形作られた正統教義に囚われるべきではないし、思わぬ場所に真理を見出すことを恐れるべきでもない。仏陀の教えは長い道のりを経て我々のもとに届いた。その教えがどこを通り、これからどこへ向かうのかを学ぶことは、我々にさらなる知見をもたらすに違いない」"
 japan_religion.8.a:0 "仏教の源流たるサンスクリット語とパーリ語の文献を。"
 japan_religion.8.b:0 "我が国の宗派に最も近い、中国語の文献を。"
 japan_religion.8.c:0 "比較研究のため、西洋哲学の著作を。"
 japan_religion.9.t:0 "僧兵"
 japan_religion.9.d:0 "戦争の長期化に伴い、[SCOPE.gsInterestGroup('devout_ig').GetName]のあいだでは、この武力紛争において仏教が国家をいかに支えるべきかという議論が巻き起こっている。"
 japan_religion.9.f:0 "「古の僧たちは寺を守ることを躊躇わなかった。ならば、我々が国を守ることに躊躇う道理があろうか？命を軽んじてよいはずはない。だがこの[ROOT.GetCountry.GetAdjective]が、長き安寧の世を目指すことなく、奪う以上の命を救うこともない戦を、果たして起こすであろうか？」"
 japan_religion.9.a:0 "恒久の平和のためには、武力が必要だ。"
 japan_religion.9.b:0 "何よりも非暴力を貫くべきだ。"
 war_buddhism:0 "戦う仏教"
 peaceful_buddhism:0 "平和の仏教"
 japan_religion.10.t:0 "洋食"
 japan_religion.10.d:0 "鎖国が終わって以来、港湾都市では肉料理を中心とした外国人向けの飲食店がますます一般的になっている。そのため、[ROOT.GetCountry.GetName]の肉食禁止令に疑問が投げかけられている。"
 japan_religion.10.f:0 "「もし、あなた。牛は至極美味ですなあ。この肉の味を覚えてしまったら、もう猪や鹿の肉は食べられませんね。こんな清潔なものをなぜ今まで食べなかったのでしょう」\n\n―仮名垣魯文、『#italic 安愚楽鍋#!』"
 japan_religion.10.a:0 "我々はこの禁令を解かねばならない。栄養のためにも、そして食文化の発展のためにも！"
 japan_religion.10.b:0 "このような野蛮な慣習を定着させてはならない！"
 maintained_meat_ban:0 "肉食禁止令の維持"
 maintained_meat_ban_opinion:0 "$maintained_meat_ban$"
