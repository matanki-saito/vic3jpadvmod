 naval_mission_type_port_bombardment:0 "港への砲撃"
 naval_mission_type_port_bombardment_desc:0 "[concept_fleet]に与えられる[concept_naval_mission]の一種。この海域に隣接する敵の沿岸部国家を砲撃し、荒廃を発生させます。また、沿岸部の施設にダメージを与える可能性もあります。"
 naval_mission_type_piracy:0 "海賊行為"
 naval_mission_type_piracy_desc:0 "[concept_fleet]に与えられる[concept_naval_mission]の一種。割り当てられた海域を通過する敵対国または中立国の[Concept('concept_good','$concept_goods$')]を押収します。"
 naval_mission_type_privateer:0 "私掠"
