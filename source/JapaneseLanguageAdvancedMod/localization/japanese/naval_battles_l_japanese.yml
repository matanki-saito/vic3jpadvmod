 naval_mission_type_blockade:0 "封鎖"
 naval_mission_type_blockade_desc:0 "沿岸部の海上ノードを[concept_blockade]し、隣接する敵対港における[concept_trade]と[concept_supply]を遮断します。"
 naval_mission_type_raid_supply:0 "補給線の襲撃"
 naval_mission_type_raid_supply_desc:0 "[concept_fleet]に与えられる[concept_naval_mission]の一種で、海域を通過する敵[Concept('concept_supply_ship','$concept_supply_ships$')]の撃沈が目標です。"
 naval_mission_type_protect_supply:0 "補給線の防衛"
 naval_mission_type_protect_supply_desc:0 "[concept_fleet]に与えられる[concept_naval_mission]の一種で、[Concept('concept_supply_ship','$concept_supply_ships$')]を安全に護送し、[Concept('concept_shipping_lane','$concept_shipping_lanes$')]を防衛することが目標です。必要に応じ敵艦と交戦することが求められます。"
 naval_mission_type_project_power:0 "戦力の投射"
