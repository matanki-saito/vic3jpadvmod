 DISBAND_FORMATION_UNASSIGNED_COMMANDER_LIMIT:0 "[COUNTRY.GetName]にはすでに待機中の[SelectLocalization(MilitaryFormation.IsArmy,'MILITARY_FORMATION_GENERALS_CONCEPT','MILITARY_FORMATION_ADMIRALS_CONCEPT')]が[SelectLocalization(MILITARY_FORMATION.IsFleet,'NUM_IDLE_ADMIRALS','NUM_IDLE_GENERALS')]/[SelectLocalization(MILITARY_FORMATION.IsFleet,'MAX_IDLE_ADMIRALS','MAX_IDLE_GENERALS')]人おり、[MILITARY_FORMATION.GetName]を解散すると[concept_commander]が待機状態になるため解散できません。"
 MERGE_FORMATION_UNASSIGNED_COMMANDER_LIMIT:0 "[COUNTRY.GetName]にはすでに待機中の[SelectLocalization(MilitaryFormation.IsArmy,'MILITARY_FORMATION_GENERALS_CONCEPT','MILITARY_FORMATION_ADMIRALS_CONCEPT')]が[SelectLocalization(MILITARY_FORMATION.IsFleet,'NUM_IDLE_ADMIRALS','NUM_IDLE_GENERALS')]/[SelectLocalization(MILITARY_FORMATION.IsFleet,'MAX_IDLE_ADMIRALS','MAX_IDLE_GENERALS')]人おり、[MILITARY_FORMATION.GetName]を統合すると[concept_commander]が1名待機状態になるため統合できません。"
