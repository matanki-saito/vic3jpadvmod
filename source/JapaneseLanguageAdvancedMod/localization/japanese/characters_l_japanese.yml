 PROMOTE_COMMANDER_UNNECESSARY_WARNING:0 "@warning! 現在の[Concept('concept_commander','$concept_commanders$')]は[Concept('concept_military_formation','$concept_military_formations$')]の需要を満たしており、この度の昇進は$INTEREST_GROUPS$から不必要と見なされ、以下の効果をもたらします : \n$EFFECT$ ([GetDefine('NMilitary','UNNECESSARY_PROMOTION_PENALTY_YEARS')|v]年間) "
 CHARACTER_IS_TRAVELLING_TO_FORMATION_TOOLTIP:0 "#header 移動中の[concept_commander]#!\n[Character.GetFullNameWithTitle]は[Character.GetTravelDaysLeft|v]日後 ([Character.GetTravelArrivalDate|v]) に到着します\n$TOOLTIP_DELIMITER$\n[Character.GetSheHe]が到着するまで、[Character.GetMilitaryFormation.GetName]は[Character.GetFullNamePossessive]の#b スキル#![Concept('concept_character_trait','$concept_character_traits_short$')]の恩恵を受けません。"
 CHARACTER_IS_TRAVELLING_TO_FORMATION:0 "@information! [Character.GetFullNameWithTitle]は[Character.GetMilitaryFormation.GetName]に合流するため移動中で、[Character.GetTravelDaysLeft|v]日後 ([Character.GetTravelArrivalDate|v]) に到着します"
